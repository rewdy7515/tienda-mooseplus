<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ordenes</title>
    <link rel="stylesheet" href="../../styles/styles.css" />
    <style>
      .ordenes-table-wrap {
        overflow-x: auto;
      }
      .estado-cell {
        text-align: center;
        font-weight: 700;
        border-radius: 0;
      }
      .estado-ok {
        background: #dcfce7;
        color: #166534;
      }
      .estado-bad {
        background: #fee2e2;
        color: #991b1b;
      }
      .estado-warn {
        background: #fef3c7;
        color: #92400e;
      }
      .acciones-cell {
        display: flex;
        gap: 8px;
        justify-content: center;
        align-items: center;
        flex-wrap: wrap;
      }
      .acciones-cell .btn-primary,
      .acciones-cell .btn-outline {
        padding: 6px 10px;
        font-size: 12px;
      }
      .ordenes-filters {
        display: flex;
        gap: 8px;
        margin: 8px 0 12px;
      }
      .ordenes-pagination {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        flex-wrap: wrap;
        margin-top: 10px;
      }
      .ordenes-page-label {
        font-weight: 600;
      }
      .ordenes-page-btn {
        min-width: 40px;
      }
      .btn-filter.is-active {
        background: #111;
        color: #fff;
        border-color: #111;
        box-shadow: inset 0 2px 6px rgba(0, 0, 0, 0.25);
      }
      .btn-filter:not(.is-active) {
        background: #e5e7eb;
        color: #111;
        border-color: #cbd5e1;
      }
      .orden-row-selected td {
        background: #dbeafe;
      }
      .orden-row-selected td.estado-cell {
        background: #dbeafe;
        color: #1e3a8a;
      }
      #ordenes-table tbody tr.orden-row-odd {
        background: #eef1f5;
      }
      #ordenes-table tbody tr.orden-row-even {
        background: #ffffff;
      }
      .orden-id-link {
        border: 0;
        background: transparent;
        color: #1d4ed8;
        font-weight: 700;
        text-decoration: underline;
        cursor: pointer;
        padding: 0;
      }
      .orden-id-link:hover,
      .orden-id-link:focus-visible {
        color: #1e40af;
      }
      .referencia-cell {
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }
      .btn-ver-comprobante {
        padding: 4px 8px;
        font-size: 11px;
        line-height: 1.1;
      }
      .comprobantes-por-verificar {
        margin: 6px 0 14px;
      }
      .comprobantes-por-verificar h3 {
        margin: 0 0 8px;
      }
      .comprobante-modal {
        position: fixed;
        inset: 0;
        z-index: 1200;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .comprobante-modal.hidden {
        display: none;
      }
      .comprobante-modal-backdrop {
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.72);
      }
      .comprobante-modal-card {
        position: relative;
        z-index: 1;
        background: #fff;
        border-radius: 14px;
        width: min(88vw, 860px);
        height: min(80dvh, 640px);
        max-width: 88vw;
        max-height: 80dvh;
        padding: 14px 14px 12px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
        overflow: hidden;
      }
      .comprobante-modal-close {
        position: absolute;
        top: 10px;
        right: 10px;
        border: 1px solid #d1d5db;
        width: 32px;
        height: 32px;
        border-radius: 999px;
        background: #ffffff;
        color: #111827;
        cursor: pointer;
        font-size: 20px;
        font-weight: 700;
        line-height: 1;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }
      .comprobante-modal-media {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100%;
        padding-top: 18px;
      }
      .comprobante-modal-media img {
        display: block;
        width: auto;
        height: auto;
        max-width: 78vw;
        max-height: 70dvh;
        object-fit: contain;
        border-radius: 10px;
      }
      @media (max-width: 768px) {
        .comprobante-modal-card {
          width: 92vw;
          height: 72dvh;
          padding: 12px 12px 10px;
          border-radius: 10px;
        }
        .comprobante-modal-close {
          top: 8px;
          right: 8px;
          width: 34px;
          height: 34px;
          font-size: 22px;
        }
        .comprobante-modal-media {
          height: 100%;
          padding-top: 16px;
        }
        .comprobante-modal-media img {
          max-width: 86vw;
          max-height: 60dvh;
        }
      }
      .saldo-modal {
        position: fixed;
        inset: 0;
        z-index: 1300;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .saldo-modal.hidden {
        display: none;
      }
      .saldo-modal-backdrop {
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.56);
      }
      .saldo-modal-card {
        position: relative;
        z-index: 1;
        width: min(94vw, 420px);
        background: #fff;
        border-radius: 12px;
        padding: 14px;
      }
      .saldo-modal-title {
        margin: 0 0 8px;
      }
      .saldo-modal-actions {
        display: flex;
        gap: 8px;
        justify-content: flex-end;
        margin-top: 12px;
      }
      .saldo-modal-hint {
        font-size: 12px;
        color: #475569;
        margin-top: 6px;
      }
    </style>
  </head>
  <body>
    <div id="app-header" data-header-root="../../" data-header-pages="../"></div>
    <script src="../../scripts/header-loader.js"></script>

    <main class="categorias-dinamicas">
      <h2>Ordenes</h2>
      <section id="comprobantes-verificar-section" class="comprobantes-por-verificar hidden">
        <h3>Comprobantes por verificar</h3>
        <div class="ordenes-table-wrap">
          <table class="table-base" id="comprobantes-verificar-table">
            <thead>
              <tr>
                <th>ID</th>
                <th>Cliente</th>
                <th>Metodo de pago</th>
                <th>Monto</th>
                <th>Referencia</th>
                <th>Fecha</th>
                <th>Hora</th>
                <th>Estado</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody id="comprobantes-verificar-body"></tbody>
          </table>
        </div>
      </section>
      <p id="ordenes-status" class="status">Cargando ordenes...</p>
      <div class="ordenes-filters" id="ordenes-filters">
        <button
          type="button"
          class="btn-primary btn-filter is-active"
          id="btn-filter-checkout"
          aria-pressed="true"
        >
          Pagos desde checkout
        </button>
      </div>
      <div class="ordenes-table-wrap" id="ordenes-table-wrap">
        <table class="table-base" id="ordenes-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Cliente</th>
              <th>Metodo de pago</th>
              <th>Monto</th>
              <th>Referencia</th>
              <th>Fecha</th>
              <th>Hora</th>
              <th>Estado</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="ordenes-body"></tbody>
        </table>
      </div>
      <div class="ordenes-pagination hidden" id="ordenes-pagination">
        <button
          type="button"
          class="btn-outline ordenes-page-btn"
          id="ordenes-page-prev"
          aria-label="Página anterior"
        >
          ←
        </button>
        <span class="ordenes-page-label" id="ordenes-page-label">Página 1 de 1</span>
        <button
          type="button"
          class="btn-outline ordenes-page-btn"
          id="ordenes-page-next"
          aria-label="Página siguiente"
        >
          →
        </button>
      </div>
    </main>
    <div id="comprobante-modal" class="comprobante-modal hidden" aria-hidden="true">
      <div class="comprobante-modal-backdrop" data-close-comprobante></div>
      <div class="comprobante-modal-card" role="dialog" aria-modal="true" aria-label="Comprobante">
        <button type="button" class="comprobante-modal-close" data-close-comprobante aria-label="Cerrar modal">
          X
        </button>
        <div class="comprobante-modal-media">
          <img id="comprobante-modal-img" alt="Comprobante de pago" />
        </div>
      </div>
    </div>
    <div id="saldo-modal" class="saldo-modal hidden" aria-hidden="true">
      <div class="saldo-modal-backdrop" data-close-saldo></div>
      <div class="saldo-modal-card" role="dialog" aria-modal="true" aria-label="Saldo a favor">
        <h3 class="saldo-modal-title">¿Agregar saldo a favor?</h3>
        <p id="saldo-modal-order-txt">Orden #</p>
        <label for="saldo-modal-input">Monto a acreditar</label>
        <input id="saldo-modal-input" type="number" min="0" step="0.01" inputmode="decimal" />
        <p class="saldo-modal-hint" id="saldo-modal-hint"></p>
        <div class="saldo-modal-actions">
          <button type="button" class="btn-outline" id="saldo-modal-skip">No acreditar</button>
          <button type="button" class="btn-primary" id="saldo-modal-credit">Acreditar</button>
        </div>
      </div>
    </div>

    <script type="module">
      import { requireSession, attachLogout, attachLogoHome } from "../../scripts/session.js";
      import {
        clearServerSession,
        loadCurrentUser,
        supabase,
        procesarOrden,
      } from "../../scripts/api.js";
      import {
        buildNotificationPayload,
        pickNotificationUserIds,
      } from "../../scripts/notification-templates.js";
      import { formatDDMMYYYY } from "../../scripts/date-format.js";

      requireSession();
      attachLogoHome();
      attachLogout(clearServerSession);

      const statusEl = document.querySelector("#ordenes-status");
      const tableWrap = document.querySelector("#ordenes-table-wrap");
      const filterWrap = document.querySelector("#ordenes-filters");
      const tbodyEl = document.querySelector("#ordenes-body");
      const comprobantesVerificarSectionEl = document.querySelector(
        "#comprobantes-verificar-section"
      );
      const comprobantesVerificarBodyEl = document.querySelector(
        "#comprobantes-verificar-body"
      );
      const paginationEl = document.querySelector("#ordenes-pagination");
      const pagePrevBtn = document.querySelector("#ordenes-page-prev");
      const pageNextBtn = document.querySelector("#ordenes-page-next");
      const pageLabelEl = document.querySelector("#ordenes-page-label");
      const filterCheckoutBtn = document.querySelector("#btn-filter-checkout");
      const comprobanteModalEl = document.querySelector("#comprobante-modal");
      const comprobanteModalImgEl = document.querySelector("#comprobante-modal-img");
      const saldoModalEl = document.querySelector("#saldo-modal");
      const saldoModalOrderTxtEl = document.querySelector("#saldo-modal-order-txt");
      const saldoModalInputEl = document.querySelector("#saldo-modal-input");
      const saldoModalHintEl = document.querySelector("#saldo-modal-hint");
      const saldoModalSkipBtn = document.querySelector("#saldo-modal-skip");
      const saldoModalCreditBtn = document.querySelector("#saldo-modal-credit");

      const isTrue = (v) => v === true || v === 1 || v === "1" || v === "true" || v === "t";
      const round2 = (n) => Math.round((Number(n) || 0) * 100) / 100;
      const parseMoney = (v) => {
        const n = Number(String(v ?? "").trim().replace(",", "."));
        return Number.isFinite(n) ? round2(n) : 0;
      };
      const PAGE_SIZE = 10;
      let allOrdenes = [];
      let userMap = {};
      let metodoMap = {};
      let carritoMap = {};
      let filterCheckoutActive = true;
      let currentUser = null;
      let canManageOrdenes = false;
      let currentPage = 1;
      let saldoModalResolver = null;

      const setStatus = (msg) => {
        if (statusEl) statusEl.textContent = msg || "";
      };

      const formatMonto = (monto) => {
        const num = Number(monto);
        if (!Number.isFinite(num)) return "-";
        return num.toFixed(2);
      };

      const formatOrdenMonto = (orden) => {
        const metodoInfo = metodoMap[orden?.id_metodo_de_pago] || null;
        const pagoEnBolivares = isTrue(metodoInfo?.bolivares);
        if (pagoEnBolivares) {
          const montoBsDirecto = Number(orden?.monto_bs);
          const montoBsFallback =
            Number.isFinite(Number(orden?.total)) && Number.isFinite(Number(orden?.tasa_bs))
              ? round2(Number(orden.total) * Number(orden.tasa_bs))
              : null;
          const montoBs = Number.isFinite(montoBsDirecto) ? montoBsDirecto : montoBsFallback;
          const montoBsTxt = formatMonto(montoBs);
          return montoBsTxt !== "-" ? `Bs. ${montoBsTxt}` : "-";
        }

        const totalUsdTxt = formatMonto(orden?.total);
        return totalUsdTxt !== "-" ? `$${totalUsdTxt}` : "-";
      };

      const buildMap = (rows, idKey, nameBuilder) => {
        return (rows || []).reduce((acc, row) => {
          const id = row?.[idKey];
          if (!id) return acc;
          acc[id] = nameBuilder(row);
          return acc;
        }, {});
      };

      const extractComprobanteUrl = (rawComprobante) => {
        if (Array.isArray(rawComprobante)) {
          const first = rawComprobante.find((it) => String(it || "").trim());
          return first ? String(first).trim() : "";
        }
        if (typeof rawComprobante === "string") {
          const value = rawComprobante.trim();
          if (!value) return "";
          try {
            const parsed = JSON.parse(value);
            if (Array.isArray(parsed)) {
              const first = parsed.find((it) => String(it || "").trim());
              return first ? String(first).trim() : "";
            }
          } catch (_err) {
            // noop
          }
          return value;
        }
        return "";
      };

      const openComprobanteModal = (url) => {
        const imgUrl = String(url || "").trim();
        if (!comprobanteModalEl || !comprobanteModalImgEl || !imgUrl) return;
        comprobanteModalImgEl.src = imgUrl;
        comprobanteModalEl.classList.remove("hidden");
        comprobanteModalEl.setAttribute("aria-hidden", "false");
      };

      const closeComprobanteModal = () => {
        if (!comprobanteModalEl || !comprobanteModalImgEl) return;
        comprobanteModalEl.classList.add("hidden");
        comprobanteModalEl.setAttribute("aria-hidden", "true");
        comprobanteModalImgEl.removeAttribute("src");
      };

      const closeSaldoModal = (value = null) => {
        if (!saldoModalEl) return;
        saldoModalEl.classList.add("hidden");
        saldoModalEl.setAttribute("aria-hidden", "true");
        const resolver = saldoModalResolver;
        saldoModalResolver = null;
        if (resolver) resolver(value);
      };

      const askSaldoAFavor = ({ idOrden, suggested }) =>
        new Promise((resolve) => {
          if (!saldoModalEl || !saldoModalInputEl || !saldoModalOrderTxtEl || !saldoModalHintEl) {
            resolve(0);
            return;
          }
          saldoModalResolver = resolve;
          const safeSuggested = round2(Math.max(0, Number(suggested) || 0));
          saldoModalOrderTxtEl.textContent = `Orden #${idOrden}`;
          saldoModalInputEl.value = safeSuggested.toFixed(2);
          saldoModalHintEl.textContent = `Monto sugerido: $${safeSuggested.toFixed(2)}`;
          saldoModalEl.classList.remove("hidden");
          saldoModalEl.setAttribute("aria-hidden", "false");
          saldoModalInputEl.focus();
          saldoModalInputEl.select();
        });

      const calcMetodo4Neto = (montoTransferido) =>
        round2((Number(montoTransferido) || 0) - ((Number(montoTransferido) || 0) * 0.054 + 0.3));
      const calcMetodo3Neto = (montoTransferido) => round2((Number(montoTransferido) || 0) * 0.8);

      const getMontoBaseCobro = (orden) => {
        const cart = carritoMap[orden?.id_carrito];
        if (!cart) return round2(orden?.total);
        if (isTrue(cart.usa_saldo)) {
          const montoFinal = Number(cart.monto_final);
          if (Number.isFinite(montoFinal) && montoFinal >= 0) return round2(montoFinal);
        }
        const montoUsd = Number(cart.monto_usd);
        if (Number.isFinite(montoUsd) && montoUsd >= 0) return round2(montoUsd);
        return round2(orden?.total);
      };

      const getSaldoSugerido = (orden) => {
        const montoTransferido = Number(orden?.monto_transferido);
        if (!Number.isFinite(montoTransferido) || montoTransferido <= 0) return 0;
        const baseCobro = getMontoBaseCobro(orden);
        const metodoId = Number(orden?.id_metodo_de_pago);
        const valorComparable =
          metodoId === 4
            ? calcMetodo4Neto(montoTransferido)
            : metodoId === 3
              ? calcMetodo3Neto(montoTransferido)
              : montoTransferido;
        return round2(Math.max(0, valorComparable - baseCobro));
      };

      const isMetodoNoAutomatico = (orden) => {
        const info = metodoMap[orden?.id_metodo_de_pago];
        if (!info) return false;
        return info.verificacion_automatica === false;
      };

      const applyVisibleRowStripes = () => {
        if (!tbodyEl) return;
        const rows = Array.from(tbodyEl.querySelectorAll("tr")).filter(
          (tr) => window.getComputedStyle(tr).display !== "none"
        );
        rows.forEach((tr, idx) => {
          const odd = idx % 2 === 0;
          tr.classList.toggle("orden-row-odd", odd);
          tr.classList.toggle("orden-row-even", !odd);
        });
      };

      const renderOrdenes = () => {
        const rows = filterCheckoutActive
          ? allOrdenes.filter((o) => isTrue(o.origen_checkout))
          : allOrdenes;
        const hasMontoTransferido = (orden) => {
          const raw = orden?.monto_transferido;
          if (raw === null || raw === undefined) return false;
          const value = Number(raw);
          return Number.isFinite(value) && value > 0;
        };
        const rowsComprobantes = rows.filter(
          (orden) =>
            (hasMontoTransferido(orden) || isTrue(orden?.monto_mayor)) &&
            !isTrue(orden?.pago_verificado) &&
            !isTrue(orden?.orden_cancelada)
        );
        const buildOrdenRowHtml = (orden) => {
          const cliente = userMap[orden.id_usuario] || "-";
          const metodoInfo = metodoMap[orden.id_metodo_de_pago] || {
            nombre: "-",
            bolivares: false,
            verificacion_automatica: true,
          };
          const metodo = metodoInfo.nombre || "-";
          const montoVal = formatOrdenMonto(orden);
          const referencia = orden.referencia || "-";
          const comprobanteUrl = extractComprobanteUrl(orden.comprobante);
          const referenciaHtml = comprobanteUrl
            ? `<span class="referencia-cell">${referencia}<button type="button" class="btn-outline btn-ver-comprobante" data-comprobante="${encodeURIComponent(comprobanteUrl)}">Ver imagen</button></span>`
            : referencia;
          const fecha = formatDDMMYYYY(orden.fecha) || orden.fecha || "-";
          const hora = orden.hora_orden || "-";
          const verificado = isTrue(orden.pago_verificado);
          const cancelada = isTrue(orden.orden_cancelada);
          const estado = cancelada ? "Rechazada" : verificado ? "Verificado" : "Pendiente";
          const estadoClass = cancelada ? "estado-bad" : verificado ? "estado-ok" : "estado-warn";
          const canEntregar = !verificado && !cancelada;
          const canRechazar = !verificado && !cancelada;
          const accionesCell = canManageOrdenes
            ? `
                <button type="button" class="btn-primary btn-entregar" data-orden="${orden.id_orden}" ${canEntregar ? "" : "disabled"}>
                  ${canEntregar ? "Entregar servicio" : cancelada ? "Rechazada" : "Entregado"}
                </button>
                <button type="button" class="btn-outline btn-rechazar" data-orden="${orden.id_orden}" ${canRechazar ? "" : "disabled"}>
                  Rechazar servicio
                </button>
              `
            : "-";
          return `
              <tr data-orden="${orden.id_orden}">
                <td>
                  <button type="button" class="orden-id-link" data-open-orden="${orden.id_orden}">
                    ${orden.id_orden ?? "-"}
                  </button>
                </td>
                <td>${cliente || "-"}</td>
                <td>${metodo}</td>
                <td>${montoVal}</td>
                <td>${referenciaHtml}</td>
                <td>${fecha}</td>
                <td>${hora}</td>
                <td class="estado-cell ${estadoClass}">${estado}</td>
                <td class="acciones-cell">${accionesCell}</td>
              </tr>
            `;
        };
        if (comprobantesVerificarBodyEl) {
          if (!rowsComprobantes.length) {
            comprobantesVerificarBodyEl.innerHTML = "";
            comprobantesVerificarSectionEl?.classList.add("hidden");
          } else {
            comprobantesVerificarBodyEl.innerHTML = rowsComprobantes
              .map((orden) => buildOrdenRowHtml(orden))
              .join("");
            comprobantesVerificarSectionEl?.classList.remove("hidden");
          }
        }
        if (!rows.length) {
          tbodyEl.innerHTML = "";
          if (paginationEl) paginationEl.classList.add("hidden");
          setStatus("No hay ordenes registradas.");
          return;
        }
        const totalPages = Math.max(1, Math.ceil(rows.length / PAGE_SIZE));
        if (currentPage > totalPages) currentPage = totalPages;
        if (currentPage < 1) currentPage = 1;
        const start = (currentPage - 1) * PAGE_SIZE;
        const pageRows = rows.slice(start, start + PAGE_SIZE);
        tbodyEl.innerHTML = pageRows.map((orden) => buildOrdenRowHtml(orden)).join("");
        if (pageLabelEl) pageLabelEl.textContent = `Página ${currentPage} de ${totalPages}`;
        if (pagePrevBtn) pagePrevBtn.disabled = currentPage <= 1;
        if (pageNextBtn) pageNextBtn.disabled = currentPage >= totalPages;
        if (paginationEl) paginationEl.classList.toggle("hidden", rows.length <= 0);
        applyVisibleRowStripes();
        setStatus("");
      };

      const markOrdenProcesada = (idOrden, idAdminEntrega = null) => {
        const id = Number(idOrden);
        if (!Number.isFinite(id)) return;
        const idx = allOrdenes.findIndex((o) => Number(o.id_orden) === id);
        if (idx >= 0) {
          const current = allOrdenes[idx];
          const parsedAdmin = Number.isFinite(Number(idAdminEntrega))
            ? Number(idAdminEntrega)
            : current?.id_admin ?? null;
          allOrdenes[idx] = {
            ...current,
            pago_verificado: true,
            id_admin: parsedAdmin,
          };
        }
        renderOrdenes();
      };

      const markOrdenRechazada = (idOrden) => {
        const id = Number(idOrden);
        if (!Number.isFinite(id)) return;
        const idx = allOrdenes.findIndex((o) => Number(o.id_orden) === id);
        if (idx >= 0) {
          allOrdenes[idx] = {
            ...allOrdenes[idx],
            orden_cancelada: true,
          };
        }
        renderOrdenes();
      };

      const notifyVentasEntregadas = async (idOrden) => {
        const id = Number(idOrden);
        if (!Number.isFinite(id)) return;

        const { data: ventasOrden, error: ventasOrdErr } = await supabase
          .from("ventas")
          .select(
            "id_venta, id_usuario, fecha_corte, id_cuenta, id_cuenta_miembro, id_perfil, id_orden, renovacion, correo_miembro, clave_miembro, cuentas:cuentas!ventas_id_cuenta_fkey(id_cuenta, correo, clave, id_plataforma, plataformas:plataformas(nombre, correo_cliente, clave_cliente, entrega_inmediata)), cuentas_miembro:cuentas!ventas_id_cuenta_miembro_fkey(id_cuenta, correo, clave, id_plataforma, plataformas:plataformas(nombre, correo_cliente, clave_cliente, entrega_inmediata)), perfiles:perfiles(n_perfil)"
          )
          .eq("id_orden", id);
        if (ventasOrdErr) throw ventasOrdErr;

        const nuevosServiciosPorUsuario = new Map();
        const serviciosEnProcesoPorUsuario = new Map();
        const renovacionesPorUsuario = new Map();

        (ventasOrden || []).forEach((v) => {
          const uid = Number(v?.id_usuario);
          if (!Number.isFinite(uid)) return;
          const cuentaRow = v.cuentas_miembro || v.cuentas || null;
          const idPlataforma = Number(cuentaRow?.id_plataforma) || null;
          const platName = cuentaRow?.plataformas?.nombre || "Plataforma";
          const entregaInmediata = isTrue(cuentaRow?.plataformas?.entrega_inmediata);
          const perfilTxt = v.perfiles?.n_perfil ? `M${v.perfiles.n_perfil}` : "";
          const correoTxt = v.correo_miembro || cuentaRow?.correo || "";
          const claveTxt = v.clave_miembro || cuentaRow?.clave || "";

          const item = {
            plataforma: platName,
            correoCuenta: correoTxt,
            clave: claveTxt,
            perfil: perfilTxt,
            fechaCorte: v.fecha_corte || "",
            idVenta: v.id_venta || null,
          };

          if (v.renovacion) {
            const itemsRenov = renovacionesPorUsuario.get(uid) || [];
            itemsRenov.push(item);
            renovacionesPorUsuario.set(uid, itemsRenov);
            return;
          }

          if (idPlataforma && !entregaInmediata) {
            const itemsProc = serviciosEnProcesoPorUsuario.get(uid) || [];
            itemsProc.push({
              plataforma: platName,
              fechaCorte: v.fecha_corte || "",
              idVenta: v.id_venta || null,
            });
            serviciosEnProcesoPorUsuario.set(uid, itemsProc);
            return;
          }

          const itemsNuevos = nuevosServiciosPorUsuario.get(uid) || [];
          itemsNuevos.push(item);
          nuevosServiciosPorUsuario.set(uid, itemsNuevos);
        });

        const rowsNotif = [];
        const userIdsToFlag = new Set();

        nuevosServiciosPorUsuario.forEach((items, uid) => {
          if (!items.length) return;
          const userIds = pickNotificationUserIds("nuevo_servicio", { ventaUserId: uid });
          if (!userIds.length) return;
          const payload = buildNotificationPayload("nuevo_servicio", { items });
          userIds.forEach((idUsuario) => {
            rowsNotif.push({ ...payload, id_usuario: idUsuario });
            userIdsToFlag.add(idUsuario);
          });
        });

        renovacionesPorUsuario.forEach((items, uid) => {
          if (!items.length) return;
          const userIds = pickNotificationUserIds("servicio_renovado", { ventaUserId: uid });
          if (!userIds.length) return;
          const payload = buildNotificationPayload("servicio_renovado", { items });
          userIds.forEach((idUsuario) => {
            rowsNotif.push({ ...payload, id_usuario: idUsuario });
            userIdsToFlag.add(idUsuario);
          });
        });

        serviciosEnProcesoPorUsuario.forEach((items, uid) => {
          if (!items.length) return;
          const userIds = pickNotificationUserIds("servicio_en_proceso", { ventaUserId: uid });
          if (!userIds.length) return;
          const payload = buildNotificationPayload("servicio_en_proceso", { items });
          userIds.forEach((idUsuario) => {
            rowsNotif.push({ ...payload, id_usuario: idUsuario });
            userIdsToFlag.add(idUsuario);
          });
        });

        if (rowsNotif.length) {
          const { error: notifErr } = await supabase.from("notificaciones").insert(rowsNotif);
          if (notifErr) throw notifErr;
        }

        const idsFlag = Array.from(userIdsToFlag);
        if (idsFlag.length) {
          const { error: flagErr } = await supabase
            .from("usuarios")
            .update({ notificacion_inventario: true })
            .in("id_usuario", idsFlag);
          if (flagErr) {
            console.error("notificacion_inventario update error", flagErr);
          }
        }
      };

      const loadOrdenes = async () => {
        setStatus("Cargando ordenes...");
        let query = supabase
          .from("ordenes")
          .select(
            "id_orden, id_usuario, id_metodo_de_pago, id_admin, id_carrito, total, monto_bs, monto_transferido, monto_mayor, referencia, comprobante, fecha, hora_orden, pago_verificado, orden_cancelada, checkout_finalizado"
          )
          .eq("marcado_pago", true);
        if (!canManageOrdenes) {
          query = query.eq("id_usuario", currentUser?.id_usuario ?? -1);
        }
        const { data: ordenes, error } = await query.order("id_orden", { ascending: false });
        if (error) {
          console.error("ordenes load error", error);
          setStatus("No se pudieron cargar las ordenes.");
          return;
        }
        allOrdenes = (ordenes || []).map((orden) => ({
          ...orden,
          origen_checkout: isTrue(orden?.checkout_finalizado) || orden.id_admin == null,
        }));
        if (!allOrdenes.length) {
          tbodyEl.innerHTML = "";
          setStatus("No hay ordenes registradas.");
          return;
        }

        const userIds = Array.from(new Set(allOrdenes.map((o) => o.id_usuario).filter(Boolean)));
        const metodoIds = Array.from(
          new Set(allOrdenes.map((o) => o.id_metodo_de_pago).filter(Boolean))
        );

        userMap = {};
        if (userIds.length) {
          const { data: users, error: userErr } = await supabase
            .from("usuarios")
            .select("id_usuario, nombre, apellido")
            .in("id_usuario", userIds);
          if (userErr) {
            console.error("usuarios load error", userErr);
          } else {
            userMap = buildMap(users, "id_usuario", (u) =>
              [u.nombre, u.apellido].filter(Boolean).join(" ").trim() || "-"
            );
          }
        }

        metodoMap = {};
        if (metodoIds.length) {
          const { data: metodos, error: metErr } = await supabase
            .from("metodos_de_pago")
            .select("id_metodo_de_pago, nombre, verificacion_automatica, bolivares")
            .in("id_metodo_de_pago", metodoIds);
          if (metErr) {
            console.error("metodos load error", metErr);
          } else {
            metodoMap = (metodos || []).reduce((acc, m) => {
              const id = m?.id_metodo_de_pago;
              if (!id) return acc;
              acc[id] = {
                nombre: m?.nombre || "-",
                bolivares: isTrue(m?.bolivares),
                verificacion_automatica: isTrue(m?.verificacion_automatica),
              };
              return acc;
            }, {});
          }
        }

        const carritoIds = Array.from(new Set(allOrdenes.map((o) => o.id_carrito).filter(Boolean)));
        carritoMap = {};
        if (carritoIds.length) {
          const { data: carritos, error: cartErr } = await supabase
            .from("carritos")
            .select("id_carrito, monto_usd, monto_final, usa_saldo")
            .in("id_carrito", carritoIds);
          if (cartErr) {
            console.error("carritos load error", cartErr);
          } else {
            carritoMap = (carritos || []).reduce((acc, c) => {
              const id = c?.id_carrito;
              if (!id) return acc;
              acc[id] = c;
              return acc;
            }, {});
          }
        }

        renderOrdenes();
      };

      const init = async () => {
        try {
          currentUser = await loadCurrentUser();
          if (!currentUser?.id_usuario) {
            if (tableWrap) tableWrap.classList.add("hidden");
            if (filterWrap) filterWrap.classList.add("hidden");
            setStatus("No se pudo identificar al usuario.");
            return;
          }
          canManageOrdenes =
            isTrue(currentUser?.permiso_superadmin) || isTrue(currentUser?.permiso_admin);
          if (!canManageOrdenes) {
            setStatus("Mostrando solo tus ordenes.");
          }
          await loadOrdenes();
        } catch (err) {
          console.error("ordenes init error", err);
          setStatus("No se pudieron cargar las ordenes.");
        }
      };

      filterCheckoutBtn?.addEventListener("click", () => {
        filterCheckoutActive = !filterCheckoutActive;
        filterCheckoutBtn.classList.toggle("is-active", filterCheckoutActive);
        filterCheckoutBtn.setAttribute("aria-pressed", filterCheckoutActive ? "true" : "false");
        currentPage = 1;
        renderOrdenes();
      });

      pagePrevBtn?.addEventListener("click", () => {
        if (currentPage <= 1) return;
        currentPage -= 1;
        renderOrdenes();
      });

      pageNextBtn?.addEventListener("click", () => {
        const rows = filterCheckoutActive
          ? allOrdenes.filter((o) => isTrue(o.origen_checkout))
          : allOrdenes;
        const totalPages = Math.max(1, Math.ceil((rows.length || 0) / PAGE_SIZE));
        if (currentPage >= totalPages) return;
        currentPage += 1;
        renderOrdenes();
      });

      document.addEventListener("click", async (event) => {
        const row = event.target.closest("#ordenes-table tbody tr, #comprobantes-verificar-table tbody tr");
        if (row) {
          document
            .querySelectorAll(
              "#ordenes-table tbody .orden-row-selected, #comprobantes-verificar-table tbody .orden-row-selected"
            )
            .forEach((tr) => {
            tr.classList.remove("orden-row-selected");
          });
          row.classList.add("orden-row-selected");
        }
        const entregarBtn = event.target.closest(".btn-entregar");
        if (entregarBtn) {
          if (entregarBtn.disabled) return;
          const idOrden = Number(entregarBtn.dataset.orden);
          if (!Number.isFinite(idOrden)) return;
          const orden = allOrdenes.find((o) => Number(o.id_orden) === idOrden) || null;
          let saldoAFavor = 0;
          if (orden && isMetodoNoAutomatico(orden)) {
            const suggested = getSaldoSugerido(orden);
            const modalResult = await askSaldoAFavor({ idOrden, suggested });
            if (modalResult === null) return;
            saldoAFavor = Math.max(0, parseMoney(modalResult));
          }
          const prevText = entregarBtn.textContent;
          entregarBtn.disabled = true;
          entregarBtn.textContent = "Procesando...";
          setStatus(`Procesando orden #${idOrden}...`);
          try {
            const resp =
              saldoAFavor > 0
                ? await procesarOrden(idOrden, { saldo_a_favor: saldoAFavor })
                : await procesarOrden(idOrden);
            if (resp?.error) {
              console.error("procesar orden error", resp);
              window.alert(resp.error || "No se pudo procesar la orden.");
              setStatus("No se pudo procesar la orden.");
              return;
            }
            markOrdenProcesada(idOrden, resp?.id_admin);
            if (!resp?.already_processed) {
              try {
                await notifyVentasEntregadas(idOrden);
              } catch (notifErr) {
                console.error("notificaciones ordenes error", notifErr);
              }
            }
            if (resp?.already_processed) {
              setStatus(`Orden #${idOrden} ya estaba procesada.`);
            } else {
              setStatus(`Orden #${idOrden} procesada correctamente.`);
            }
          } catch (err) {
            console.error("procesar orden exception", err);
            window.alert("No se pudo procesar la orden.");
            setStatus("No se pudo procesar la orden.");
          } finally {
            const currentBtn = tbodyEl?.querySelector(`.btn-entregar[data-orden="${idOrden}"]`);
            const currentBtnComprobantes = comprobantesVerificarBodyEl?.querySelector(
              `.btn-entregar[data-orden="${idOrden}"]`
            );
            [currentBtn, currentBtnComprobantes].forEach((btn) => {
              if (btn) {
                btn.disabled = false;
                btn.textContent = prevText || "Entregar servicio";
              }
            });
          }
          return;
        }

        const openOrdenBtn = event.target.closest(".orden-id-link");
        if (openOrdenBtn) {
          const idOrden = Number(openOrdenBtn.dataset.openOrden);
          if (!Number.isFinite(idOrden)) return;
          window.location.href = `../detalle_ordenes.html?id_orden=${encodeURIComponent(idOrden)}`;
          return;
        }

        const rechazarBtn = event.target.closest(".btn-rechazar");
        if (rechazarBtn) {
          if (rechazarBtn.disabled) return;
          const idOrden = Number(rechazarBtn.dataset.orden);
          if (!Number.isFinite(idOrden)) return;
          const confirmed = window.confirm("¿Rechazar este servicio?");
          if (!confirmed) return;
          const { error } = await supabase
            .from("ordenes")
            .update({ orden_cancelada: true })
            .eq("id_orden", idOrden);
          if (error) {
            console.error("rechazar orden error", error);
            window.alert("No se pudo rechazar la orden.");
            return;
          }
          markOrdenRechazada(idOrden);
          setStatus(`Orden #${idOrden} rechazada.`);
          return;
        }

        const verComprobanteBtn = event.target.closest(".btn-ver-comprobante");
        if (verComprobanteBtn) {
          const url = decodeURIComponent(String(verComprobanteBtn.dataset.comprobante || ""));
          openComprobanteModal(url);
        }
      });

      document.addEventListener("click", (event) => {
        if (event.target.closest("[data-close-comprobante]")) {
          closeComprobanteModal();
        }
      });

      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape") {
          closeComprobanteModal();
          closeSaldoModal(null);
        }
      });

      saldoModalSkipBtn?.addEventListener("click", () => closeSaldoModal(0));
      saldoModalCreditBtn?.addEventListener("click", () => {
        closeSaldoModal(Math.max(0, parseMoney(saldoModalInputEl?.value)));
      });
      document.addEventListener("click", (event) => {
        if (event.target.closest("[data-close-saldo]")) {
          closeSaldoModal(null);
        }
      });

      init();
    </script>
  </body>
</html>
