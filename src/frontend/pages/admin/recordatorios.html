<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recordatorios</title>
    <link rel="stylesheet" href="../../styles/styles.css" />
    <style>
      .recordatorios-wrap {
        max-width: 960px;
        margin: 0 auto;
        padding: 16px;
      }
      .rec-buttons {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin: 12px 0;
      }
      .rec-buttons button {
        padding: 10px 14px;
        border: none;
        border-radius: 10px;
        background: #111;
        color: #fff;
        cursor: pointer;
        font-weight: 700;
      }
      .rec-results {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-top: 12px;
      }
      .rec-card {
        padding: 12px;
        border: 1px solid #e5e7eb;
        border-radius: 10px;
        background: #fff;
        text-align: left;
        cursor: pointer;
        transition: box-shadow 0.2s ease, transform 0.2s ease;
      }
      .rec-card:hover {
        box-shadow: 0 8px 18px rgba(0, 0, 0, 0.08);
        transform: translateY(-1px);
      }
      .rec-card:disabled {
        cursor: default;
        opacity: 0.72;
        transform: none;
      }
      .rec-card h4 {
        margin: 0 0 6px;
        font-size: 15px;
      }
      .rec-card p {
        margin: 2px 0;
        font-size: 13px;
        color: #333;
      }
      .rec-card pre {
        margin: 0;
        white-space: pre-wrap;
        font-family: "Inter", system-ui, -apple-system, sans-serif;
      }
      .rec-card.is-failed,
      .rec-card.is-skipped,
      .rec-card.is-pending {
        border-color: #fecaca;
        background: #fff7f7;
      }
      .rec-card-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 6px;
      }
      .rec-card-head h4 {
        margin: 0;
      }
      .rec-badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 4px 8px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 700;
        white-space: nowrap;
      }
      .rec-badge.is-sent {
        background: #dcfce7;
        color: #166534;
      }
      .rec-badge.is-failed {
        background: #fee2e2;
        color: #991b1b;
      }
      .rec-badge.is-skipped {
        background: #fef3c7;
        color: #92400e;
      }
      .rec-badge.is-pending {
        background: #dbeafe;
        color: #1d4ed8;
      }
      .rec-log {
        margin-top: 18px;
        padding: 14px;
        border: 1px solid #fecaca;
        border-radius: 12px;
        background: #fff7f7;
      }
      .rec-log[hidden] {
        display: none;
      }
      .rec-log h3 {
        margin: 0 0 10px;
        font-size: 16px;
      }
      .rec-log-list {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .rec-log-item {
        padding: 10px 12px;
        border-radius: 10px;
        background: #fff;
        border: 1px solid #fee2e2;
      }
      .rec-log-item p {
        margin: 4px 0;
        font-size: 13px;
      }
      .status {
        margin-top: 8px;
      }
      .wa-qr-panel {
        margin-top: 14px;
        padding: 14px;
        border: 1px solid #e5e7eb;
        border-radius: 12px;
        background: #f8fafc;
      }
      .wa-qr-panel h3 {
        margin: 0 0 8px;
        font-size: 16px;
      }
      .wa-qr-panel p {
        margin: 0 0 10px;
        font-size: 13px;
        color: #374151;
      }
      .wa-qr-box {
        min-height: 220px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 12px;
        padding: 12px;
      }
      .wa-qr-box canvas {
        max-width: 100%;
        height: auto;
      }
    </style>
  </head>
  <body>
    <div id="app-header" data-header-root="../../" data-header-pages="../"></div>
    <script src="../../scripts/header-loader.js"></script>

    <main class="categorias-dinamicas">
      <div class="recordatorios-wrap">
        <h2>Recordatorios</h2>
        <div class="rec-buttons">
          <button type="button" id="btn-generar-recordatorios">
            Generar recordatorios
          </button>
          <button type="button" id="btn-enviar-mensajes" hidden>
            Enviar mensajes
          </button>
        </div>
        <div id="rec-status" class="status"></div>
        <section id="wa-qr-panel" class="wa-qr-panel" hidden>
          <h3>Escanea el QR de WhatsApp</h3>
          <p id="wa-qr-hint">Esperando QR del servidor...</p>
          <div id="wa-qr-box" class="wa-qr-box"></div>
        </section>
        <div id="rec-results" class="rec-results"></div>
        <section id="rec-log" class="rec-log" hidden>
          <h3>Servicios no enviados</h3>
          <div id="rec-log-list" class="rec-log-list"></div>
        </section>
      </div>
    </main>
    <script type="module">
      import { API_BASE } from "../../scripts/api.js";
      import { requireSession, attachLogoHome } from "../../scripts/session.js";

      requireSession();
      attachLogoHome();

      const btnGenerarRecordatorios = document.querySelector(
        "#btn-generar-recordatorios",
      );
      const btnEnviarMensajes = document.querySelector("#btn-enviar-mensajes");
      const statusEl = document.querySelector("#rec-status");
      const resultsEl = document.querySelector("#rec-results");
      const logEl = document.querySelector("#rec-log");
      const logListEl = document.querySelector("#rec-log-list");
      const whatsappQrPanelEl = document.querySelector("#wa-qr-panel");
      const whatsappQrHintEl = document.querySelector("#wa-qr-hint");
      const whatsappQrBoxEl = document.querySelector("#wa-qr-box");
      let pendingPreviewEndpointAvailable = true;
      let generatedItems = [];
      let generatedSendableCount = 0;
      let qrRendererPromise = null;
      let whatsappQrPollTimer = null;

      const setStatus = (msg, isError = false) => {
        if (!statusEl) return;
        statusEl.textContent = msg || "";
        statusEl.style.color = isError ? "#b91c1c" : "";
      };

      const copyToClipboard = async (text) => {
        try {
          await navigator.clipboard.writeText(text);
        } catch (_) {
          const ta = document.createElement("textarea");
          ta.value = text;
          document.body.appendChild(ta);
          ta.select();
          document.execCommand("copy");
          ta.remove();
        }
      };

      const fetchJson = async (url, options = {}) => {
        const targetUrl = /^https?:\/\//i.test(String(url || ""))
          ? String(url)
          : `${API_BASE}${String(url || "").startsWith("/") ? "" : "/"}${String(url || "")}`;
        const resp = await fetch(targetUrl, {
          credentials: "include",
          ...options,
        });
        let body = null;
        try {
          body = await resp.json();
        } catch (_) {
          body = null;
        }
        if (!resp.ok) {
          const err = new Error(body?.error || `HTTP ${resp.status}`);
          err.status = resp.status;
          err.body = body;
          throw err;
        }
        return body || {};
      };

      const stopWhatsappQrPolling = () => {
        if (whatsappQrPollTimer) {
          clearInterval(whatsappQrPollTimer);
          whatsappQrPollTimer = null;
        }
      };

      const hideWhatsappQrPanel = () => {
        stopWhatsappQrPolling();
        if (whatsappQrPanelEl) whatsappQrPanelEl.hidden = true;
        if (whatsappQrHintEl) whatsappQrHintEl.textContent = "";
        if (whatsappQrBoxEl) whatsappQrBoxEl.innerHTML = "";
      };

      const ensureQrRenderer = async () => {
        if (!qrRendererPromise) {
          qrRendererPromise = import("https://esm.sh/qrcode@1.5.4?bundle&sourcemap=0");
        }
        const moduleRef = await qrRendererPromise;
        const toCanvasFn = moduleRef?.toCanvas || moduleRef?.default?.toCanvas;
        if (typeof toCanvasFn !== "function") {
          throw new Error("No se pudo cargar el generador de QR.");
        }
        return toCanvasFn;
      };

      const renderWhatsappQr = async (qrRaw = "") => {
        if (!whatsappQrPanelEl || !whatsappQrHintEl || !whatsappQrBoxEl) return;
        whatsappQrPanelEl.hidden = false;
        whatsappQrHintEl.textContent =
          "Escanea este QR con el WhatsApp del servidor para habilitar el envío.";
        whatsappQrBoxEl.innerHTML = "";
        const qrValue = String(qrRaw || "").trim();
        if (!qrValue) {
          whatsappQrHintEl.textContent = "Esperando generación del QR en el servidor...";
          return;
        }
        try {
          const toCanvas = await ensureQrRenderer();
          const canvas = document.createElement("canvas");
          await toCanvas(canvas, qrValue, {
            width: 260,
            margin: 1,
            color: {
              dark: "#111827",
              light: "#ffffff",
            },
          });
          whatsappQrBoxEl.appendChild(canvas);
        } catch (_qrRenderErr) {
          const pre = document.createElement("pre");
          pre.style.margin = "0";
          pre.style.whiteSpace = "pre-wrap";
          pre.style.wordBreak = "break-all";
          pre.style.fontSize = "11px";
          pre.textContent = qrValue;
          whatsappQrHintEl.textContent =
            "No se pudo renderizar la imagen del QR en este navegador. Usa el código manual:";
          whatsappQrBoxEl.appendChild(pre);
        }
      };

      const ensureWhatsappQrPolling = () => {
        if (whatsappQrPollTimer) return;
        whatsappQrPollTimer = setInterval(() => {
          fetchAndRenderWhatsappQr({ autoStart: false }).catch(() => {});
        }, 5000);
      };

      const fetchAndRenderWhatsappQr = async ({ autoStart = true } = {}) => {
        const data = await fetchJson(`/api/whatsapp/qr?start=${autoStart ? "true" : "false"}`);
        if (data?.ready) {
          hideWhatsappQrPanel();
          setStatus("WhatsApp listo. Puedes enviar mensajes.");
          return true;
        }
        const hasQr = Boolean(String(data?.qrRaw || "").trim());
        const isActive = data?.active === true;
        const isBooting = data?.booting === true;
        if (!autoStart && !hasQr && !isBooting && !isActive) {
          hideWhatsappQrPanel();
          return false;
        }
        await renderWhatsappQr(data?.qrRaw || "");
        ensureWhatsappQrPolling();
        return false;
      };

      const escapeHtml = (value) =>
        String(value ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");

      const uniqPositiveIds = (values = []) =>
        Array.from(
          new Set(
            (values || [])
              .map((value) => Number(value))
              .filter((value) => Number.isFinite(value) && value > 0),
          ),
        );

      const isSendableItem = (item = {}) => {
        const phone = String(item?.phone || "").trim();
        const rawPhone = String(item?.telefonoRaw || "").trim();
        return Boolean(phone && rawPhone) && item?.status !== "sent";
      };

      const getPendingTargetUserIds = (items = []) =>
        uniqPositiveIds(
          (items || [])
            .filter((item) => isSendableItem(item))
            .map((item) => item?.idUsuario),
        );

      const syncGeneratedState = (items = [], sendableCount = null) => {
        generatedItems = Array.isArray(items) ? items : [];
        const calculated = generatedItems.filter((item) => isSendableItem(item)).length;
        generatedSendableCount = Number.isFinite(Number(sendableCount))
          ? Number(sendableCount)
          : calculated;
      };

      const updateSendButtonState = ({ sending = false } = {}) => {
        if (!btnEnviarMensajes) return;
        const visible = generatedItems.some((item) => item?.status !== "sent");
        btnEnviarMensajes.hidden = !visible;
        btnEnviarMensajes.disabled = sending || generatedSendableCount <= 0;
      };

      const getStatusMeta = (item = {}) => {
        switch (item.status) {
          case "sent":
            return { label: "Enviado", badgeClass: "is-sent", cardClass: "" };
          case "failed":
            return { label: "Fallido", badgeClass: "is-failed", cardClass: "is-failed" };
          case "skipped_no_phone":
            return {
              label: "Sin teléfono",
              badgeClass: "is-skipped",
              cardClass: "is-skipped",
            };
          case "skipped_invalid_phone":
            return {
              label: "Teléfono inválido",
              badgeClass: "is-skipped",
              cardClass: "is-skipped",
            };
          case "pending":
            return {
              label: "Pendiente",
              badgeClass: "is-pending",
              cardClass: "is-pending",
            };
          default:
            return { label: "Pendiente", badgeClass: "is-pending", cardClass: "is-pending" };
        }
      };

      const getItemReason = (item = {}) => {
        if (item.error) return String(item.error);
        if (item.status === "skipped_no_phone") return "Cliente sin teléfono registrado";
        if (item.status === "skipped_invalid_phone") {
          return `Teléfono inválido: ${item.telefonoRaw || "sin valor"}`;
        }
        if (item.status === "pending") return "Pendiente de envío manual";
        return "No se pudo enviar el recordatorio";
      };

      const renderCards = (items = []) => {
        if (!resultsEl) return;
        if (!items.length) {
          resultsEl.innerHTML = "";
          return;
        }
        resultsEl.innerHTML = items
          .map((item) => {
            const statusMeta = getStatusMeta(item);
            const servicios = Array.isArray(item?.servicios)
              ? item.servicios.map((servicio) => escapeHtml(servicio)).join(", ")
              : "";
            const ventas = Array.isArray(item?.ventaIds)
              ? item.ventaIds.map((ventaId) => `#${ventaId}`).join(", ")
              : "";
            const motivo = item.error
              ? `<p><strong>Motivo:</strong> ${escapeHtml(getItemReason(item))}</p>`
              : "";
            return `
              <button
                class="rec-card ${statusMeta.cardClass}"
                type="button"
                data-copy="${encodeURIComponent(item.plain || "")}"
              >
                <div class="rec-card-head">
                  <h4>${escapeHtml(item.cliente || "Cliente")}</h4>
                  <span class="rec-badge ${statusMeta.badgeClass}">${statusMeta.label}</span>
                </div>
                <p><strong>Teléfono:</strong> ${escapeHtml(item.telefonoRaw || "-")}</p>
                <p><strong>Servicios:</strong> ${servicios || "-"}</p>
                <p><strong>Ventas:</strong> ${escapeHtml(ventas || "-")}</p>
                ${motivo}
                <pre>${escapeHtml(item.plain || "")}</pre>
              </button>
            `
          })
          .join("");
        resultsEl.querySelectorAll(".rec-card").forEach((btn) => {
          btn.addEventListener("click", async () => {
            const txt = btn.dataset.copy ? decodeURIComponent(btn.dataset.copy) : "";
            if (!txt) return;
            try {
              await copyToClipboard(txt);
              setStatus("Mensaje copiado.");
            } catch (err) {
              console.error("copiar recordatorios error", err);
              setStatus("No se pudo copiar el mensaje.");
            }
          });
        });
      };

      const renderLog = (items = []) => {
        if (!logEl || !logListEl) return;
        const unsentItems = items.filter((item) => item?.status !== "sent");
        if (!unsentItems.length) {
          logEl.hidden = true;
          logListEl.innerHTML = "";
          return;
        }

        logListEl.innerHTML = unsentItems
          .map((item) => {
            const servicios = Array.isArray(item?.servicios)
              ? item.servicios.map((servicio) => escapeHtml(servicio)).join(", ")
              : "-";
            const ventas = Array.isArray(item?.ventaIds)
              ? item.ventaIds.map((ventaId) => `#${ventaId}`).join(", ")
              : "-";
            return `
              <article class="rec-log-item">
                <p><strong>Cliente:</strong> ${escapeHtml(item.cliente || "Cliente")}</p>
                <p><strong>Servicios:</strong> ${servicios || "-"}</p>
                <p><strong>Ventas:</strong> ${escapeHtml(ventas || "-")}</p>
                <p><strong>Teléfono:</strong> ${escapeHtml(item.telefonoRaw || "-")}</p>
                <p><strong>Motivo:</strong> ${escapeHtml(getItemReason(item))}</p>
              </article>
            `;
          })
          .join("");
        logEl.hidden = false;
      };

      const applyGlobalPendingReason = (items = [], reason = "") =>
        (items || []).map((item) => {
          if (item?.status === "sent") return item;
          if (
            item?.status === "skipped_no_phone" ||
            item?.status === "skipped_invalid_phone"
          ) {
            return {
              ...item,
              error: item?.error || getItemReason(item),
            };
          }
          return {
            ...item,
            status: "pending",
            error: String(reason || item?.error || "Pendiente de envío manual"),
          };
        });

      const renderGeneratedState = (items = [], sendableCount = null) => {
        syncGeneratedState(items, sendableCount);
        renderCards(generatedItems);
        renderLog(generatedItems);
        updateSendButtonState();
      };

      const loadRecordatorios = async () => {
        setStatus("Generando recordatorios faltantes...");
        hideWhatsappQrPanel();
        resultsEl.innerHTML = "";
        renderLog([]);
        syncGeneratedState([], 0);
        updateSendButtonState();
        if (btnGenerarRecordatorios) btnGenerarRecordatorios.disabled = true;
        if (btnEnviarMensajes) btnEnviarMensajes.disabled = true;
        try {
          if (pendingPreviewEndpointAvailable) {
            try {
              const preview = await fetchJson("/api/whatsapp/recordatorios/pendientes");
              const pendingItems = Array.isArray(preview?.items) ? preview.items : [];
              renderGeneratedState(pendingItems, preview?.sendable);
              if (!pendingItems.length) {
                setStatus("No hay recordatorios faltantes por enviar.");
                return;
              }
              if (Number(preview?.sendable || 0) > 0) {
                setStatus(
                  `Se generaron ${pendingItems.length} recordatorio(s). Presiona "Enviar mensajes" para abrir el bot en Hetzner y despachar los pendientes.`,
                );
              } else {
                setStatus(
                  "Se generaron recordatorios, pero ninguno es enviable por WhatsApp con los datos actuales.",
                  true,
                );
              }
              return;
            } catch (previewErr) {
              if (previewErr?.status === 404) {
                pendingPreviewEndpointAvailable = false;
                console.warn(
                  "recordatorios pendientes preview endpoint not available, fallback to batch send",
                  previewErr,
                );
              } else {
                throw previewErr;
              }
            }
          }
          throw new Error(
            'El backend actual no expone /api/whatsapp/recordatorios/pendientes. Reinicia el servidor antes de generar.',
          );
        } catch (err) {
          console.error("recordatorios generar error", err);
          setStatus(err?.message || "No se pudieron generar los recordatorios.", true);
        } finally {
          if (btnGenerarRecordatorios) btnGenerarRecordatorios.disabled = false;
          updateSendButtonState();
        }
      };

      const sendGeneratedMessages = async () => {
        hideWhatsappQrPanel();
        const targetUserIds = getPendingTargetUserIds(generatedItems);
        if (!targetUserIds.length) {
          setStatus("No hay mensajes pendientes enviables.", true);
          updateSendButtonState();
          return;
        }

        if (btnGenerarRecordatorios) btnGenerarRecordatorios.disabled = true;
        updateSendButtonState({ sending: true });
        setStatus("Verificando sesión de WhatsApp en Hetzner...");

        try {
          const whatsappReady = await fetchAndRenderWhatsappQr({ autoStart: true });
          if (!whatsappReady) {
            setStatus(
              "WhatsApp no tiene sesión iniciada. Escanea el QR y luego presiona \"Enviar mensajes\" nuevamente.",
              true,
            );
            return;
          }

          setStatus("WhatsApp listo. Enviando mensajes...");
          const result = await fetchJson("/api/whatsapp/recordatorios/enviar", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              targetUserIds,
              startClient: true,
              shutdownClientAfter: true,
            }),
          });
          const items = Array.isArray(result?.items) ? result.items : [];
          renderGeneratedState(items);
          const secondCutoffSent = Number(result?.cutoffToday?.sent || 0);
          const secondCutoffTotal = Number(result?.cutoffToday?.total || 0);
          const secondCutoffText =
            secondCutoffTotal > 0
              ? ` Segundo recordatorio día de corte: ${secondCutoffSent}/${secondCutoffTotal}.`
              : "";
          setStatus(
            `Proceso completado. Enviados: ${result.sent || 0}, sin teléfono: ${result.skippedNoPhone || 0}, teléfonos inválidos: ${result.skippedInvalidPhone || 0}, fallidos: ${result.failed || 0}, ventas marcadas: ${result.updatedVentas || 0}.${secondCutoffText}`,
            Number(result?.failed || 0) > 0,
          );
        } catch (err) {
          console.error("recordatorios enviar error", err);
          const errText = String(err?.message || err?.body?.error || "").toLowerCase();
          const isWhatsappNotReady =
            Number(err?.status || 0) === 503 &&
            (errText.includes("whatsapp") || errText.includes("qr"));
          if (isWhatsappNotReady) {
            try {
              await fetchAndRenderWhatsappQr({ autoStart: true });
            } catch (qrErr) {
              console.error("whatsapp qr fetch error", qrErr);
            }
          }
          const bodyItems = Array.isArray(err?.body?.items) ? err.body.items : [];
          const fallbackItems = bodyItems.length
            ? bodyItems
            : applyGlobalPendingReason(generatedItems, err?.message || "No se pudo enviar");
          renderGeneratedState(fallbackItems);
          setStatus(err?.message || "No se pudieron enviar los recordatorios.", true);
        } finally {
          if (btnGenerarRecordatorios) btnGenerarRecordatorios.disabled = false;
          updateSendButtonState();
        }
      };

      btnGenerarRecordatorios?.addEventListener("click", loadRecordatorios);
      btnEnviarMensajes?.addEventListener("click", sendGeneratedMessages);

      fetchAndRenderWhatsappQr({ autoStart: false }).catch(() => {});
    </script>
  </body>
</html>
