<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pedidos pendientes</title>
    <link rel="stylesheet" href="../../styles/styles.css" />
    <style>
      .copyable {
        cursor: pointer;
      }
      .copy-toast {
        position: fixed;
        top: 86px;
        right: 24px;
        background: #111;
        color: #fff;
        padding: 10px 14px;
        border-radius: 8px;
        font-size: 13px;
        z-index: 2000;
        opacity: 0;
        transform: translateY(-6px);
        transition: opacity 0.2s ease, transform 0.2s ease;
        pointer-events: none;
      }
      .copy-toast.show {
        opacity: 1;
        transform: translateY(0);
      }
      .madre-bar {
        background: #f3f4f6;
        border: 2px solid #cbd5e1;
        border-bottom: none;
        border-radius: 10px 10px 0 0;
        padding: 12px 16px;
        margin: 8px 0 -6px;
        position: relative;
      }
      .madre-bar .copyable {
        font-weight: 600;
      }
      .madre-region {
        margin: 0 0 6px;
        font-size: 18px;
        font-weight: 800;
        color: #111827;
      }
      .correo-edit-wrap {
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }
      .correo-edit-wrap .btn-edit-correo,
      .correo-edit-wrap .btn-save-correo,
      .correo-edit-wrap .btn-edit-clave,
      .correo-edit-wrap .btn-save-clave,
      .correo-edit-wrap .btn-edit-link-madre,
      .correo-edit-wrap .btn-save-link-madre {
        padding: 4px 6px;
        font-size: 12px;

      }
      .correo-edit-wrap input {
        min-width: 180px;
      }
      .tipo-cell {
        text-align: center;
        font-weight: 700;
        padding: 6px 10px;
      }
      .tipo-nueva {
        background: #dcfce7;
        color: #166534;
      }
      .tipo-existe {
        background: #dbeafe;
        color: #1e3a8a;
      }
      .tipo-reportado {
        background: #fee2e2;
        color: #991b1b;
      }
      .tipo-pantalla {
        background: #e0e7ff;
        color: #312e81;
      }
      .tipo-acceso {
        background: #fef3c7;
        color: #92400e;
      }
      .tipo-cuenta-completa {
        background: #dcfce7;
        color: #166534;
      }
      .pedido-asignado {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 7px 10px;
        border-radius: 999px;
        background: #dcfce7;
        color: #166534;
        font-weight: 800;
        font-size: 12px;
        line-height: 1;
      }
      .btn-tomar-pedido[disabled] {
        opacity: 0.7;
        cursor: not-allowed;
      }
      .modal-activar-body {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .modal-activar-title {
        margin: 0;
        font-size: 18px;
        font-weight: 800;
        color: #111827;
      }
      .modal-activar-row {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .modal-activar-row label {
        font-weight: 700;
      }
      .modal-activar-row .input-wrap {
        position: relative;
      }
      .modal-activar-row input {
        width: 100%;
        box-sizing: border-box;
      }
      .modal-activar-prov {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 8px;

      .modal-activar-prov .btn-outline {

      }
      .modal-activar-sugerencias {
        position: absolute;
        top: 100%;
        left: 0;
        right: 0;
        background: #fff;
        border: 1px solid #ddd;
        border-radius: 10px;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
        overflow: hidden;
        z-index: 30;
        margin-top: 6px;
      }
      .modal-activar-sugerencias.hidden {
        display: none;
      }
      .modal-activar-sugerencias button {
        width: 100%;
        border: none;
        background: transparent;
        text-align: left;
        padding: 10px 12px;
        border-bottom: 1px solid #f0f0f0;
        cursor: pointer;
      }
      .modal-activar-sugerencias button:last-child {
        border-bottom: none;
      }
      .modal-activar-sugerencias button:hover {

      }
      .modal-activar-actions {
        display: flex;

      .badge-processing {

      }
      .pp-platform-title {
        display: inline-block;
        margin: 0;
        font-size: clamp(1.9rem, 4vw, 2.6rem);

      }
      .pp-platform-title.is-link {
        text-decoration: none;
      }
      .pp-platform-title.is-link:hover {
        text-decoration: underline;
      }
      .madre-switch-wrap {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        position: relative;
      }
      .table-base td.pp-acciones-cell {
        position: relative;
        overflow: visible;
        white-space: normal;
      }
      .cuenta-table-wrap {
        overflow-y: visible;
      }
      .cuenta-table-wrap .table-base {
        overflow: visible;
      }
      .btn-toggle-madres {
        min-width: 30px;
        padding: 6px 8px;
        font-weight: 700;
      }
      .madre-options {
        position: fixed;
        top: 0;
        left: 0;
        min-width: 280px;
        max-width: min(420px, calc(100vw - 12px));
        max-height: 260px;
        overflow-y: auto;
        z-index: 2147483647;
        background: #fff;
        border: 1px solid #d1d5db;
        border-radius: 8px;
        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.12);
      }
      .madre-options.hidden {
        display: none;
      }
      .madre-option-item {
        width: 100%;
        border: 0;
        border-bottom: 1px solid #eef2f7;
        background: #fff;
        text-align: left;
        padding: 9px 10px;
        cursor: pointer;
        font-size: 13px;
        line-height: 1.25;
      }
      .madre-option-item:last-child {
        border-bottom: 0;
      }
      .madre-option-item:hover,
      .madre-option-item:focus-visible {
        background: #f3f4f6;
      }
      .madre-option-empty {
        padding: 9px 10px;
        font-size: 13px;
        color: #6b7280;
      }
    </style>
  </head>
  <body>
    <div id="app-header" data-header-root="../../" data-header-pages="../"></div>
    <script src="../../scripts/header-loader.js"></script>

    <main class="categorias-dinamicas">
      <h2>Pedidos pendientes</h2>
      <p id="pp-status" class="status">Cargando pedidos...</p>
      <div id="pp-tablas"></div>
    </main>
    <div id="copy-toast" class="copy-toast">Copiado al portapapeles</div>
    <div id="modal-activar-servicio" class="modal hidden">
      <div class="modal-backdrop"></div>
      <div class="modal-card modal-card-sol">
        <button type="button" class="modal-close" id="modal-activar-close" aria-label="Cerrar">×</button>
        <div class="modal-activar-body">
          <h3 class="modal-activar-title">Activar servicio</h3>
          <div class="modal-activar-row">
            <label for="input-activar-costo">¿Costo para activar el servicio?</label>
            <input
              id="input-activar-costo"
              class="form-input"
              type="number"
              min="0"
              step="0.01"
              inputmode="decimal"
              placeholder="0.00"
            />
          </div>
          <div class="modal-activar-row">
            <label for="input-activar-proveedor">Proveedor</label>
            <div class="modal-activar-prov">
              <div class="input-wrap">
                <input
                  id="input-activar-proveedor"
                  class="form-input"
                  type="search"
                  placeholder="Buscar proveedor por nombre"
                  autocomplete="off"
                />
                <div id="activar-prov-sugerencias" class="modal-activar-sugerencias hidden"></div>
              </div>
              <button type="button" id="btn-activar-add-proveedor" class="btn-outline" title="Registrar proveedor">+</button>
            </div>
          </div>
          <p id="activar-modal-status" class="status"></p>
          <div class="modal-activar-actions">
            <button type="button" id="btn-activar-cancelar" class="btn-outline">Cancelar</button>
            <button type="button" id="btn-activar-entregar" class="btn-primary">Entregar servicio</button>
          </div>
        </div>
      </div>
    </div>

    <script type="module">
      import {
        supabase,
        loadCurrentUser,
        clearServerSession,
        entregarGiftCardPendiente,
        notifyVentaDeliveredWhatsapp,
        notifyReporteSolvedWhatsapp,
      } from "../../scripts/api.js";
      import { requireSession, attachLogout, attachLogoHome } from "../../scripts/session.js";
      import { formatDDMMYYYY } from "../../scripts/date-format.js";
      import { buildNotificationPayload } from "../../scripts/notification-templates.js";
      import { buildServiceCopyText } from "../../scripts/copy-format.js";
      import { copyTextNotify } from "../../scripts/copy-toast.js";

      requireSession();
      attachLogoHome();
      attachLogout(clearServerSession);

      const statusEl = document.querySelector("#pp-status");
      const tablasEl = document.querySelector("#pp-tablas");
      const modalActivarEl = document.querySelector("#modal-activar-servicio");
      const modalActivarCloseBtn = document.querySelector("#modal-activar-close");
      const modalActivarCancelarBtn = document.querySelector("#btn-activar-cancelar");
      const modalActivarEntregarBtn = document.querySelector("#btn-activar-entregar");
      const modalActivarCostoInput = document.querySelector("#input-activar-costo");
      const modalActivarCostoLabel = document.querySelector('label[for="input-activar-costo"]');
      const modalActivarProveedorInput = document.querySelector("#input-activar-proveedor");
      const modalActivarProvSugs = document.querySelector("#activar-prov-sugerencias");
      const modalActivarAddProveedorBtn = document.querySelector("#btn-activar-add-proveedor");
      const modalActivarStatusEl = document.querySelector("#activar-modal-status");
      const modalActivarTitleEl = document.querySelector(".modal-activar-title");

      let currentUser = null;
      let pendingEntregaBtn = null;
      let proveedorSeleccionadoId = null;
      let proveedoresSugeridos = [];
      let proveedorFetchCounter = 0;
      let reemplazosCache = null;
      let reemplazosCachePromise = null;
      const MADRE_DEBUG = true;
      const logMadreDebug = (...args) => {
        if (!MADRE_DEBUG) return;
        console.log("[madres-debug]", ...args);
      };

      const setStatus = (msg) => {
        if (statusEl) statusEl.textContent = msg || "";
      };
      const setModalStatus = (msg) => {
        if (modalActivarStatusEl) modalActivarStatusEl.textContent = msg || "";
      };
      const isTrue = (v) => v === true || v === 1 || v === "1" || v === "true" || v === "t";
      const hasPerfilId = (val) => Number.isFinite(Number(val)) && Number(val) > 0;
      const escapeHtml = (value) =>
        String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      const toExternalHref = (value) => {
        const raw = String(value || "").trim();
        if (!raw) return "";
        if (/^https?:\/\//i.test(raw)) return raw;
        if (/^[a-z]+:\/\//i.test(raw)) return "";
        return `https://${raw}`;
      };
      const toPositiveId = (value) => {
        const parsed = Number(value);
        if (!Number.isFinite(parsed) || parsed <= 0) return null;
        return Math.trunc(parsed);
      };
      const normalizeCredentialValue = (value) => {
        const raw = String(value || "").trim();
        if (!raw) return "";
        const lower = raw.toLowerCase();
        if (raw === "-" || lower === "null" || lower === "undefined") return "";
        return raw;
      };
      const getCaracasDateISO = () => toYMD(getVenezuelaToday());
      const normalizeForCompare = (value) => String(value || "").trim().toLowerCase();
      const resolveVentaCredentialTarget = async ({ idVenta = null, rowEl = null } = {}) => {
        const ventaId = toPositiveId(idVenta);
        if (!ventaId) {
          return {
            idVenta: null,
            idCuenta: null,
            idCuentaMiembro: null,
            idCuentaMadre: null,
            idUsuario: null,
            plataforma: "",
          };
        }

        const entregarBtn = rowEl?.querySelector?.(".btn-entregar") || null;
        let idCuentaMiembro = toPositiveId(entregarBtn?.dataset?.idCuentaMiembro);
        let idCuentaMadre = toPositiveId(entregarBtn?.dataset?.idCuenta);
        let idCuenta = idCuentaMiembro || idCuentaMadre;
        let idUsuario = toPositiveId(entregarBtn?.dataset?.usuario);
        let plataforma = String(entregarBtn?.dataset?.plataforma || "").trim();

        if (idCuenta && idUsuario && plataforma) {
          return { idVenta: ventaId, idCuenta, idCuentaMiembro, idCuentaMadre, idUsuario, plataforma };
        }

        const { data: ventaRow, error: ventaErr } = await supabase
          .from("ventas")
          .select(
            "id_venta, id_usuario, id_cuenta, id_cuenta_miembro, precios:precios(id_plataforma, plataformas:plataformas(nombre))",
          )
          .eq("id_venta", ventaId)
          .maybeSingle();
        if (ventaErr) throw ventaErr;
        if (!ventaRow?.id_venta) {
          return {
            idVenta: ventaId,
            idCuenta: idCuenta || null,
            idCuentaMiembro: idCuentaMiembro || null,
            idCuentaMadre: idCuentaMadre || null,
            idUsuario: idUsuario || null,
            plataforma,
          };
        }

        if (!idCuentaMiembro) idCuentaMiembro = toPositiveId(ventaRow?.id_cuenta_miembro);
        if (!idCuentaMadre) idCuentaMadre = toPositiveId(ventaRow?.id_cuenta);
        if (!idCuenta) idCuenta = idCuentaMiembro || idCuentaMadre;
        if (!idUsuario) {
          idUsuario = toPositiveId(ventaRow?.id_usuario);
        }
        if (!plataforma) {
          const precioRow = Array.isArray(ventaRow?.precios)
            ? ventaRow.precios[0] || null
            : ventaRow?.precios || null;
          const plataformaRow = Array.isArray(precioRow?.plataformas)
            ? precioRow.plataformas[0] || null
            : precioRow?.plataformas || null;
          plataforma = String(plataformaRow?.nombre || "").trim();
        }

        return {
          idVenta: ventaId,
          idCuenta: idCuenta || null,
          idCuentaMiembro: idCuentaMiembro || null,
          idCuentaMadre: idCuentaMadre || null,
          idUsuario: idUsuario || null,
          plataforma,
        };
      };
      const notifyCorreoCambioCliente = async ({
        idUsuario = null,
        idCuenta = null,
        idVenta = null,
        plataforma = "",
        correoAnterior = "",
        correoNuevo = "",
      } = {}) => {
        const userId = toPositiveId(idUsuario);
        if (!userId) return;
        const oldCorreo = String(correoAnterior || "").trim();
        const newCorreo = String(correoNuevo || "").trim();
        if (!oldCorreo || !newCorreo || normalizeForCompare(oldCorreo) === normalizeForCompare(newCorreo)) {
          return;
        }
        const platformText = escapeHtml(plataforma || "tu servicio");
        const oldCorreoSafe = escapeHtml(oldCorreo);
        const newCorreoSafe = escapeHtml(newCorreo);
        const payload = {
          titulo: "Correo actualizado",
          mensaje: `Tu servicio de <strong>${platformText}</strong> cambió de ${oldCorreoSafe} a ${newCorreoSafe}.`,
          fecha: getCaracasDateISO(),
          leido: false,
          id_usuario: userId,
          id_cuenta: toPositiveId(idCuenta),
        };
        const { error } = await supabase.from("notificaciones").insert(payload);
        if (error) throw error;
      };
      const loadReemplazosBloqueados = async (force = false) => {
        if (force) {
          reemplazosCache = null;
          reemplazosCachePromise = null;
        }
        if (reemplazosCache) return { data: reemplazosCache };
        if (!reemplazosCachePromise) {
          reemplazosCachePromise = supabase
            .from("reemplazos")
            .select("id_cuenta, id_perfil")
            .then(({ data, error }) => {
              if (error) throw error;
              const cuentas = new Set();
              const perfiles = new Set();
              (data || []).forEach((row) => {
                const cuentaId = toPositiveId(row?.id_cuenta);
                const perfilId = toPositiveId(row?.id_perfil);
                if (cuentaId) cuentas.add(cuentaId);
                if (perfilId) perfiles.add(perfilId);
              });
              reemplazosCache = { cuentas, perfiles };
              return reemplazosCache;
            })
            .finally(() => {
              reemplazosCachePromise = null;
            });
        }
        try {
          const data = await reemplazosCachePromise;
          return { data };
        } catch (error) {
          return { error };
        }
      };
      const pickPerfilMadreByPriority = (profiles = [], bloqueados = { cuentas: new Set(), perfiles: new Set() }) => {
        const groups = new Map();
        (profiles || []).forEach((perfil) => {
          const perfilId = toPositiveId(perfil?.id_perfil);
          const cuentaId = toPositiveId(perfil?.id_cuenta);
          if (!perfilId || !cuentaId) return;
          if (bloqueados?.perfiles?.has(perfilId)) return;
          if (bloqueados?.cuentas?.has(cuentaId)) return;
          if (!groups.has(cuentaId)) groups.set(cuentaId, []);
          groups.get(cuentaId).push(perfil);
        });
        if (!groups.size) return null;

        groups.forEach((list) => {
          list.sort((a, b) => {
            const na = Number.isFinite(Number(a?.n_perfil)) ? Number(a.n_perfil) : Number.MAX_SAFE_INTEGER;
            const nb = Number.isFinite(Number(b?.n_perfil)) ? Number(b.n_perfil) : Number.MAX_SAFE_INTEGER;
            if (na !== nb) return na - nb;
            const ida = toPositiveId(a?.id_perfil) || Number.MAX_SAFE_INTEGER;
            const idb = toPositiveId(b?.id_perfil) || Number.MAX_SAFE_INTEGER;
            return ida - idb;
          });
        });

        const orderedMotherIds = Array.from(groups.keys()).sort((a, b) => {
          const freeA = groups.get(a)?.length || 0;
          const freeB = groups.get(b)?.length || 0;
          if (freeA !== freeB) return freeA - freeB;
          return a - b;
        });
        const chosenMotherId = orderedMotherIds[0];
        const chosenProfile = groups.get(chosenMotherId)?.[0] || null;
        if (!chosenProfile?.id_perfil) return null;
        return chosenProfile;
      };
      const getVenezuelaToday = () => {
        const veDate = new Date().toLocaleDateString("en-CA", {
          timeZone: "America/Caracas",
        });
        const [y, m, d] = String(veDate).split("-").map(Number);
        if (!y || !m || !d) return new Date();
        return new Date(y, m - 1, d);
      };
      const addMonthsKeepDay = (baseDate, months) => {
        const d = new Date(baseDate.getFullYear(), baseDate.getMonth(), 1);
        const day = baseDate.getDate();
        d.setMonth(d.getMonth() + months);
        const lastDay = new Date(d.getFullYear(), d.getMonth() + 1, 0).getDate();
        d.setDate(Math.min(day, lastDay));
        return d;
      };
      const toYMD = (date) => {
        const y = date.getFullYear();
        const m = String(date.getMonth() + 1).padStart(2, "0");
        const d = String(date.getDate()).padStart(2, "0");
        return `${y}-${m}-${d}`;
      };
      const notifyVentaDeliveredWhatsappBestEffort = async (idVenta) => {
        const ventaId = toPositiveId(idVenta);
        if (!ventaId) return { sent: false, skipped: true, reason: "invalid_sale" };
        try {
          const waResult = await notifyVentaDeliveredWhatsapp(ventaId);
          if (waResult?.error) {
            console.warn("[pedidos_pendientes] whatsapp orden entregada error", {
              id_venta: ventaId,
              error: waResult.error,
              status: waResult.status || null,
            });
            return {
              sent: false,
              skipped: false,
              reason: "request_error",
              error: waResult.error,
            };
          }
          if (waResult?.sent) {
            return { sent: true, skipped: false, reason: null, ...waResult };
          }
          if (waResult?.ok === false) {
            console.warn("[pedidos_pendientes] whatsapp orden entregada skipped", {
              id_venta: ventaId,
              reason: waResult?.reason || "unknown",
            });
            return {
              sent: false,
              skipped: true,
              reason: waResult?.reason || "unknown",
              ...waResult,
            };
          }
          return { sent: true, skipped: false, reason: null, ...waResult };
        } catch (err) {
          const message = err?.message || String(err);
          console.warn("[pedidos_pendientes] whatsapp orden entregada exception", {
            id_venta: ventaId,
            error: message,
          });
          return {
            sent: false,
            skipped: false,
            reason: "exception",
            error: message,
          };
        }
      };
      const notifyReporteSolvedWhatsappBestEffort = async (idReporte) => {
        const reportId = toPositiveId(idReporte);
        if (!reportId) return { ok: false, skipped: true, reason: "invalid_report" };
        try {
          const waResult = await notifyReporteSolvedWhatsapp(reportId);
          if (waResult?.error) {
            console.warn("[pedidos_pendientes] whatsapp reporte solucionado error", {
              id_reporte: reportId,
              error: waResult.error,
              status: waResult.status || null,
            });
            return { ok: false, error: waResult.error, status: waResult.status || null };
          }
          if (waResult?.sent === true || waResult?.ok === true) {
            return { ok: true, sent: true };
          }
          return { ok: false, skipped: true, reason: waResult?.reason || "not_sent" };
        } catch (err) {
          const message = err?.message || String(err);
          console.warn("[pedidos_pendientes] whatsapp reporte solucionado exception", {
            id_reporte: reportId,
            error: message,
          });
          return { ok: false, error: message };
        }
      };
      const closeReportesByEntregadaReportada = async ({
        idVenta = null,
        idUsuario = null,
        idCuenta = null,
        idCuentaMiembro = null,
        idPerfil = null,
      } = {}) => {
        const ventaId = toPositiveId(idVenta);
        if (!ventaId) return [];
        const reportIds = new Set();
        const addReportIds = (rows = []) => {
          (rows || []).forEach((row) => {
            const idReporte = toPositiveId(row?.id_reporte);
            if (idReporte) reportIds.add(idReporte);
          });
        };

        const { data: byVentaRows, error: byVentaErr } = await supabase
          .from("reportes")
          .select("id_reporte")
          .eq("id_venta", ventaId)
          .eq("solucionado", false);
        if (byVentaErr) throw byVentaErr;
        addReportIds(byVentaRows);

        if (!reportIds.size) {
          const usuarioId = toPositiveId(idUsuario);
          const cuentaIds = [toPositiveId(idCuenta), toPositiveId(idCuentaMiembro)].filter(Boolean);
          const perfilIdNum = toPositiveId(idPerfil);
          if (usuarioId && cuentaIds.length) {
            let query = supabase
              .from("reportes")
              .select("id_reporte")
              .eq("id_usuario", usuarioId)
              .eq("solucionado", false);
            if (cuentaIds.length === 1) {
              query = query.eq("id_cuenta", cuentaIds[0]);
            } else {
              query = query.in("id_cuenta", cuentaIds);
            }
            if (perfilIdNum) {
              query = query.eq("id_perfil", perfilIdNum);
            }
            const { data: fallbackRows, error: fallbackErr } = await query;
            if (fallbackErr) throw fallbackErr;
            addReportIds(fallbackRows);
          }
        }

        const ids = Array.from(reportIds);
        if (!ids.length) return [];

        const { error: closeErr } = await supabase
          .from("reportes")
          .update({
            en_revision: false,
            solucionado: true,
            descripcion_solucion: "Servicio entregado desde pedidos pendientes",
          })
          .in("id_reporte", ids);
        if (closeErr) throw closeErr;

        const { error: ventaErr } = await supabase
          .from("ventas")
          .update({ reportado: false, aviso_admin: true })
          .eq("id_venta", ventaId);
        if (ventaErr) throw ventaErr;
        return ids;
      };

      const getPedidoAsignadoLabel = (venta = {}) => {

        if (!modalActivarProvSugs) return;

          hideProvSuggestions();
          return;
        }
        modalActivarProvSugs.innerHTML = items
          .map(
            (p) => `
              <button type="button" data-id="${p.id_proveedor}" data-nombre="${p.nombre || ""}">
                ${p.nombre || ""}
              </button>
            `
          )
          .join("");
        modalActivarProvSugs.classList.remove("hidden");
      };

      const buscarProveedoresActivacion = async (texto, hide = false) => {
        const term = (texto || "").trim();
        if (!term) {
          proveedoresSugeridos = [];
          renderProvSuggestions([], true);
          return;
        }
        const current = ++proveedorFetchCounter;
        try {
          const { data, error } = await supabase
            .from("proveedores")
            .select("id_proveedor, nombre")
            .ilike("nombre", `%${term}%`)
            .order("nombre", { ascending: true })
            .limit(6);
          if (current !== proveedorFetchCounter) return;
          if (error) throw error;
          proveedoresSugeridos = data || [];
          renderProvSuggestions(proveedoresSugeridos, hide);
        } catch (err) {
          console.error("buscar proveedores activacion error", err);
          proveedoresSugeridos = [];
          renderProvSuggestions([], true);
        }
      };

      const requiereCostoPorPrecioCompleta = (btn) => {
        if (!btn) return false;
        return isTrue(btn.dataset.precioCompleta);
      };

        setModalStatus("");
        if (modalActivarCostoInput) modalActivarCostoInput.value = "";
        if (modalActivarProveedorInput) modalActivarProveedorInput.value = "";

      const renderSection = (title, grouped) => {

                      }
                      <button class="btn-primary btn-entregar" title="Entregar servicio" aria-label="Entregar servicio" data-venta="${r.id_venta}" data-usuario="${r.id_usuario || ""}" data-plataforma="${r.plataforma || ""}" data-id-plataforma="${r.id_plataforma || ""}" data-id-precio="${r.id_precio || ""}" data-precio-completa="${r.precio_completa ? "true" : "false"}" data-correo="${r.correo || ""}" data-clave="${r.clave || ""}" data-fecha="${r.fecha_corte || ""}" data-perfil="${r.perfil || ""}" data-nperfil="${r.n_perfil || ""}" data-poracceso="${r.por_acceso ? "true" : "false"}" data-porpantalla="${r.por_pantalla ? "true" : "false"}" data-usapines="${r.usa_pines ? "true" : "false"}" data-tarjeta-regalo="${r.tarjeta_de_regalo ? "true" : "false"}" data-cuenta-madre="${r.cuenta_madre ? "true" : "false"}" data-completa="${r.completa ? "true" : "false"}" data-meses="${r.meses_contratados || ""}" data-id-cuenta="${r.id_cuenta || ""}" data-id-perfil="${r.id_perfil || ""}" data-id-cuenta-miembro="${r.id_cuenta_miembro || ""}" data-pendiente="${r.pendiente ? "true" : "false"}" data-reportado="${r.reportado ? "true" : "false"}" data-correo-cliente="${payload.correo_cliente ? "true" : "false"}">📤</button>

                  })
                  .join("");
                return `
                  ${madreBlock}
                  ${
                    usesMother
                      ? `<p class="status madre-stock-msg hidden" data-plat="${payload.id_plataforma || ""}">Sin stock de cuentas madres</p>`
                      : ""
                  }
                  <div class="cuenta-table-wrap">
                    <table class="table-base">
                      <thead>
                        <tr>

                              ? `<th>Venta</th>

                                 <th>Servicio solicitado</th>
                                 <th>Tipo</th>
                                 ${showValor ? "<th>Valor</th>" : ""}
                                 <th>Fecha de pedido</th>
                                 <th>Acción</th>`
                              : `<th>ID venta</th>
                                 <th>Cliente</th>
                                 <th>Servicio solicitado</th>
                                 <th>Tipo</th>
                                 ${showValor ? "<th>Valor</th>" : ""}
                                 <th>Correo</th>
                                 ${showClave ? "<th>Clave</th>" : ""}
                                 <th>Fecha de pedido</th>
                                 <th>Acción</th>`
                          }
                        </tr>
                      </thead>
                      <tbody>${body}</tbody>
                    </table>
                  </div>
                `;
              })
              .join("");
            return `
              <div class="proximas-bloque"${headerStyle}>
                <h3 class="proximas-title">
                  ${
                    platformHref
                      ? `<a class="pp-platform-title is-link" href="${escapeHtml(platformHref)}"${platformTitleStyle}>${platformName}</a>`
                      : `<span class="pp-platform-title"${platformTitleStyle}>${platformName}</span>`
                  }
                </h3>
                ${tablesHtml}
              </div>

          .join("");
        return `
          <div class="proximas-bloque">
            <h3 class="proximas-title">${title}</h3>
            ${content}

      const render = (grouped) => {
        if (!tablasEl) return;
        const entries = Object.entries(grouped);
        if (!entries.length) {
          setStatus("No hay pedidos pendientes.");
          tablasEl.innerHTML = "";
          return;
        }
        setStatus("");
        const groupedCompletas = {};
        const groupedIndividuales = {};
        entries.forEach(([platId, payload]) => {
          const groupsEntries = Object.entries(payload.groups || {});
          if (!groupsEntries.length) return;
          let hasCompletas = false;
          let hasIndividuales = false;
          const groupsCompletas = {};
          const groupsIndividuales = {};
          groupsEntries.forEach(([key, group]) => {
            const rows = group.rows || [];
            const rowsCompletas = rows.filter((r) => r.completa);
            const rowsInd = rows.filter((r) => !r.completa);
            if (rowsCompletas.length) {
              hasCompletas = true;
              groupsCompletas[key] = { ...group, rows: rowsCompletas };
            }
            if (rowsInd.length) {
              hasIndividuales = true;
              groupsIndividuales[key] = { ...group, rows: rowsInd };
            }
          });
          if (hasCompletas) {
            groupedCompletas[platId] = { ...payload, groups: groupsCompletas };
          }
          if (hasIndividuales) {
            groupedIndividuales[platId] = { ...payload, groups: groupsIndividuales };
          }
        });
        const sectionCompletas = renderSection("Cuentas completas", groupedCompletas);
        const sectionIndividuales = renderSection("Cuentas individuales", groupedIndividuales);
        tablasEl.innerHTML = [sectionCompletas, sectionIndividuales].filter(Boolean).join("");
      };

      const loadPendientes = async () => {
        try {
          const user = await loadCurrentUser();
          currentUser = user || null;
          if (!user) {
            setStatus("Usuario no autenticado.");
            return;
          }
            const { data: ventas, error } = await supabase
              .from("ventas")
              .select(
              "id_venta, id_usuario, id_precio, id_cuenta, id_cuenta_miembro, id_perfil, fecha_pago, fecha_corte, meses_contratados, pendiente, completa, reportado, cuenta_nueva, asignado_a, asignado:usuarios!ventas_asignado_a_fkey(nombre, apellido), correo_miembro, clave_miembro, precios:precios(id_plataforma, plan, valor_tarjeta_de_regalo), cuentas:cuentas!ventas_id_cuenta_fkey(id_plataforma, correo, clave, link_codigo, direccion, region), cuentas_miembro:cuentas!ventas_id_cuenta_miembro_fkey(id_cuenta, id_plataforma, correo, clave, link_codigo, direccion, region), perfiles:perfiles(n_perfil)"
              )
            .eq("pendiente", true)
            .order("id_venta", { ascending: false });
          if (error) throw error;

          if (!ventas?.length) {
            render({});
            return;
          }

          const precioIds = [...new Set(ventas.map((v) => v.id_precio).filter(Boolean))];
          const userIds = [...new Set(ventas.map((v) => v.id_usuario).filter(Boolean))];

          let precioMap = {};
          if (precioIds.length) {
            const { data: precios, error: pErr } = await supabase
              .from("precios")
              .select("id_precio, id_plataforma, plan, completa, valor_tarjeta_de_regalo")
              .in("id_precio", precioIds);
            if (pErr) throw pErr;
            precioMap = (precios || []).reduce((acc, p) => {
              acc[p.id_precio] = p;
              return acc;
            }, {});
          }

          let userMap = {};
          if (userIds.length) {
            const { data: usuarios, error: uErr } = await supabase
              .from("usuarios")
              .select("id_usuario, nombre, apellido")
              .in("id_usuario", userIds);
            if (uErr) throw uErr;
            userMap = (usuarios || []).reduce((acc, u) => {
              const full = [u.nombre, u.apellido].filter(Boolean).join(" ").trim();
              acc[u.id_usuario] = full || `Usuario ${u.id_usuario}`;
              return acc;
            }, {});
          }

          let platMap = {};
          const platIds = [
            ...new Set(
              ventas
                .map((v) => v.precios?.id_plataforma || v.cuentas?.id_plataforma || precioMap[v.id_precio]?.id_plataforma)
                .filter(Boolean)
            ),
          ];
          if (platIds.length) {
            const { data: plats, error: platErr } = await supabase
              .from("plataformas")
              .select(
                "id_plataforma, nombre, color_1, link_pagina, entrega_inmediata, correo_cliente, clave_cliente, cuenta_madre, por_pantalla, por_acceso, usa_pines, tarjeta_de_regalo",
              )
              .in("id_plataforma", platIds);
            if (platErr) throw platErr;
            platMap = (plats || []).reduce((acc, p) => {
              acc[p.id_plataforma] = p;
              return acc;
            }, {});
          }

          const grouped = {};
          (ventas || []).forEach((v) => {
            const precio = precioMap[v.id_precio] || v.precios || {};
            const platId = precio.id_plataforma || v.cuentas?.id_plataforma;
            const platInfo = platMap[platId] || {};
            const platName =
              platInfo.nombre || `Plataforma ${platId || "-"}`;
            const cliente = userMap[v.id_usuario] || "-";
            const servicio = precio.plan ? `${platName} - ${precio.plan}` : platName;
            const isCompleta =
              v.completa === true || v.completa === "true" || v.completa === 1 || v.completa === "1";
            const isPlat11 = Number(platId) === 11;
            if (!grouped[platId])
              grouped[platId] = {
                id_plataforma: platId,
                nombre: platName,
                entrega_inmediata:
                  platInfo.entrega_inmediata === true ||
                  platInfo.entrega_inmediata === "true" ||
                  platInfo.entrega_inmediata === "1",
                correo_cliente:
                  platInfo.correo_cliente === true ||
                  platInfo.correo_cliente === "true" ||
                  platInfo.correo_cliente === "1",
                clave_cliente:
                  platInfo.clave_cliente === true ||
                  platInfo.clave_cliente === "true" ||
                  platInfo.clave_cliente === "1",
                cuenta_madre:
                  platInfo.cuenta_madre === true ||
                  platInfo.cuenta_madre === "true" ||
                  platInfo.cuenta_madre === "1",
                por_acceso:
                  platInfo.por_acceso === true ||
                  platInfo.por_acceso === "true" ||
                  platInfo.por_acceso === "1",
                por_pantalla:
                  platInfo.por_pantalla === true ||
                  platInfo.por_pantalla === "true" ||
                  platInfo.por_pantalla === "1",
                usa_pines:
                  platInfo.usa_pines === true ||
                  platInfo.usa_pines === "true" ||
                  platInfo.usa_pines === "1",
                tarjeta_de_regalo:
                  platInfo.tarjeta_de_regalo === true ||
                  platInfo.tarjeta_de_regalo === "true" ||
                  platInfo.tarjeta_de_regalo === "1",
                groups: {},
                color_1: platInfo.color_1 || null,
                link_pagina: platInfo.link_pagina || "",
              };
            const motherId = isCompleta ? "sin-madre" : v.id_cuenta || "sin-madre";
            if (!grouped[platId].groups[motherId]) {
              grouped[platId].groups[motherId] = {
                cuenta_info: !isCompleta && v.cuentas
                  ? {
                      id_cuenta: v.id_cuenta || "",
                      correo: v.cuentas?.correo || "",
                      clave: v.cuentas?.clave || "",
                      link: v.cuentas?.link_codigo || "",
                      direccion: v.cuentas?.direccion || "",
                      region: v.cuentas?.region || "",
                    }
                  : null,
                rows: [],
              };
            }
            const cuentaMiembro = v.cuentas_miembro || null;
            const cuentaConCredenciales = cuentaMiembro || v.cuentas || null;
            grouped[platId].groups[motherId].rows.push({
              id_venta: v.id_venta,
              cliente,
              id_usuario: v.id_usuario,
              id_precio: v.id_precio || null,
              precio_completa: isTrue(precio?.completa),
              fecha_pago: v.fecha_pago || "-",
              servicio,
              valor_tarjeta_de_regalo: precio.valor_tarjeta_de_regalo ?? null,
              cuenta_nueva: v.cuenta_nueva,
              correo: v.correo_miembro || cuentaConCredenciales?.correo || "-",
              clave: v.clave_miembro || cuentaConCredenciales?.clave || "-",
              plataforma: platName,
              fecha_corte: v.fecha_corte || "",
              perfil: v.perfiles?.n_perfil ? `M${v.perfiles.n_perfil}` : "",
              n_perfil: v.perfiles?.n_perfil || null,
              id_plataforma: platId,
              cuenta_madre: grouped[platId].cuenta_madre && !isCompleta && !isPlat11,
              completa: isCompleta,
              por_acceso: grouped[platId].por_acceso,
              por_pantalla: grouped[platId].por_pantalla,
              usa_pines: grouped[platId].usa_pines,
              tarjeta_de_regalo: grouped[platId].tarjeta_de_regalo,
              meses_contratados: v.meses_contratados || 1,
              id_cuenta: v.id_cuenta || null,
              id_cuenta_miembro: v.id_cuenta_miembro || null,
              id_perfil: v.id_perfil || null,
              reportado: v.reportado === true,
              asignado_a: v.asignado_a || null,
              asignado: v.asignado || null,
            });
          });

          render(grouped);
        } catch (err) {
          console.error("pedidos pendientes error", err);
          setStatus("No se pudieron cargar los pedidos.");
        }
      };

      const handleEntregarServicio = async (btn, activationData = null) => {
        const idVenta = btn?.dataset?.venta;
        const idUsuario = btn?.dataset?.usuario;
        const plataforma = btn?.dataset?.plataforma || "";
        const idPlataforma = btn?.dataset?.idPlataforma || "";
        const isGiftCard = btn?.dataset?.tarjetaRegalo === "true";
        const correoCuenta = normalizeCredentialValue(btn?.dataset?.correo || "");
        const claveCuenta = normalizeCredentialValue(btn?.dataset?.clave || "");
        const fechaCorteRaw = (btn?.dataset?.fecha || "").trim();
        const ventaSinFechaCorte = !fechaCorteRaw;
        const perfil = btn?.dataset?.perfil || "";
        const nPerfil = btn?.dataset?.nperfil || "";
        const porAcceso = btn?.dataset?.poracceso === "true";
        const porPantalla = btn?.dataset?.porpantalla === "true";
        const usaPines = btn?.dataset?.usapines === "true";
        const existingMadreId = btn?.dataset?.idCuenta || "";
        const existingCuentaMiembroId = btn?.dataset?.idCuentaMiembro || "";
        const existingPerfilId = btn?.dataset?.idPerfil || "";
        const isCompleta = btn?.dataset?.completa === "true";
        const mesesContratados = Number(btn?.dataset?.meses || 1);
        const costoActivacion = Number(activationData?.costo);
        const proveedorId = Number(activationData?.idProveedor);
        const idPlataformaNum = Number(idPlataforma);
        const hasIdPlataforma = Number.isFinite(idPlataformaNum) && idPlataformaNum > 0;
        const forceCuentaCompleta = isCompleta || idPlataformaNum === 11;
        const wasReportado = btn?.dataset?.reportado === "true";
        const wasPendiente = btn?.dataset?.pendiente !== "false";
        const cuentaMadreFlag =
          btn?.dataset?.cuentaMadre === "true" && !isCompleta && !forceCuentaCompleta;
        const requireMadreActiva = idPlataformaNum === 9;
        if (!idVenta) return;
        if (isGiftCard) {
          const resp = await entregarGiftCardPendiente(idVenta);
          if (resp?.error) {
            throw new Error(resp.error);
          }
          const pinValue = String(resp?.pin || "Pendiente").trim() || "Pendiente";
          const status = document.createElement("span");
          status.className = "badge badge-processing";
          status.textContent = "Servicio procesandose";
          const pinBadge = document.createElement("span");
          pinBadge.className = "badge copyable";
          pinBadge.dataset.clipboard = pinValue;
          pinBadge.textContent = `PIN: ${pinValue}`;
          const copyBtn = document.createElement("button");
          copyBtn.type = "button";
          copyBtn.className = "btn-outline btn-copy-row";
          copyBtn.textContent = "Copiar";
          copyBtn.dataset.copy = encodeURIComponent(
            resp.copy_text || `*${String(plataforma || "").toUpperCase()}*\n\n*PIN:* ${pinValue}`,
          );
          btn.parentElement?.appendChild(status);
          btn.parentElement?.appendChild(pinBadge);
          btn.parentElement?.appendChild(copyBtn);
          btn.remove();
          return;
        }
        const { data: reemplazosBloqueados, error: replErr } = await loadReemplazosBloqueados();
        if (replErr) throw replErr;
        const correoCuentaNorm = correoCuenta ? correoCuenta.toLowerCase() : "";
        const claveCuentaNorm = claveCuenta || "";

        let nuevaCuentaId = null;
        let cuentaEntregaCorreo = correoCuentaNorm;
        let cuentaEntregaClave = claveCuentaNorm;
        const findCuentaByCorreo = async (correoValue) => {
          const exactCorreo = String(correoValue || "").trim();
          if (!exactCorreo) return null;
          const { data: exactRows, error: exactErr } = await supabase
            .from("cuentas")
            .select("id_cuenta, clave, correo")
            .eq("correo", exactCorreo)
            .order("id_cuenta", { ascending: true })
            .limit(1);
          if (exactErr) throw exactErr;
          if (exactRows?.[0]?.id_cuenta) return exactRows[0];
          const { data: ilikeRows, error: ilikeErr } = await supabase
            .from("cuentas")
            .select("id_cuenta, clave, correo")
            .ilike("correo", exactCorreo)
            .order("id_cuenta", { ascending: true })
            .limit(20);
          if (ilikeErr) throw ilikeErr;
          const match = (ilikeRows || []).find(
            (row) => String(row?.correo || "").trim().toLowerCase() === exactCorreo.toLowerCase()
          );
          return match || null;
        };
        const updateCuentaForEntrega = async ({ idCuenta, claveActual = null, correoActual = null } = {}) => {
          const idCuentaNum = toPositiveId(idCuenta);
          if (!idCuentaNum) return;
          const updateCuenta = {
            inactiva: false,
            ocupado: false,
            venta_dominio: true,
            dominio_de: idUsuario ? Number(idUsuario) : null,
            id_plataforma: hasIdPlataforma ? idPlataformaNum : null,
          };
          if (forceCuentaCompleta) {
            updateCuenta.id_cuenta_madre = null;
            updateCuenta.venta_perfil = false;
            updateCuenta.venta_miembro = false;
          }
          if (Number.isFinite(proveedorId) && proveedorId > 0) {
            updateCuenta.id_proveedor = proveedorId;
          }
          if (correoCuentaNorm && correoCuentaNorm !== String(correoActual || "").trim().toLowerCase()) {
            updateCuenta.correo = correoCuentaNorm;
          }
          if (claveCuentaNorm && claveCuentaNorm !== String(claveActual || "")) {
            updateCuenta.clave = claveCuentaNorm;
          }
          const { error: updCuentaErr } = await supabase
            .from("cuentas")
            .update(updateCuenta)
            .eq("id_cuenta", idCuentaNum);
          if (updCuentaErr) throw updCuentaErr;
        };

        let cuentaExist = null;
        const existingCuentaMiembroNum = toPositiveId(existingCuentaMiembroId);
        if (!forceCuentaCompleta && existingCuentaMiembroNum) {
          const { data: cuentaVinculada, error: cuentaVinculadaErr } = await supabase
            .from("cuentas")
            .select("id_cuenta, correo, clave")
            .eq("id_cuenta", existingCuentaMiembroNum)
            .maybeSingle();
          if (cuentaVinculadaErr) throw cuentaVinculadaErr;
          if (cuentaVinculada?.id_cuenta) {
            const cuentaVinculadaCorreo = normalizeCredentialValue(cuentaVinculada?.correo || "")
              .trim()
              .toLowerCase();
            if (cuentaVinculadaCorreo || correoCuentaNorm) {
              cuentaExist = cuentaVinculada;
            }
          }
        }
        if (!cuentaExist && correoCuentaNorm) {
          cuentaExist = await findCuentaByCorreo(correoCuentaNorm);
        }
        if (!cuentaExist && !correoCuentaNorm && hasIdPlataforma) {
          let stockQuery = supabase
            .from("cuentas")
            .select("id_cuenta, correo, clave, venta_miembro, venta_perfil")
            .eq("id_plataforma", idPlataformaNum)
            .eq("ocupado", false)
            .or("inactiva.is.null,inactiva.eq.false");
          stockQuery = forceCuentaCompleta
            ? stockQuery.eq("venta_perfil", false).eq("venta_miembro", false)
            : stockQuery.eq("venta_perfil", false).eq("venta_miembro", true);
          const { data: cuentasDisponibles, error: cuentasDisponiblesErr } = await stockQuery
            .order("id_cuenta", { ascending: true })
            .limit(300);
          if (cuentasDisponiblesErr) throw cuentasDisponiblesErr;
          cuentaExist = (cuentasDisponibles || []).find((row) => {
            const cuentaId = toPositiveId(row?.id_cuenta);
            const cuentaCorreo = normalizeCredentialValue(row?.correo || "");
            return !!cuentaId && !!cuentaCorreo && !reemplazosBloqueados.cuentas.has(cuentaId);
          }) || null;
        }
        if (cuentaExist?.id_cuenta) {
          await updateCuentaForEntrega({
            idCuenta: cuentaExist.id_cuenta,
            claveActual: cuentaExist?.clave || null,
            correoActual: cuentaExist?.correo || null,
          });
          nuevaCuentaId = cuentaExist.id_cuenta;
          cuentaEntregaCorreo =
            correoCuentaNorm || normalizeCredentialValue(cuentaExist?.correo || "").toLowerCase();
          cuentaEntregaClave = claveCuentaNorm || normalizeCredentialValue(cuentaExist?.clave || "");
        } else {
          if (!correoCuentaNorm) {
            throw new Error("Faltan datos de la cuenta y no hay stock disponible para entregar.");
          }
          const insertCuenta = {
            correo: correoCuentaNorm,
            clave: claveCuentaNorm || null,
            inactiva: false,
            ocupado: false,
            venta_dominio: true,
            dominio_de: idUsuario ? Number(idUsuario) : null,
            id_plataforma: hasIdPlataforma ? idPlataformaNum : null,
            id_proveedor: Number.isFinite(proveedorId) && proveedorId > 0 ? proveedorId : null,
          };
          if (forceCuentaCompleta) {
            insertCuenta.id_cuenta_madre = null;
            insertCuenta.venta_perfil = false;
            insertCuenta.venta_miembro = false;
          }
          const { data: cuentaNueva, error: cuentaErr } = await supabase
            .from("cuentas")
            .insert(insertCuenta)
            .select("id_cuenta")
            .single();
          if (cuentaErr) throw cuentaErr;
          nuevaCuentaId = cuentaNueva?.id_cuenta || null;
          cuentaEntregaCorreo = correoCuentaNorm;
          cuentaEntregaClave = claveCuentaNorm;
        }
        if (!nuevaCuentaId) throw new Error("No se pudo crear la cuenta.");

        let cuentaMadreId = null;
        let perfilId = null;
        if (cuentaMadreFlag && hasIdPlataforma) {
          if (existingMadreId && existingPerfilId) {
            let canUseExistingMadre = true;
            if (requireMadreActiva) {
              const { data: madreActual, error: madreActualErr } = await supabase
                .from("cuentas")
                .select("id_cuenta, inactiva")
                .eq("id_cuenta", Number(existingMadreId))
                .eq("id_plataforma", idPlataformaNum)
                .eq("cuenta_madre", true)
                .maybeSingle();
              if (madreActualErr) throw madreActualErr;
              canUseExistingMadre = Boolean(madreActual) && !isTrue(madreActual.inactiva);
            }
            if (canUseExistingMadre) {
              const madreIdNum = toPositiveId(existingMadreId);
              const perfilIdNum = toPositiveId(existingPerfilId);
              const madreEnReemplazo =
                !madreIdNum || reemplazosBloqueados.cuentas.has(madreIdNum);
              const perfilEnReemplazo =
                !perfilIdNum || reemplazosBloqueados.perfiles.has(perfilIdNum);
              if (!madreEnReemplazo && !perfilEnReemplazo) {
                cuentaMadreId = madreIdNum;
                perfilId = perfilIdNum;
              }
            }
          }
          if (!cuentaMadreId || !perfilId) {
            let madreQuery = supabase
              .from("cuentas")
              .select("id_cuenta")
              .eq("id_plataforma", idPlataformaNum)
              .eq("cuenta_madre", true);
            if (requireMadreActiva) {
              madreQuery = madreQuery.or("inactiva.is.null,inactiva.eq.false");
            }
            const { data: madres, error: madreErr } = await madreQuery
              .order("id_cuenta", { ascending: true })
              .limit(120);
            if (madreErr) throw madreErr;
            const madresDisponibles = (madres || []).filter((madre) => {
              const madreId = toPositiveId(madre?.id_cuenta);
              return !!madreId && !reemplazosBloqueados.cuentas.has(madreId);
            });
            const madresIds = madresDisponibles
              .map((madre) => toPositiveId(madre?.id_cuenta))
              .filter(Boolean);
            if (madresIds.length) {
              const { data: perfilesMadre, error: perfErr } = await supabase
                .from("perfiles")
                .select("id_perfil, id_cuenta, n_perfil")
                .in("id_cuenta", madresIds)
                .eq("ocupado", false)
                .order("id_cuenta", { ascending: true })
                .order("n_perfil", { ascending: true })
                .limit(500);
              if (perfErr) throw perfErr;
              const perfilLibre = pickPerfilMadreByPriority(perfilesMadre || [], reemplazosBloqueados);
              if (perfilLibre?.id_perfil) {
                cuentaMadreId = toPositiveId(perfilLibre?.id_cuenta);
                perfilId = toPositiveId(perfilLibre?.id_perfil);
              }
            }
            if (!perfilId) {
              const msg = document.querySelector(`.madre-stock-msg[data-plat="${idPlataforma}"]`);
              if (msg) msg.classList.remove("hidden");
            } else {
              const { error: occErr } = await supabase
                .from("perfiles")
                .update({ ocupado: true, id_cuenta_miembro: nuevaCuentaId })
                .eq("id_perfil", perfilId);
              if (occErr) throw occErr;
            }
          }
        }
        if (cuentaMadreId) {
          const { error: linkErr } = await supabase
            .from("cuentas")
            .update({ id_cuenta_madre: cuentaMadreId })
            .eq("id_cuenta", nuevaCuentaId);
          if (linkErr) throw linkErr;
        }

        const base = getVenezuelaToday();
        const next = addMonthsKeepDay(base, Number.isFinite(mesesContratados) ? mesesContratados : 1);
        const nextIso = toYMD(next);
        const updateVenta = {
          pendiente: false,
          cuenta_pagada_admin: true,
          id_cuenta: forceCuentaCompleta ? nuevaCuentaId : cuentaMadreId || null,
          id_cuenta_miembro: forceCuentaCompleta ? null : nuevaCuentaId,
          id_perfil: forceCuentaCompleta ? null : perfilId || null,
          cuenta_nueva: false,
        };
        if (forceCuentaCompleta) {
          updateVenta.correo_miembro = cuentaEntregaCorreo || null;
          updateVenta.clave_miembro = cuentaEntregaClave || null;
        }
        if (ventaSinFechaCorte) {
          updateVenta.fecha_corte = nextIso;
        }
        if (wasReportado) {
          updateVenta.reportado = false;
          updateVenta.aviso_admin = true;
        }
        const { error: updErr } = await supabase.from("ventas").update(updateVenta).eq("id_venta", idVenta);
        if (updErr) throw updErr;

        if (wasReportado) {
          try {
            const closedReportIds = await closeReportesByEntregadaReportada({
              idVenta,
              idUsuario,
              idCuenta: existingMadreId,
              idCuentaMiembro: existingCuentaMiembroId,
              idPerfil: existingPerfilId,
            });
            for (const reportId of closedReportIds) {
              await notifyReporteSolvedWhatsappBestEffort(reportId);
            }
          } catch (closeRepErr) {
            console.error("[pedidos_pendientes] cierre automatico de reportes error", {
              id_venta: idVenta,
              error: closeRepErr?.message || closeRepErr,
            });
          }
        }

        if (Number.isFinite(costoActivacion) && costoActivacion >= 0 && Number.isFinite(proveedorId) && proveedorId > 0) {
          const { error: histErr } = await supabase.from("historial_ventas").insert({
            id_usuario_cliente: idUsuario ? Number(idUsuario) : null,
            id_proveedor: proveedorId,
            monto: costoActivacion,
            fecha_pago: new Date().toISOString().slice(0, 10),
            venta_cliente: false,
            renovacion: false,
            id_venta: Number(idVenta),
            id_plataforma: hasIdPlataforma ? idPlataformaNum : null,
            id_cuenta: nuevaCuentaId,
            registrado_por: null,
          });
          if (histErr) throw histErr;
        }
        if (!wasReportado && wasPendiente) {
          await notifyVentaDeliveredWhatsappBestEffort(idVenta);
        } else {
          console.log("[pedidos_pendientes] whatsapp servicio entregado omitido por cierre de reporte", {
            id_venta: idVenta,
            reason: wasReportado ? "sale_was_reported" : "sale_not_pending_before_update",
          });
        }

        const status = document.createElement("span");
        status.className = "badge badge-processing";
        status.textContent = "Servicio procesandose";
        const copyBtn = document.createElement("button");
        copyBtn.type = "button";
        copyBtn.className = "btn-outline btn-copy-row";
        copyBtn.textContent = "Copiar";
        let copyCorreo = cuentaEntregaCorreo || "";
        let copyClave = cuentaEntregaClave || "";
        let copyPerfil = nPerfil || "";
        let copyPin = "";
        let copyFecha = nextIso;
        let copyPlatId = idPlataforma ? Number(idPlataforma) : null;
        let copyVentaPerfil = false;
        let copyVentaMiembro = false;
        let copyPerfilHogar = false;

        try {
          const { data: ventaInfo, error: vErr } = await supabase
            .from("ventas")
            .select(
              "id_venta, fecha_corte, correo_miembro, clave_miembro, id_cuenta, id_cuenta_miembro, id_perfil, cuentas:cuentas!ventas_id_cuenta_fkey(correo, clave, id_plataforma, venta_perfil, venta_miembro), cuentas_miembro:cuentas!ventas_id_cuenta_miembro_fkey(correo, clave, venta_perfil, venta_miembro), perfiles:perfiles(id_perfil, n_perfil, pin, perfil_hogar)",
            )
            .eq("id_venta", idVenta)
            .maybeSingle();
          if (vErr) throw vErr;
          if (ventaInfo) {
            copyCorreo =
              ventaInfo.correo_miembro ||
              ventaInfo.cuentas_miembro?.correo ||
              ventaInfo.cuentas?.correo ||
              copyCorreo;
            copyClave =
              ventaInfo.clave_miembro ||
              ventaInfo.cuentas_miembro?.clave ||
              ventaInfo.cuentas?.clave ||
              copyClave;
            copyPerfil = ventaInfo.perfiles?.n_perfil ?? copyPerfil ?? "";
            copyPin = ventaInfo.perfiles?.pin || "";
            copyPerfilHogar = ventaInfo.perfiles?.perfil_hogar === true;
            copyFecha = ventaInfo.fecha_corte || copyFecha;
            copyPlatId = ventaInfo.cuentas?.id_plataforma || copyPlatId;
            if (!isCompleta) {
              copyVentaPerfil =
                ventaInfo.cuentas?.venta_perfil ??
                ventaInfo.cuentas_miembro?.venta_perfil ??
                false;
              copyVentaMiembro =
                ventaInfo.cuentas?.venta_miembro ??
                ventaInfo.cuentas_miembro?.venta_miembro ??
                false;
            }
          }
        } catch (err) {
          console.warn("venta info para copiar no disponible", err);
        }

        const idUsuarioNum = Number(idUsuario);
        if (Number.isFinite(idUsuarioNum) && idUsuarioNum > 0) {
          const notif = buildNotificationPayload("nuevo_servicio", {
            plataforma,
            correoCuenta: copyCorreo || correoCuenta || "",
            perfil: copyPerfil || perfil || "",
            fechaCorte: copyFecha || nextIso || "",
            idVenta: Number(idVenta) || null,
          });
          const { error: nErr } = await supabase
            .from("notificaciones")
            .insert({ ...notif, id_usuario: idUsuarioNum });
          if (nErr) throw nErr;
        }

        const perfilNum = Number(copyPerfil);
        const copyText = buildServiceCopyText({
          plataforma,
          idVenta: idVenta || null,
          correo: copyCorreo,
          clave: copyClave,
          nPerfil: Number.isFinite(perfilNum) ? perfilNum : copyPerfil || null,
          pin: copyPin,
          fechaCorte: copyFecha,
          porAcceso,
          porPantalla,
          usaPines,
          ventaPerfil: copyVentaPerfil,
          ventaMiembro: copyVentaMiembro,
          idPlataforma: copyPlatId,
          perfilHogar: copyPerfilHogar,
          isSubCuenta: false,
        });
        copyBtn.dataset.copy = encodeURIComponent(copyText);
        btn.parentElement?.appendChild(status);
        btn.parentElement?.appendChild(copyBtn);
        btn.remove();
      };

      tablasEl?.addEventListener("click", async (e) => {

          const wrap = editLinkMadreBtn.closest(".madre-link-wrap");

          const linkTextEl = wrap.querySelector(".madre-link-text");

          saveBtn.textContent = "💾";
          wrap.appendChild(input);
          wrap.appendChild(saveBtn);
          input.focus();
          input.select();
          return;
        }
        const saveLinkMadreBtn = e.target.closest(".btn-save-link-madre");
        if (saveLinkMadreBtn) {
          const wrap = saveLinkMadreBtn.closest(".madre-link-wrap");
          if (!wrap) return;
          const input = wrap.querySelector(".madre-link-input");
          const linkTextEl = wrap.querySelector(".madre-link-text");
          const editBtn = wrap.querySelector(".btn-edit-link-madre");
          const idCuenta = Number(wrap.dataset.cuenta || "");
          if (!Number.isFinite(idCuenta) || idCuenta <= 0) {
            alert("No se pudo identificar la cuenta madre.");

          }
          const nextRaw = String(input?.value || "").trim();
          try {
            const { error: updErr } = await supabase
              .from("cuentas")
              .update({ link_codigo: nextRaw || null })
              .eq("id_cuenta", idCuenta);

            if (linkTextEl) {
              const nextHref = toExternalHref(nextRaw);

                linkTextEl.textContent = "-";

              linkTextEl.classList.remove("hidden");

            if (editBtn) editBtn.classList.remove("hidden");
            input?.remove();
            saveLinkMadreBtn.remove();
