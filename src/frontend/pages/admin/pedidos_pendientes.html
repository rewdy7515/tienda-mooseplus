            console.error("guardar link cuenta madre error", err);
            alert("No se pudo guardar el link.");
          }
          return;
        }
        const editBtn = e.target.closest(".btn-edit-correo");
        if (editBtn) {
          const wrap = editBtn.closest(".correo-edit-wrap");
          if (!wrap) return;
          const textEl = wrap.querySelector(".correo-text");
          if (!textEl) return;
          const current = textEl.textContent || "";
          editBtn.classList.add("hidden");
          textEl.classList.add("hidden");
          const input = document.createElement("input");
          input.type = "text";
          input.value = current === "-" ? "" : current;
          input.className = "input-text correo-edit-input";
          const saveBtn = document.createElement("button");
          saveBtn.type = "button";
          saveBtn.className = "btn-outline btn-save-correo";
          saveBtn.title = "Guardar";
          saveBtn.textContent = "💾";
          wrap.appendChild(input);
          wrap.appendChild(saveBtn);
          input.focus();
          return;
        }
        const saveBtn = e.target.closest(".btn-save-correo");
        if (saveBtn) {
          const wrap = saveBtn.closest(".correo-edit-wrap");
          if (!wrap) return;
          const input = wrap.querySelector(".correo-edit-input");
          const textEl = wrap.querySelector(".correo-text");
          const editBtn = wrap.querySelector(".btn-edit-correo");
          const idVenta = wrap.dataset.venta;
          const nextVal = (input?.value || "").trim();
          const prevVal = normalizeCredentialValue(wrap.dataset.correo || textEl?.textContent || "");
          if (!idVenta || !nextVal) {
            alert("Ingresa un correo válido.");
            return;
          }
          try {
            const row = wrap.closest("tr");
            const target = await resolveVentaCredentialTarget({ idVenta, rowEl: row });
            const updates = [
              supabase
                .from("ventas")
                .update({ correo_miembro: nextVal })
                .eq("id_venta", idVenta),
            ];
            const cuentaMiembroId = toPositiveId(target?.idCuentaMiembro);
            const cuentaMadreId = toPositiveId(target?.idCuentaMadre);
            if (cuentaMiembroId && cuentaMiembroId !== cuentaMadreId) {
              updates.push(
                supabase
                  .from("cuentas")
                  .update({ correo: nextVal })
                  .eq("id_cuenta", Number(cuentaMiembroId)),
              );
            }
            const results = await Promise.all(updates);
            const failed = results.find((r) => r?.error);
            if (failed?.error) throw failed.error;

            await notifyCorreoCambioCliente({
              idUsuario: target?.idUsuario,
              idCuenta: target?.idCuenta,
              idVenta,
              plataforma: target?.plataforma || "",
              correoAnterior: prevVal,
              correoNuevo: nextVal,
            });

            if (textEl) {
              textEl.textContent = nextVal;
              textEl.dataset.clipboard = nextVal;
              textEl.classList.remove("hidden");
            }
            if (editBtn) editBtn.classList.remove("hidden");
            wrap.dataset.correo = nextVal;
            input?.remove();
            saveBtn.remove();
            const entregarBtn = row?.querySelector(".btn-entregar");
            if (entregarBtn) entregarBtn.dataset.correo = nextVal;
          } catch (err) {
            console.error("guardar correo_miembro/cuenta error", err);
            alert("No se pudo guardar el correo.");
          }
          return;
        }
        const editClaveBtn = e.target.closest(".btn-edit-clave");
        if (editClaveBtn) {
          const wrap = editClaveBtn.closest(".correo-edit-wrap");
          if (!wrap) return;
          const textEl = wrap.querySelector(".clave-text");
          if (!textEl) return;
          const current = textEl.textContent || "";
          editClaveBtn.classList.add("hidden");
          textEl.classList.add("hidden");
          const input = document.createElement("input");
          input.type = "text";
          input.value = current === "-" ? "" : current;
          input.className = "input-text clave-edit-input";
          const saveClaveBtn = document.createElement("button");
          saveClaveBtn.type = "button";
          saveClaveBtn.className = "btn-outline btn-save-clave";
          saveClaveBtn.title = "Guardar";
          saveClaveBtn.textContent = "💾";
          wrap.appendChild(input);
          wrap.appendChild(saveClaveBtn);
          input.focus();
          return;
        }
        const saveClaveBtn = e.target.closest(".btn-save-clave");
        if (saveClaveBtn) {
          const wrap = saveClaveBtn.closest(".correo-edit-wrap");
          if (!wrap) return;
          const input = wrap.querySelector(".clave-edit-input");
          const textEl = wrap.querySelector(".clave-text");
          const editClaveBtn = wrap.querySelector(".btn-edit-clave");
          const idVenta = wrap.dataset.venta;
          const nextVal = (input?.value || "").trim();
          if (!idVenta || !nextVal) {
            alert("Ingresa una clave válida.");
            return;
          }
          try {
            const row = wrap.closest("tr");
            const target = await resolveVentaCredentialTarget({ idVenta, rowEl: row });
            const updates = [
              supabase
                .from("ventas")
                .update({ clave_miembro: nextVal })
                .eq("id_venta", idVenta),
            ];
            if (toPositiveId(target?.idCuenta)) {
              updates.push(
                supabase
                  .from("cuentas")
                  .update({ clave: nextVal })
                  .eq("id_cuenta", Number(target.idCuenta)),
              );
            }
            const results = await Promise.all(updates);
            const failed = results.find((r) => r?.error);
            if (failed?.error) throw failed.error;

            if (textEl) {
              textEl.textContent = nextVal;
              textEl.dataset.clipboard = nextVal;
              textEl.classList.remove("hidden");
            }
            if (editClaveBtn) editClaveBtn.classList.remove("hidden");
            wrap.dataset.clave = nextVal;
            input?.remove();
            saveClaveBtn.remove();
            const entregarBtn = row?.querySelector(".btn-entregar");
            if (entregarBtn) entregarBtn.dataset.clave = nextVal;
          } catch (err) {
            console.error("guardar clave_miembro/cuenta error", err);
            alert("No se pudo guardar la clave.");
          }
          return;
        }
        const tomarPedidoBtn = e.target.closest(".btn-tomar-pedido");
        if (tomarPedidoBtn) {
          const idVenta = Number(tomarPedidoBtn.dataset.venta || "");
          if (!Number.isFinite(idVenta) || idVenta <= 0) return;
          if (!currentUser?.id_usuario) {
            alert("No se pudo identificar el admin actual.");
            return;
          }
          tomarPedidoBtn.disabled = true;
          tomarPedidoBtn.textContent = "Asignando...";
          try {
            const { data: updatedVenta, error: updErr } = await supabase
              .from("ventas")
              .update({ asignado_a: currentUser.id_usuario })
              .eq("id_venta", idVenta)
              .is("asignado_a", null)
              .select("id_venta, asignado_a, asignado:usuarios!ventas_asignado_a_fkey(nombre, apellido)")
              .maybeSingle();
            if (updErr) throw updErr;
            if (!updatedVenta?.asignado_a) {
              alert("Este pedido ya fue tomado por otro admin.");
              await loadPendientes();
              return;
            }
            await loadPendientes();
          } catch (err) {
            console.error("tomar pedido error", err);
            alert("No se pudo tomar el pedido.");
            tomarPedidoBtn.disabled = false;
            tomarPedidoBtn.textContent = "Tomar pedido";
          }
          return;
        }
        const btn = e.target.closest(".btn-entregar");
        if (!btn) return;
        try {
          if (requiereModalActivacion(btn)) {
            openModalActivacion(btn);
            return;
          }
          await handleEntregarServicio(btn);
        } catch (err) {
          console.error("entregar servicio error", err);
          alert(err?.message || "No se pudo entregar el servicio.");
        }
      });
      const closeMadreOptions = () => {
        document.querySelectorAll(".madre-options").forEach((el) => {
          el.classList.add("hidden");
          el.style.removeProperty("top");
          el.style.removeProperty("left");
          el.style.removeProperty("width");
          el.style.removeProperty("max-height");
        });
      };

      const positionMadreOptions = (listEl, anchorEl) => {
        if (!listEl || !anchorEl) return;
        const rect = anchorEl.getBoundingClientRect();
        const vw = window.innerWidth || document.documentElement.clientWidth || 0;
        const vh = window.innerHeight || document.documentElement.clientHeight || 0;
        const pad = 8;
        const desiredWidth = Math.max(300, Math.min(420, Number(rect.width || 0) + 260));
        const panelWidth = Math.max(240, Math.min(desiredWidth, vw - pad * 2));
        let left = Math.round(rect.right - panelWidth);
        if (left < pad) left = pad;
        if (left + panelWidth > vw - pad) left = Math.max(pad, vw - panelWidth - pad);
        const maxHeight = Math.max(160, Math.min(340, vh - pad * 2));
        let top = Math.round(rect.bottom + 6);
        if (top + maxHeight > vh - pad) {
          const upTop = Math.round(rect.top - maxHeight - 6);
          top = upTop >= pad ? upTop : Math.max(pad, vh - maxHeight - pad);
        }
        listEl.style.width = `${panelWidth}px`;
        listEl.style.maxHeight = `${maxHeight}px`;
        listEl.style.left = `${left}px`;
        listEl.style.top = `${top}px`;
      };

      const fetchMadresDisponibles = async (idPlataforma, currentMadreId = null) => {
        logMadreDebug("fetchMadresDisponibles:start", { idPlataforma, currentMadreId });
        const { data: madresRows, error: madreErr } = await supabase
          .from("cuentas")
          .select("id_cuenta, correo, region")
          .eq("id_plataforma", idPlataforma)
          .eq("cuenta_madre", true)
          .eq("inactiva", false)
          .order("id_cuenta", { ascending: true })
          .limit(300);
        if (madreErr) throw madreErr;
        logMadreDebug("fetchMadresDisponibles:madresRows", {
          total: Array.isArray(madresRows) ? madresRows.length : 0,
        });
        const madresBase = (madresRows || [])
          .map((m) => ({
            id_cuenta: toPositiveId(m?.id_cuenta),
            correo: String(m?.correo || "").trim(),
            region: String(m?.region || "").trim(),
          }))
          .filter((m) => !!m.id_cuenta)
          .filter((m) => !currentMadreId || Number(m.id_cuenta) !== Number(currentMadreId));
        const madreIds = madresBase.map((m) => m.id_cuenta);
        if (!madreIds.length) {
          logMadreDebug("fetchMadresDisponibles:noMadreIds");
          return [];
        }
        const { data: perfilesRows, error: perfErr } = await supabase
          .from("perfiles")
          .select("id_perfil, id_cuenta, n_perfil, ocupado")
          .in("id_cuenta", madreIds)
          .eq("ocupado", false)
          .order("n_perfil", { ascending: true })
          .limit(1200);
        if (perfErr) throw perfErr;
        logMadreDebug("fetchMadresDisponibles:perfilesRows", {
          total: Array.isArray(perfilesRows) ? perfilesRows.length : 0,
        });

        const perfilByMadre = new Map();
        const perfilCountByMadre = new Map();
        (perfilesRows || []).forEach((p) => {
          const madreId = toPositiveId(p?.id_cuenta);
          const perfilId = toPositiveId(p?.id_perfil);
          if (!madreId || !perfilId) return;
          if (isTrue(p?.ocupado)) return;
          perfilCountByMadre.set(madreId, (perfilCountByMadre.get(madreId) || 0) + 1);
          if (!perfilByMadre.has(madreId)) {
            perfilByMadre.set(madreId, {
              id_perfil: perfilId,
              n_perfil: Number.isFinite(Number(p?.n_perfil)) ? Number(p.n_perfil) : null,
            });
          }
        });

        const result = madresBase
          .map((m) => {
            const perfil = perfilByMadre.get(m.id_cuenta);
            if (!perfil?.id_perfil) return null;
            const espacios_disponibles = Number(perfilCountByMadre.get(m.id_cuenta) || 0);
            return { ...m, ...perfil, espacios_disponibles };
          })
          .filter(Boolean)
          .sort((a, b) => {
            const freeA = Number(a?.espacios_disponibles || 0);
            const freeB = Number(b?.espacios_disponibles || 0);
            if (freeA !== freeB) return freeB - freeA;
            return Number(a?.id_cuenta || 0) - Number(b?.id_cuenta || 0);
          });
        logMadreDebug("fetchMadresDisponibles:result", {
          total: result.length,
          top: result.slice(0, 3),
        });
        return result;
      };

      const renderMadreOptions = (madresDisponibles = []) =>
        (madresDisponibles || [])
          .map((madre) => {
            const perfilLabel =
              Number.isFinite(Number(madre.n_perfil)) && Number(madre.n_perfil) > 0
                ? `M${Number(madre.n_perfil)}`
                : `#${madre.id_perfil}`;
            const regionTxt = madre.region ? ` · ${escapeHtml(madre.region)}` : "";
            const correoTxt = madre.correo ? escapeHtml(madre.correo) : `Cuenta #${madre.id_cuenta}`;
            const slots = Number(madre.espacios_disponibles || 0);
            const slotsTxt = ` · ${slots} espacio${slots === 1 ? "" : "s"}`;
            return `<button type="button" class="madre-option-item" data-madre-id="${madre.id_cuenta}" data-perfil-id="${madre.id_perfil}">${correoTxt}${slotsTxt} · ${perfilLabel}${regionTxt}</button>`;
          })
          .join("");

      const openMadreOptions = async ({ wrap, listEl, triggerBtn = null }) => {
        if (!wrap || !listEl) return;
        const anchorEl = triggerBtn || wrap.querySelector(".btn-toggle-madres");
        const salePlatformId = Number(wrap.dataset.idPlataforma || "");
        const idPlataforma = salePlatformId;
        const currentMadreId = Number(wrap.dataset.idCuenta || "");
        logMadreDebug("openMadreOptions:start", {
          salePlatformId,
          idPlataforma,
          currentMadreId,
          wrapDataset: { ...wrap.dataset },
        });
        try {
          if (triggerBtn) triggerBtn.disabled = true;
          if (!Number.isFinite(salePlatformId) || salePlatformId <= 0) {
            listEl.innerHTML =
              '<div class="madre-option-empty">No se pudo identificar la plataforma de esta venta.</div>';
            listEl.classList.remove("hidden");
            logMadreDebug("openMadreOptions:missingPlatformId");
            return;
          }
          listEl.innerHTML = '<div class="madre-option-empty">Cargando cuentas madres...</div>';
          listEl.classList.remove("hidden");
          positionMadreOptions(listEl, anchorEl);
          const madresDisponibles = await fetchMadresDisponibles(idPlataforma, currentMadreId);
          if (!madresDisponibles.length) {
            listEl.innerHTML = '<div class="madre-option-empty">No hay cuentas madres con espacios libres.</div>';
            positionMadreOptions(listEl, anchorEl);
            logMadreDebug("openMadreOptions:emptyResult");
            return;
          }
          listEl.innerHTML = renderMadreOptions(madresDisponibles);
          positionMadreOptions(listEl, anchorEl);
          logMadreDebug("openMadreOptions:rendered", { total: madresDisponibles.length });
        } catch (err) {
          console.error("listar cuentas madre error", err);
          logMadreDebug("openMadreOptions:error", {
            message: err?.message || String(err || ""),
            code: err?.code || null,
          });
          listEl.innerHTML = '<div class="madre-option-empty">No se pudo cargar la lista.</div>';
          positionMadreOptions(listEl, anchorEl);
        } finally {
          if (triggerBtn) triggerBtn.disabled = false;
        }
      };

      const applyCambioMadre = async ({
        idVenta,
        cuentaMiembroId,
        currentPerfilId,
        salePlatformId,
        nextMadreId,
        nextPerfilId,
      }) => {
        logMadreDebug("applyCambioMadre:start", {
          idVenta,
          cuentaMiembroId,
          currentPerfilId,
          salePlatformId,
          nextMadreId,
          nextPerfilId,
        });
        const salePlatformIdNum = Number(salePlatformId || "");
        if (!Number.isFinite(salePlatformIdNum) || salePlatformIdNum <= 0) {
          throw new Error("No se pudo identificar la plataforma de la venta.");
        }
        const { data: madreCuenta, error: madreCuentaErr } = await supabase
          .from("cuentas")
          .select("id_cuenta, id_plataforma, cuenta_madre, inactiva")
          .eq("id_cuenta", nextMadreId)
          .maybeSingle();
        if (madreCuentaErr) throw madreCuentaErr;
        if (!madreCuenta) {
          throw new Error("La cuenta madre seleccionada no existe.");
        }
        if (!isTrue(madreCuenta?.cuenta_madre)) {
          throw new Error("La cuenta seleccionada no es cuenta madre.");
        }
        if (madreCuenta?.inactiva !== false) {
          throw new Error("La cuenta madre seleccionada está inactiva.");
        }
        if (Number(madreCuenta?.id_plataforma) !== salePlatformIdNum) {
          throw new Error("La cuenta madre no pertenece a la plataforma de la venta.");
        }
        if (currentPerfilId) {
          const { error: oldPerfErr } = await supabase
            .from("perfiles")
            .update({ ocupado: false, id_cuenta_miembro: null })
            .eq("id_perfil", currentPerfilId);
          if (oldPerfErr) throw oldPerfErr;
        }
        const cuentaMiembroIdNum = toPositiveId(cuentaMiembroId);
        const { error: newPerfErr } = await supabase
          .from("perfiles")
          .update({ ocupado: true, id_cuenta_miembro: cuentaMiembroIdNum })
          .eq("id_perfil", nextPerfilId);
        if (newPerfErr) throw newPerfErr;

        if (cuentaMiembroIdNum) {
          const { error: linkErr } = await supabase
            .from("cuentas")
            .update({ id_cuenta_madre: nextMadreId })
            .eq("id_cuenta", cuentaMiembroIdNum);
          if (linkErr) throw linkErr;
        }

        const { error: ventaErr } = await supabase
          .from("ventas")
          .update({ id_cuenta: nextMadreId, id_perfil: nextPerfilId })
          .eq("id_venta", idVenta);
        if (ventaErr) throw ventaErr;
        logMadreDebug("applyCambioMadre:ventaUpdated", {
          idVenta,
          id_cuenta: nextMadreId,
          id_perfil: nextPerfilId,
        });
      };

      tablasEl?.addEventListener("click", async (e) => {
        const debugTarget = e.target?.closest?.(".btn-toggle-madres, .madre-option-item");
        if (debugTarget) {
          logMadreDebug("click:listenerB", {
            className: debugTarget.className,
            text: String(debugTarget.textContent || "").trim(),
          });
        }
        const optionBtn = e.target.closest(".madre-option-item[data-madre-id][data-perfil-id]");
        if (optionBtn) {
          const wrap = optionBtn.closest(".madre-switch-wrap");
          if (!wrap) return;
          const idVenta = Number(wrap.dataset.venta || "");
          const salePlatformId = Number(wrap.dataset.idPlataforma || "");
          const cuentaMiembroId = Number(wrap.dataset.idCuentaMiembro || "");
          const currentPerfilId = Number(wrap.dataset.idPerfil || "");
          const nextMadreId = Number(optionBtn.dataset.madreId || "");
          const nextPerfilId = Number(optionBtn.dataset.perfilId || "");
          if (!idVenta || !nextMadreId || !nextPerfilId) return;
          try {
            optionBtn.disabled = true;
            await applyCambioMadre({
              idVenta,
              cuentaMiembroId: Number.isFinite(cuentaMiembroId) ? cuentaMiembroId : null,
              currentPerfilId: Number.isFinite(currentPerfilId) ? currentPerfilId : null,
              salePlatformId: Number.isFinite(salePlatformId) ? salePlatformId : null,
              nextMadreId,
              nextPerfilId,
            });
            closeMadreOptions();
            alert("Cuenta madre actualizada.");
            await loadPendientes();
          } catch (err) {
            console.error("cambiar cuenta madre error", err);
            alert("No se pudo cambiar la cuenta madre.");
          } finally {
            optionBtn.disabled = false;
          }
          return;
        }

        const toggleBtn = e.target.closest(".btn-toggle-madres");
        if (toggleBtn) {
          logMadreDebug("toggleBtn:clicked");
          const wrap = toggleBtn.closest(".madre-switch-wrap");
          const listEl = wrap?.querySelector(".madre-options");
          if (!wrap || !listEl) {
            logMadreDebug("toggleBtn:missingElements", {
              hasWrap: !!wrap,
              hasListEl: !!listEl,
            });
            return;
          }
          const alreadyOpen = !listEl.classList.contains("hidden");
          logMadreDebug("toggleBtn:state", { alreadyOpen });
          closeMadreOptions();
          if (alreadyOpen) return;
          await openMadreOptions({ wrap, listEl, triggerBtn: toggleBtn });
          return;
        }

        if (!e.target.closest(".madre-switch-wrap")) {
          closeMadreOptions();
        }
      });
      tablasEl?.addEventListener(
        "click",
        (e) => {
          const toggleBtn = e.target?.closest?.(".btn-toggle-madres");
          if (!toggleBtn) return;
          const wrap = toggleBtn.closest(".madre-switch-wrap");
          logMadreDebug("click:capture", {
            className: toggleBtn.className,
            wrapDataset: wrap ? { ...wrap.dataset } : null,
          });
        },
        true,
      );
      document.addEventListener("click", (e) => {
        if (!e.target.closest(".madre-switch-wrap")) {
          closeMadreOptions();
        }
      });
      tablasEl?.addEventListener("click", async (e) => {
        const copyBtn = e.target.closest(".btn-copy-row");
        if (copyBtn) {
          const text = decodeURIComponent(copyBtn.dataset.copy || "");
          if (!text) return;
          await copyTextNotify(text);
          return;
        }
        const cell = e.target.closest(".copyable");
        if (!cell) return;
        const text = cell.dataset.clipboard || cell.textContent || "";
        if (!text) return;
        await copyTextNotify(text);
      });

      modalActivarCloseBtn?.addEventListener("click", () => {
        closeModalActivacion();
      });
      modalActivarCancelarBtn?.addEventListener("click", () => {
        closeModalActivacion();
      });
      modalActivarEl?.addEventListener("click", (e) => {
        if (e.target.classList.contains("modal-backdrop")) {
          closeModalActivacion();
        }
      });
      modalActivarAddProveedorBtn?.addEventListener("click", (e) => {
        e.preventDefault();
        window.location.href = "registrar_proveedor.html";
      });
      modalActivarProveedorInput?.addEventListener("input", (e) => {
        proveedorSeleccionadoId = null;
        setModalStatus("");
        buscarProveedoresActivacion(e.target.value).catch((err) => {
          console.error("buscar proveedores activacion input error", err);
        });
      });
      modalActivarProveedorInput?.addEventListener("keydown", (e) => {
        if (e.key !== "Enter") return;
        e.preventDefault();
        buscarProveedoresActivacion(modalActivarProveedorInput?.value || "", false).catch((err) => {
          console.error("buscar proveedores activacion enter error", err);
        });
      });
      modalActivarProvSugs?.addEventListener("click", (e) => {
        const btn = e.target.closest("button");
        if (!btn) return;
        proveedorSeleccionadoId = Number(btn.dataset.id || "");
        if (modalActivarProveedorInput) {
          modalActivarProveedorInput.value = btn.dataset.nombre || "";
        }
        setModalStatus("");
        hideProvSuggestions();
      });
      modalActivarEntregarBtn?.addEventListener("click", async () => {
        const btn = pendingEntregaBtn;
        if (!btn) {
          closeModalActivacion();
          return;
        }
        const rawCosto = String(modalActivarCostoInput?.value || "")
          .trim()
          .replace(",", ".");
        const costoVal = Number(rawCosto);
        if (!Number.isFinite(costoVal) || costoVal < 0) {
          setModalStatus("Ingresa un costo valido.");
          return;
        }
        const provText = (modalActivarProveedorInput?.value || "").trim();
        if (!provText) {
          setModalStatus("Selecciona un proveedor.");
          return;
        }
        let provId = Number(proveedorSeleccionadoId);
        if (!Number.isFinite(provId) || provId <= 0) {
          const exact = (proveedoresSugeridos || []).find(
            (p) => (p?.nombre || "").trim().toLowerCase() === provText.toLowerCase()
          );
          if (exact?.id_proveedor) {
            provId = Number(exact.id_proveedor);
          }
        }
        if (!Number.isFinite(provId) || provId <= 0) {
          setModalStatus("Selecciona un proveedor valido de la lista.");
          return;
        }

        const payload = { costo: costoVal, idProveedor: provId };
        closeModalActivacion();
        try {
          await handleEntregarServicio(btn, payload);
        } catch (err) {
          console.error("entregar servicio con activacion error", err);
          alert(err?.message || "No se pudo entregar el servicio.");
        }
      });
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape" && modalActivarEl && !modalActivarEl.classList.contains("hidden")) {
          closeModalActivacion();
        }
      });
      document.addEventListener("click", (e) => {
        if (!modalActivarProvSugs || !modalActivarProveedorInput) return;
        if (
          modalActivarProvSugs.contains(e.target) ||
          modalActivarProveedorInput.contains(e.target)
        ) {
          return;
        }
        hideProvSuggestions();
      });

      loadPendientes();
    </script>
  </body>
</html>
