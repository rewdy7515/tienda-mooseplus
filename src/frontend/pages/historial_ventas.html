<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Historial de Ventas</title>
    <link rel="stylesheet" href="../styles/styles.css" />
    <style>
      .historial-wrapper {
        margin-top: 12px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .historial-controls {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .historial-controls select {
        min-width: 210px;
      }
      .historial-table-wrap {
        width: 100%;
        overflow-x: auto;
      }
      .historial-table-wrap .table-base {
        min-width: 980px;
      }
      .status {
        margin: 0;
      }
    </style>
  </head>
  <body>
    <div id="app-header" data-header-root="../" data-header-pages=""></div>
    <script src="../scripts/header-loader.js"></script>

    <main class="categorias-dinamicas">
      <h2>Historial de Ventas</h2>
      <div class="historial-wrapper">
        <div class="historial-controls">
          <label for="historial-mes-select">Mes:</label>
          <select id="historial-mes-select" class="input-cuenta"></select>
        </div>
        <p id="historial-status" class="status">Cargando ventas...</p>
        <div class="historial-table-wrap">
          <table class="table-base">
            <thead>
              <tr>
                <th>ID de Venta</th>
                <th>Cliente</th>
                <th>Plataforma</th>
                <th>Detalle</th>
                <th>Monto</th>
                <th>Método de pago</th>
                <th>Referencia</th>
                <th>Fecha</th>
                <th>Hora</th>
              </tr>
            </thead>
            <tbody id="historial-body"></tbody>
          </table>
        </div>
      </div>
    </main>

    <script type="module">
      import { requireSession, attachLogoHome, attachLogout } from "../scripts/session.js";
      import { clearServerSession, supabase } from "../scripts/api.js";
      import { formatDDMMYYYY } from "../scripts/date-format.js";

      requireSession();
      attachLogoHome();
      attachLogout(clearServerSession);

      const statusEl = document.querySelector("#historial-status");
      const tbodyEl = document.querySelector("#historial-body");
      const monthSelectEl = document.querySelector("#historial-mes-select");

      const setStatus = (msg) => {
        if (statusEl) statusEl.textContent = msg || "";
      };

      const formatMonto = (monto) => {
        const num = Number(monto);
        if (!Number.isFinite(num)) return "-";
        return num.toFixed(2);
      };

      const buildDetalle = (precio) => {
        const cantidad = Number(precio?.cantidad) || 1;
        const plan = (precio?.plan || "").trim();
        return plan ? `${cantidad} ${plan}` : `${cantidad}`;
      };

      const truncateText = (value, max = 12) => {
        const raw = String(value ?? "").trim();
        if (!raw) return "-";
        if (raw.length <= max) return raw;
        return `${raw.slice(0, max)}...`;
      };

      const formatHora = (hora) => {
        if (!hora) return "-";
        const raw = String(hora).trim();
        const match = raw.match(/^(\d{1,2}):(\d{2})(?::\d{2}(?:\.\d+)?)?$/);
        if (!match) return raw;
        let hh = Number(match[1]);
        const mm = match[2];
        if (!Number.isFinite(hh)) return raw;
        const suffix = hh >= 12 ? "pm" : "am";
        hh = hh % 12;
        if (hh === 0) hh = 12;
        return `${hh}:${mm} ${suffix}`;
      };

      const isTrue = (v) =>
        v === true || v === 1 || v === "1" || v === "true" || v === "t";

      const getMonthKey = (value) => {
        const raw = String(value || "").trim();
        const match = raw.match(/^(\d{4})-(\d{2})-\d{2}$/);
        if (!match) return null;
        return `${match[1]}-${match[2]}`;
      };

      const getMonthLabel = (monthKey) => {
        if (!monthKey) return "Sin fecha";
        const date = new Date(`${monthKey}-01T00:00:00`);
        if (Number.isNaN(date.getTime())) return monthKey;
        const fmt = new Intl.DateTimeFormat("es-VE", {
          month: "long",
          year: "numeric",
        });
        const text = fmt.format(date);
        return text.charAt(0).toUpperCase() + text.slice(1);
      };

      const getCurrentMonthKey = () => {
        const now = new Date();
        const y = now.getFullYear();
        const m = String(now.getMonth() + 1).padStart(2, "0");
        return `${y}-${m}`;
      };

      const init = async () => {
        try {
          const { data: historial, error } = await supabase
            .from("historial_ventas")
            .select(
              "id_historial_ventas, id_venta, id_orden, id_plataforma, id_usuario_cliente, id_metodo_de_pago, referencia, monto, fecha_pago, hora_pago, venta_cliente, renovacion"
            )
            .order("fecha_pago", { ascending: false, nullsFirst: false })
            .order("id_historial_ventas", { ascending: false });
          if (error) throw error;

          const rows = historial || [];
          if (!rows.length) {
            setStatus("No hay ventas registradas.");
            if (tbodyEl) tbodyEl.innerHTML = "";
            return;
          }

          const ventaIds = Array.from(new Set(rows.map((r) => r.id_venta).filter(Boolean)));
          const platIdsHistorial = Array.from(new Set(rows.map((r) => r.id_plataforma).filter(Boolean)));
          const userIdsHistorial = Array.from(new Set(rows.map((r) => r.id_usuario_cliente).filter(Boolean)));
          const ordenIds = Array.from(new Set(rows.map((r) => r.id_orden).filter(Boolean)));

          let ordenesMap = {};
          if (ordenIds.length) {
            const { data: ordenesRows, error: ordenesErr } = await supabase
              .from("ordenes")
              .select("id_orden, id_usuario, id_metodo_de_pago, referencia, fecha, hora_orden")
              .in("id_orden", ordenIds);
            if (ordenesErr) throw ordenesErr;
            ordenesMap = (ordenesRows || []).reduce((acc, orden) => {
              acc[orden.id_orden] = orden;
              return acc;
            }, {});
          }

          let ventasMap = {};
          if (ventaIds.length) {
            const { data: ventas, error: ventErr } = await supabase
              .from("ventas")
              .select("id_venta, id_precio, id_usuario")
              .in("id_venta", ventaIds);
            if (ventErr) throw ventErr;
            ventasMap = (ventas || []).reduce((acc, v) => {
              acc[v.id_venta] = v;
              return acc;
            }, {});
          }

          const userIdsVentas = Array.from(
            new Set(Object.values(ventasMap).map((v) => v.id_usuario).filter(Boolean))
          );
          const userIdsOrdenes = Array.from(
            new Set(Object.values(ordenesMap).map((o) => o.id_usuario).filter(Boolean))
          );
          const userIds = Array.from(
            new Set([...userIdsHistorial, ...userIdsVentas, ...userIdsOrdenes])
          );

          const precioIds = Array.from(
            new Set(Object.values(ventasMap).map((v) => v.id_precio).filter(Boolean))
          );
          let preciosMap = {};
          if (precioIds.length) {
            const { data: precios, error: precErr } = await supabase
              .from("precios")
              .select("id_precio, id_plataforma, plan, cantidad")
              .in("id_precio", precioIds);
            if (precErr) throw precErr;
            preciosMap = (precios || []).reduce((acc, p) => {
              acc[p.id_precio] = p;
              return acc;
            }, {});
          }

          const platIdsPrecio = Array.from(
            new Set(Object.values(preciosMap).map((p) => p.id_plataforma).filter(Boolean))
          );
          const platIds = Array.from(new Set([...platIdsHistorial, ...platIdsPrecio]));

          let platMap = {};
          if (platIds.length) {
            const { data: plats, error: platErr } = await supabase
              .from("plataformas")
              .select("id_plataforma, nombre")
              .in("id_plataforma", platIds);
            if (platErr) throw platErr;
            platMap = (plats || []).reduce((acc, p) => {
              acc[p.id_plataforma] = p.nombre || `Plataforma ${p.id_plataforma}`;
              return acc;
            }, {});
          }

          const metodoIdsHistorial = rows.map((r) => r.id_metodo_de_pago);
          const metodoIdsOrdenes = Object.values(ordenesMap).map((o) => o.id_metodo_de_pago);
          const metodoIds = Array.from(
            new Set([...metodoIdsHistorial, ...metodoIdsOrdenes].filter(Boolean))
          );
          let metodoMap = {};
          if (metodoIds.length) {
            const { data: metodos, error: metErr } = await supabase
              .from("metodos_de_pago")
              .select("id_metodo_de_pago, nombre")
              .in("id_metodo_de_pago", metodoIds);
            if (metErr) throw metErr;
            metodoMap = (metodos || []).reduce((acc, m) => {
              acc[m.id_metodo_de_pago] = m.nombre || `Método ${m.id_metodo_de_pago}`;
              return acc;
            }, {});
          }

          let userMap = {};
          if (userIds.length) {
            const { data: users, error: userErr } = await supabase
              .from("usuarios")
              .select("id_usuario, nombre, apellido")
              .in("id_usuario", userIds);
            if (userErr) throw userErr;
            userMap = (users || []).reduce((acc, u) => {
              acc[u.id_usuario] = [u.nombre, u.apellido].filter(Boolean).join(" ").trim();
              return acc;
            }, {});
          }

          const normalizedRows = rows.map((r) => {
              const orden = r.id_orden ? ordenesMap[r.id_orden] : null;
              const venta = r.id_venta ? ventasMap[r.id_venta] : null;
              const cliente =
                userMap[r.id_usuario_cliente] ||
                userMap[orden?.id_usuario] ||
                userMap[venta?.id_usuario] ||
                "-";
              const precio = venta?.id_precio ? preciosMap[venta.id_precio] : null;
              const idPlataformaFinal = r.id_plataforma || precio?.id_plataforma || null;
              const plataforma =
                idPlataformaFinal && platMap[idPlataformaFinal]
                  ? platMap[idPlataformaFinal]
                  : `Plataforma ${idPlataformaFinal || "-"}`;
              const detalle = precio
                ? buildDetalle(precio)
                : isTrue(r.renovacion)
                ? "Renovación"
                : isTrue(r.venta_cliente)
                ? "Venta"
                : "-";
              const metodoId = r.id_metodo_de_pago || orden?.id_metodo_de_pago || null;
              const metodoRaw = metodoId ? metodoMap[metodoId] || "-" : "-";
              const metodo = truncateText(metodoRaw, 12);
              const referencia = r.referencia ?? orden?.referencia ?? "-";
              const rawFecha = r.fecha_pago || orden?.fecha || null;
              const fecha =
                formatDDMMYYYY(r.fecha_pago) ||
                formatDDMMYYYY(orden?.fecha) ||
                r.fecha_pago ||
                orden?.fecha ||
                "-";
              const hora = formatHora(r.hora_pago || orden?.hora_orden);
              const idVentaVisible = r.id_venta ?? orden?.id_orden ?? "-";
              return {
                monthKey: getMonthKey(rawFecha) || "__sin_fecha__",
                html: `
                <tr>
                  <td>${idVentaVisible}</td>
                  <td>${cliente || "-"}</td>
                  <td>${plataforma}</td>
                  <td>${detalle}</td>
                  <td>${formatMonto(r.monto)}</td>
                  <td>${metodo}</td>
                  <td>${referencia}</td>
                  <td>${fecha}</td>
                  <td>${hora}</td>
                </tr>
              `,
              };
            });

          const monthKeys = Array.from(
            new Set(normalizedRows.map((row) => row.monthKey))
          ).sort((a, b) => {
            if (a === "__sin_fecha__") return 1;
            if (b === "__sin_fecha__") return -1;
            return a > b ? -1 : a < b ? 1 : 0;
          });
          const currentMonth = getCurrentMonthKey();
          if (!monthKeys.includes(currentMonth)) {
            monthKeys.unshift(currentMonth);
          }

          if (monthSelectEl) {
            monthSelectEl.innerHTML = monthKeys
              .map((key) =>
                `<option value="${key}">${
                  key === "__sin_fecha__" ? "Sin fecha" : getMonthLabel(key)
                }</option>`
              )
              .join("");
          }

          const renderMonth = (monthKey) => {
            const filtered = normalizedRows.filter((row) => row.monthKey === monthKey);
            if (!filtered.length) {
              if (tbodyEl) tbodyEl.innerHTML = "";
              const monthLabel = monthKey === "__sin_fecha__" ? "Sin fecha" : getMonthLabel(monthKey);
              setStatus(`No hay ventas registradas para ${monthLabel}.`);
              return;
            }
            if (tbodyEl) {
              tbodyEl.innerHTML = filtered.map((row) => row.html).join("");
            }
            setStatus("");
          };

          const defaultMonth = monthKeys.includes(currentMonth) ? currentMonth : monthKeys[0];
          if (monthSelectEl) {
            monthSelectEl.value = defaultMonth;
            monthSelectEl.addEventListener("change", () => {
              renderMonth(monthSelectEl.value);
            });
          }
          renderMonth(defaultMonth);
        } catch (err) {
          console.error("historial ventas error", err);
          setStatus("No se pudieron cargar las ventas.");
        }
      };

      init();
    </script>
  </body>
</html>
