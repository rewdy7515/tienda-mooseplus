<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Detalle de Orden</title>
    <link rel="stylesheet" href="../styles/styles.css" />
    <style>
      .orden-info-card {
        margin-top: 12px;
        background: #ffffff;
        border: 1px solid #e5e7eb;
        border-radius: 12px;
        padding: 12px 14px;
      }
      .orden-info-grid {
        align-items: start;
      }
      .orden-info-break {
        grid-column: 1 / -1;
        height: 0;
        margin: 4px 0 2px;
        border-top: 1px dashed #d1d5db;
      }
      .orden-servicios-row {
        grid-column: 1 / -1;
      }
      .btn-ver-servicios-orden {
        width: 100%;
        box-sizing: border-box;
        display: inline-flex;
        justify-content: center;
        align-items: center;
        min-height: 42px;
        margin-top: 2px;
        padding: 10px 14px;
        border-radius: 12px;
        border: 1px solid #16a34a;
        background: #16a34a;
        color: #ffffff;
        font-size: 14px;
        font-weight: 800;
        letter-spacing: 0.01em;
        box-shadow:
          0 8px 18px rgba(21, 128, 61, 0.28),
          inset 0 1px 0 rgba(255, 255, 255, 0.22);
        transition:
          transform 0.18s ease,
          box-shadow 0.18s ease,
          background-color 0.18s ease;
      }
      .btn-ver-servicios-orden::after {
        content: "→";
        margin-left: 8px;
        font-size: 15px;
        line-height: 1;
        opacity: 0.92;
      }
      .btn-ver-servicios-orden:hover {
        transform: translateY(-1px);
        background: #15803d;
        border-color: #15803d;
        box-shadow:
          0 12px 22px rgba(21, 128, 61, 0.32),
          inset 0 1px 0 rgba(255, 255, 255, 0.25);
      }
      .btn-ver-servicios-orden:active {
        transform: translateY(0);
        box-shadow:
          0 5px 12px rgba(21, 128, 61, 0.24),
          inset 0 1px 0 rgba(255, 255, 255, 0.2);
      }
      .btn-ver-servicios-orden:focus-visible {
        outline: 2px solid #16a34a;
        outline-offset: 2px;
      }
      .orden-estado-chip {
        grid-column: 1 / -1;
        justify-self: end;
        margin: 0 0 2px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 30px;
        padding: 0 12px;
        border-radius: 999px;
        border: 1px solid transparent;
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.01em;
        white-space: nowrap;
      }
      .orden-estado-chip.is-pending {
        background: #fff7db;
        color: #8a6100;
        border-color: #f3d27a;
      }
      .orden-estado-chip.is-waiting {
        background: #e0f2fe;
        color: #075985;
        border-color: #9bd4ff;
      }
      .orden-estado-chip.is-processed {
        background: #e7f8ee;
        color: #166534;
        border-color: #9fd8b2;
      }
      .orden-estado-chip.is-cancelled {
        background: #fee2e2;
        color: #b91c1c;
        border-color: #f5b5b5;
      }
      .orden-section-title {
        margin: 16px 0 8px;
        font-size: 16px;
        font-weight: 800;
        color: #111827;
      }
      .orden-header-row {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .orden-item-meta {
        margin: 2px 0 0;
        font-size: 13px;
        color: #4b5563;
      }
      #orden-items .cart-table-scroll {
        display: block;
        width: 100%;
        max-width: 100%;
        overflow-x: auto;
        overflow-y: hidden;
        -webkit-overflow-scrolling: touch;
      }
      #orden-items {
        width: 100%;
        min-width: 0;
      }
      #orden-items .cart-layout,
      #orden-items .orden-items-panel {
        width: 100%;
        min-width: 0;
      }
      #orden-items .cart-page-table {
        width: max-content;
        min-width: 760px;
      }
      .cart-table-wrap {
        width: 100%;
        max-width: 100%;
        overflow-x: hidden;
      }
      #orden-items .status-chip {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 4px 8px;
        border-radius: 999px;
        background: #eef2ff;
        color: #1e3a8a;
        font-size: 12px;
        font-weight: 700;
        white-space: nowrap;
      }
      @media (max-width: 700px) {
        #orden-items .cart-table-scroll {
          padding-bottom: 4px;
        }
      }
    </style>
  </head>
  <body class="cart-page">
    <div id="app-header" data-header-root="../" data-header-pages=""></div>
    <script src="../scripts/header-loader.js"></script>

    <main class="categorias-dinamicas">
      <div class="cart-title-row">
        <div class="orden-header-row">
          <h2>Detalle de Orden</h2>
        </div>
        <button id="btn-volver" type="button" class="btn-outline">Volver</button>
      </div>

      <p id="detalle-status" class="status">Cargando orden...</p>

      <section class="orden-info-card">
        <div id="orden-info-grid" class="modal-info-grid orden-info-grid"></div>
      </section>

      <h3 id="orden-items-title" class="orden-section-title">Items</h3>
      <div class="cart-table-wrap">
        <div id="orden-items" class="cart-items page-cart"></div>
      </div>
    </main>

    <script type="module" src="../scripts/detalle-ordenes.js"></script>
  </body>
</html>
