<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reportes</title>
    <link rel="stylesheet" href="../../styles/styles.css" />
    <style>
      .reportes-pendientes-list .inventario-item,
      .reportes-solucionados-list .inventario-item {
        background: transparent;
        border: none;
        box-shadow: none;
        padding: 0;
      }
      .reportes-pendientes-list .inventario-item + .inventario-item,
      .reportes-solucionados-list .inventario-item + .inventario-item {
        margin-top: 8px;
      }
      .reportes-pendientes-list .inventario-btn,
      .reportes-solucionados-list .inventario-btn {
        display: block;
        width: 100%;
        margin: 0;
        border-radius: 8px;
        background: var(--btn-plat-bg, #111);
        color: #fff;
        border: 1px solid var(--btn-plat-bg, #111);
        box-shadow: none;
        font-size: 18px;
      }
      .reportes-pendientes-list .inventario-item.open .inventario-btn,
      .reportes-solucionados-list .inventario-item.open .inventario-btn {
        border-radius: 8px 8px 0 0;
      }
      .reportes-pendientes-list .inventario-plan,
      .reportes-solucionados-list .inventario-plan {
        margin-top: 0;
      }
      .reportes-pendientes-list .inventario-plan .table-base,
      .reportes-solucionados-list .inventario-plan .table-base {
        border-radius: 0 0 10px 10px;
        border-top: 0;
      }
      .reportes-pendientes-list .inventario-plan .reportes-table,
      .reportes-solucionados-list .inventario-plan .reportes-table {
        margin-top: 0;
      }
      .reportes-pendientes-list .reporte-estado-wrap {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 8px;
      }
      .reportes-pendientes-list td.estado-datos-incorrectos {
        background: #ffe2bf;
        color: #7c3f00;
        font-weight: 600;
      }
      .reportes-pendientes-list .btn-modificar-datos {
        border-color: #d97706;
        color: #9a3412;
        background: #fff7ed;
      }
      .reportes-pendientes-list .btn-modificar-datos:hover {
        background: #ffedd5;
      }
      .reportes-admin-search {
        margin: 0 0 14px;
        position: relative;
      }
      .reportes-admin-search.hidden {
        display: none;
      }
      .reportes-admin-search input {
        width: 100%;
      }
      .reportes-admin-results {
        position: absolute;
        top: calc(100% + 6px);
        left: 0;
        right: 0;
        z-index: 30;
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 10px;
        box-shadow: 0 10px 24px rgba(15, 23, 42, 0.12);
        max-height: 260px;
        overflow-y: auto;
      }
      .reportes-admin-results.hidden {
        display: none;
      }
      .reportes-admin-result {
        width: 100%;
        border: none;
        background: transparent;
        text-align: left;
        padding: 10px 12px;
        cursor: pointer;
        font: inherit;
      }
      .reportes-admin-result:hover {
        background: #f3f4f6;
      }
      .reportes-admin-target {
        margin-top: 8px;
        color: #6b7280;
        font-size: 13px;
        font-weight: 600;
      }
      .reportes-sol-filter {
        display: flex;
        align-items: center;
        gap: 10px;
        margin: 8px 0 12px;
      }
      .reportes-sol-filter label {
        font-weight: 600;
      }
      .reportes-sol-filter select {
        min-width: 220px;
      }
      .reporte-sol-reemplazo-msg {
        line-height: 1.5;
      }
      .reporte-sol-reemplazo-btn {
        margin-top: 10px;
        display: inline-flex;
      }
      .sol-modal-image-wrap {
        margin-top: 14px;
      }
      .sol-modal-image-wrap.hidden {
        display: none;
      }
      .sol-modal-image {
        width: 100%;
        max-height: 340px;
        object-fit: contain;
        border: 1px solid #e5e7eb;
        border-radius: 10px;
        background: #f8fafc;
      }
      .sol-modal-image-empty {
        margin-top: 8px;
        color: #6b7280;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <div id="app-header" data-header-root="../../" data-header-pages="../"></div>
    <script src="../../scripts/header-loader.js"></script>

    <main class="categorias-dinamicas">
      <h2>Reportes</h2>
      <div id="reportes-admin-search" class="reportes-admin-search hidden">
        <input
          type="text"
          id="reportes-admin-input"
          class="input-cuenta"
          placeholder="Buscar cliente por nombre o apellido..."
          autocomplete="off"
        />
        <div id="reportes-admin-results" class="reportes-admin-results hidden"></div>
        <div id="reportes-admin-target" class="reportes-admin-target hidden"></div>
      </div>
      <div class="actions" style="margin-bottom: 16px;">
        <button id="btn-crear-reporte" class="btn-primary">Hacer un reporte</button>
      </div>
      <h3>Reportes pendientes</h3>
      <div id="reportes-status" class="status"></div>
      <div id="reportes-pendientes-list" class="inventario-list reportes-pendientes-list"></div>

      <div id="solucionados-section" style="margin-top: 20px;">
        <h3>Reportes solucionados</h3>
        <div class="reportes-sol-filter">
          <label for="reportes-solucionados-filtro">Plataforma:</label>
          <select id="reportes-solucionados-filtro" class="input-cuenta">
            <option value="">Todas</option>
          </select>
        </div>
        <div
          id="reportes-solucionados-list"
          class="inventario-list reportes-solucionados-list"
          style="margin-top: 12px;"
        ></div>
      </div>

      <div id="modal-solucionado" class="modal hidden">
        <div class="modal-backdrop"></div>
        <div class="modal-card modal-card-sol">
          <button class="modal-close modal-sol-close" aria-label="Cerrar">×</button>
          <div class="modal-body resumen-body">
            <h3 id="sol-modal-title"></h3>
            <div class="modal-info-grid">
              <div class="label">ID venta:</div>
              <div class="value" id="sol-modal-venta"></div>
              <div class="label">Correo:</div>
              <div class="value" id="sol-modal-correo"></div>
              <div class="label">Clave:</div>
              <div class="value" id="sol-modal-clave"></div>
              <div class="label">Perfil:</div>
              <div class="value" id="sol-modal-perfil"></div>
              <div class="label">PIN:</div>
              <div class="value" id="sol-modal-pin"></div>
              <div class="label">Notas:</div>
              <div class="value" id="sol-modal-notas"></div>
            </div>
            <div id="sol-modal-image-wrap" class="sol-modal-image-wrap hidden">
              <img
                id="sol-modal-image"
                class="sol-modal-image"
                alt="Imagen del reporte"
                loading="lazy"
                decoding="async"
              />
              <p id="sol-modal-image-empty" class="sol-modal-image-empty hidden">
                Este reporte no tiene imagen.
              </p>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script type="module" src="../../scripts/report.js"></script>
  </body>
</html>
