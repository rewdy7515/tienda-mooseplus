<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Revisar reportes</title>
    <link rel="stylesheet" href="../../styles/styles.css" />
    <style>
      .reportes-list {
        background: #fff;
        padding: 12px;
        border-radius: 12px;
      }
      .reportes-list .inventario-item {
        background: transparent;
        border: none;
        box-shadow: none;
        padding: 0;
      }
      .reportes-list .inventario-item + .inventario-item {
        margin-top: 8px;
      }
      .reportes-list .inventario-btn {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        width: 100%;
        margin: 0;
        border-radius: 8px;
        background: var(--btn-plat-bg, #111);
        color: #fff;
        border: 1px solid var(--btn-plat-bg, #111);
        box-shadow: none;
        font-size: 18px;
        transition: filter 0.15s ease, opacity 0.15s ease;
      }
      .reportes-list .inventario-btn:hover {
        background: var(--btn-plat-bg, #111);
        border-color: var(--btn-plat-bg, #111);
        filter: brightness(1.15);
      }
      .reportes-list .inventario-btn:active {
        background: var(--btn-plat-bg, #111);
        border-color: var(--btn-plat-bg, #111);
        filter: brightness(0.9);
      }
      .reportes-list .plat-btn-label {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .reportes-list .plat-btn-main {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        min-width: 0;
      }
      .reportes-list .plat-count-badge {
        display: inline-flex;
        align-items: center;
        background: rgba(255, 255, 255, 0.18);
        border: 1px solid rgba(255, 255, 255, 0.35);
        border-radius: 999px;
        padding: 4px 8px;
        font-size: 12px;
        font-weight: 800;
        line-height: 1;
        flex: 0 0 auto;
      }
      .reportes-list .plat-count-icon {
        width: 16px;
        height: 16px;
        border-radius: 999px;
        background: rgba(0, 0, 0, 0.3);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 11px;
        font-weight: 900;
      }
      .reportes-list .inventario-item.open .inventario-btn {
        border-radius: 8px 8px 0 0;
      }
      .reportes-list .inventario-plan {
        margin-top: 0;
      }
      .reportes-list .inventario-plan .table-base {
        border-radius: 0 0 10px 10px;
        border-top: 0;
      }
      .reportes-list .inventario-plan .reportes-table {
        margin-top: 0;
      }
      /* Limita la columna "Motivo" para que no ensanche toda la tabla en desktop */
      .reportes-list .reportes-table th:nth-child(4),
      .reportes-list .reportes-table td:nth-child(4) {
        width: 280px;
        max-width: 280px;
      }
      .reportes-list .reportes-table td:nth-child(4) {
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .reportes-list .reporte-motivo-wrap {
        display: flex;
        align-items: center;
        gap: 8px;
        min-width: 0;
        width: 100%;
      }
      .reportes-list .reporte-motivo-text {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        flex: 1 1 auto;
      }
      .reportes-list .btn-reactivar-venta {
        white-space: nowrap;
        flex: 0 0 auto;
        padding: 4px 8px;
      }
      .reportes-list .reportes-table .plan-divider-row td {
        font-weight: 700;
      }
      .reporte-inactiva-dot {
        display: inline-block;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #dc2626;
        margin-left: 0;
        vertical-align: middle;
      }
      .reporte-activa-dot {
        display: inline-block;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #16a34a;
        margin-left: 0;
        vertical-align: middle;
      }
      .reporte-activa-dot.reporte-activa-dot-warning {
        background: #f97316;
      }
      .correo-admin-actions .reporte-inactiva-dot {
        margin-right: 2px;
        flex: 0 0 auto;
      }
      .correo-admin-actions .reporte-activa-dot {
        margin-right: 2px;
        flex: 0 0 auto;
      }
      .auto-reemplazo-toggle {
        margin: 8px 0 14px;
        padding: 10px 12px;
        border: 1px solid #e5e7eb;
        border-radius: 10px;
        background: #fff;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }
      .auto-reemplazo-toggle .toggle-label {
        font-size: 14px;
        font-weight: 600;
        color: #111827;
      }
      .switch {
        position: relative;
        display: inline-block;
        width: 46px;
        height: 26px;
        flex: 0 0 auto;
      }
      .switch input {
        opacity: 0;
        width: 0;
        height: 0;
      }
      .switch-slider {
        position: absolute;
        inset: 0;
        cursor: pointer;
        background-color: #d1d5db;
        transition: 0.2s;
        border-radius: 999px;
      }
      .switch-slider:before {
        position: absolute;
        content: "";
        height: 20px;
        width: 20px;
        left: 3px;
        top: 3px;
        background-color: #fff;
        transition: 0.2s;
        border-radius: 50%;
      }
      .switch input:checked + .switch-slider {
        background-color: #16a34a;
      }
      .switch input:checked + .switch-slider:before {
        transform: translateX(20px);
      }
      .switch input:disabled + .switch-slider {
        cursor: not-allowed;
        opacity: 0.6;
      }
      #modal-imagen-wrapper {
        width: min(100%, 520px);
        max-width: 100%;
        min-height: 200px;
        aspect-ratio: var(--report-image-ratio, 4 / 3);
        border-radius: 8px;
        border: 1px solid #e5e7eb;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #fff;
      }
      #modal-imagen-wrapper.downloadable {
        position: relative;
        cursor: pointer;
      }
      #modal-imagen-wrapper.downloadable::after {
        content: "Presiona para descargar imagen";
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.52);
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 10px;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.2px;
        opacity: 0;
        transition: opacity 0.15s ease;
      }
      #modal-imagen-wrapper.downloadable:hover::after {
        opacity: 1;
      }
      #modal-imagen-wrapper.no-image {
        background: #e5e7eb;
      }
      #modal-imagen-wrapper.no-image::before {
        content: "Sin imagen";
        color: #6b7280;
        font-size: 13px;
        font-weight: 700;
      }
      #modal-imagen-wrapper.no-image #modal-imagen {
        display: none;
      }
      #modal-imagen-wrapper #modal-imagen {
        width: 100%;
        height: 100%;
        max-width: none;
        max-height: none;
        object-fit: contain;
      }
      #modal-detalle .modal-evidencia {
        width: 100%;
      }
      #modal-sin-imagen {
        display: none;
      }
      .copyable-field {
        cursor: pointer;
        text-decoration: underline dotted;
        text-underline-offset: 2px;
      }
      .modal-inline-actions {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .correo-actions-inline {
        display: flex;
        align-items: center;
        gap: 6px;
        width: 100%;
        min-width: 0;
      }
      .correo-main-inline {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        min-width: 0;
        flex: 1 1 auto;
      }
      .correo-main-inline .copyable-field {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .correo-admin-actions {
        display: inline-flex;
        align-items: center;
        justify-content: flex-end;
        gap: 6px;
        margin-left: auto;
        flex: 0 0 auto;
      }
      .reporte-datos-badge {
        display: inline-flex;
        align-items: center;
        min-height: 22px;
        padding: 0 9px;
        border-radius: 999px;
        border: 1px solid transparent;
        font-size: 11px;
        font-weight: 800;
        line-height: 1;
        white-space: nowrap;
      }
      .reporte-datos-badge.is-incorrecto {
        background: #fff1d6;
        color: #9a3412;
        border-color: #fed7aa;
      }
      .reporte-datos-badge.is-corregido {
        background: #dcfce7;
        color: #166534;
        border-color: #86efac;
      }
      .btn-copy-inline {
        white-space: nowrap;
      }
      .btn-copy-icon {
        width: 34px;
        min-width: 34px;
        height: 34px;
        padding: 0;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: #111;
        border-color: #111;
        color: #fff;
      }
      .btn-copy-icon:hover,
      .btn-copy-icon:focus-visible {
        background: #000;
        border-color: #000;
        color: #fff;
      }
      .btn-copy-icon .copy-icon {
        width: 14px;
        height: 14px;
        object-fit: contain;
        filter: brightness(0) invert(1);
        pointer-events: none;
      }
      .btn-admin-inline {
        min-width: 34px;
        padding: 6px 8px;
      }
      .btn-admin-madre-inline {
        background: #f97316;
        border: 1px solid #f97316;
        color: #fff;
      }
      .btn-admin-madre-inline:hover,
      .btn-admin-madre-inline:focus-visible {
        background: #ea580c;
        border-color: #ea580c;
        color: #fff;
      }
      #modal-correo {
        cursor: pointer;
      }
      #modal-plat-title {
        font-weight: 800;
      }
      #modal-plat-subtitle {
        margin: 4px 0 0;
        font-size: 13px;
        font-weight: 700;
        color: #6b7280;
      }
      #modal-plat-title.is-link {
        cursor: pointer;
      }
      .btn-datos-incorrectos {
        background: #b91c1c;
        border: 1px solid #b91c1c;
        color: #fff;
      }
      .btn-datos-incorrectos:hover,
      .btn-datos-incorrectos:focus-visible {
        background: #991b1b;
        border-color: #991b1b;
        color: #fff;
      }
      .resumen-group {
        width: 100%;
        border: 1px solid #e5e7eb;
        border-radius: 10px;
        padding: 0;
        background: #f9fafb;
        overflow: hidden;
      }
      .resumen-group-btn {
        width: 100%;
        margin: 0;
        border: 0;
        background: linear-gradient(135deg, #ffffff, #f3f4f6);
        padding: 10px 12px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        cursor: pointer;
        font-size: 14px;
        font-weight: 800;
        color: #111827;
      }
      .resumen-group-btn:hover {
        background: linear-gradient(135deg, #ffffff, #eef2f7);
      }
      .resumen-group-caret {
        font-size: 12px;
        color: #6b7280;
        transition: transform 0.2s ease;
      }
      .resumen-group.is-open .resumen-group-caret {
        transform: rotate(180deg);
      }
      .resumen-group-options {
        display: flex;
        flex-direction: column;
        gap: 8px;
        padding: 10px 12px 12px;
        border-top: 1px solid #e5e7eb;
        background: #fff;
      }
      .resumen-custom-toggle {
        width: 100%;
        border: 1px solid #d1d5db;
        border-radius: 8px;
        padding: 8px 10px;
        background: #e5e7eb;
        color: #374151;
        font-weight: 600;
      }
      .resumen-custom-toggle:hover {
        background: #d1d5db;
      }
      .resumen-custom-toggle input {
        margin-top: 1px;
      }
      .modal-card-datos-incorrectos {
        width: min(92vw, 460px);
      }
      .datos-incorrectos-body {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .datos-incorrectos-subtitle {
        margin: 0;
        font-size: 14px;
        font-weight: 800;
        color: #111827;
      }
      .datos-incorrectos-checks {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .datos-incorrectos-mensaje-preview {
        margin: 0;
        padding: 10px 12px;
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        background: #f9fafb;
        color: #111827;
        font-size: 13px;
        line-height: 1.4;
        white-space: pre-wrap;
        word-break: break-word;
      }
      .datos-incorrectos-preview {
        min-height: 30px;
        margin: 0;
        font-size: 13px;
        color: #6b7280;
      }
    </style>
  </head>
  <body>
    <div id="app-header" data-header-root="../../" data-header-pages="../"></div>
    <script src="../../scripts/header-loader.js"></script>

    <main class="categorias-dinamicas">
      <h2>Reportes pendientes</h2>
      <div id="auto-reemplazo-toggle-wrap" class="auto-reemplazo-toggle hidden">
        <span class="toggle-label">Auto reemplazo por cuenta inactiva</span>
        <label class="switch" title="Activar/desactivar reemplazo automático">
          <input type="checkbox" id="toggle-auto-reemplazo" />
          <span class="switch-slider"></span>
        </label>
      </div>
      <p id="revisar-status" class="status">Cargando reportes...</p>
      <div id="reportes-list" class="inventario-list reportes-list"></div>

      <div id="modal-detalle" class="modal hidden">
        <div class="modal-backdrop"></div>
        <div class="modal-card">
          <button class="modal-close" aria-label="Cerrar">×</button>
          <div class="modal-body modal-body-split">
            <div class="modal-info">
              <h3 id="modal-plat-title" class="plat-title"></h3>
              <p id="modal-plat-subtitle" class="hidden"></p>
              <div class="modal-info-grid">
                <div class="label">Correo:</div>
                <div class="value">
                  <div class="modal-inline-actions">
                    <input type="text" id="modal-correo" class="form-input input-inline" readonly title="Copiar correo" />
                    <button
                      type="button"
                      class="btn-outline btn-copy-inline btn-admin-inline"
                      id="btn-open-admin-cuenta"
                      title="Abrir en Admin Cuentas"
                      aria-label="Abrir en Admin Cuentas"
                    >
                      ↗
                    </button>
                  </div>
                </div>
                <div class="label">Fecha de corte:</div>
                <div class="value">
                  <input type="text" id="modal-fecha-corte" class="form-input input-inline" readonly />
                </div>
                <div class="label">Contraseña:</div>
                <div class="value">
                  <div class="modal-inline-actions">
                    <input type="text" id="modal-clave" class="form-input input-inline" />
                    <button type="button" class="btn-outline btn-copy-inline btn-copy-icon" id="btn-copy-clave" title="Copiar contraseña" aria-label="Copiar contraseña">
                      <img
                        class="copy-icon"
                        src="https://ojigtjcwhcrnawdbtqkl.supabase.co/storage/v1/object/public/public_assets/iconos/copiar-portapapeles.png"
                        alt="Copiar"
                      />
                    </button>
                  </div>
                </div>
                <div class="label perfil-row">Perfil:</div>
                <div class="value perfil-row" id="modal-perfil"></div>
                <div class="label perfil-row">PIN:</div>
                <div class="value perfil-row">
                  <div class="modal-inline-actions">
                    <input type="number" id="modal-pin" class="form-input input-inline" inputmode="numeric" min="0" step="1" />
                    <button type="button" class="btn-outline btn-copy-inline btn-copy-icon perfil-row" id="btn-copy-pin" title="Copiar PIN" aria-label="Copiar PIN">
                      <img
                        class="copy-icon"
                        src="https://ojigtjcwhcrnawdbtqkl.supabase.co/storage/v1/object/public/public_assets/iconos/copiar-portapapeles.png"
                        alt="Copiar"
                      />
                    </button>
                  </div>
                </div>
                <div class="label">Motivo:</div>
                <div class="value" id="modal-motivo"></div>
              </div>
              <div class="modal-actions-column">
                <button class="btn-outline btn-datos-incorrectos hidden" id="btn-datos-incorrectos">Datos incorrectos</button>
                <button class="btn-primary" id="btn-cerrar-reporte">Cerrar reporte</button>
                <button class="btn-outline" id="btn-faltan-recaudos">Faltan recaudos</button>
                <button class="btn-outline" id="btn-reemplazar">Reemplazar</button>
              </div>
            </div>
            <div class="modal-evidencia">
              <p><strong>Evidencia:</strong></p>
              <div id="modal-imagen-wrapper">
                <img id="modal-imagen" src="" alt="Evidencia" />
              </div>
              <p id="modal-sin-imagen" class="hidden">Sin imagen</p>
            </div>
          </div>
        </div>
      </div>

      <div id="modal-resumen" class="modal hidden">
        <div class="modal-backdrop"></div>
        <div class="modal-card modal-card-resumen">
          <button class="modal-close modal-resumen-close" aria-label="Cerrar">×</button>
          <div class="modal-body resumen-body">
            <h3>Resumen de cambios</h3>
            <div class="resumen-rows">
              <div id="resumen-clave" class="resumen-row hidden">
                <div class="label">Contraseña:</div>
                <div class="value" id="resumen-clave-text"></div>
              </div>
              <div id="resumen-pin" class="resumen-row hidden">
                <div class="label">PIN:</div>
                <div class="value" id="resumen-pin-text"></div>
              </div>
            </div>
            <div class="resumen-checks">
              <label><input type="checkbox" class="resumen-check" id="check-agregar-dias" checked /> Agregar días</label>

              <div class="resumen-group" data-resumen-group>
                <button type="button" class="resumen-group-btn" data-resumen-group-toggle>
                  <span>Suscripción activada</span>
                  <span class="resumen-group-caret">▾</span>
                </button>
                <div class="resumen-group-options hidden" data-resumen-group-content>
                  <label><input type="checkbox" class="resumen-check" id="check-suscripcion" /> La cuenta ya cuenta con suscripción activa. Cierre y vuelva a abrir la aplicación por favor.</label>
                </div>
              </div>

              <div class="resumen-group" data-resumen-group>
                <button type="button" class="resumen-group-btn" data-resumen-group-toggle>
                  <span>Perfiles modificados</span>
                  <span class="resumen-group-caret">▾</span>
                </button>
                <div class="resumen-group-options hidden" data-resumen-group-content>
                  <label><input type="checkbox" class="resumen-check" id="check-perfiles" /> Se actualizó el pin de su perfil. Cierre y vuelva a abrir la aplicación por favor.</label>
                  <label><input type="checkbox" class="resumen-check" id="check-pin-same" /> Se volvió a poner el mismo pin al perfil. Cierre y vuelva a abrir la aplicación por favor.</label>
                </div>
              </div>

              <div class="resumen-group" data-resumen-group>
                <button type="button" class="resumen-group-btn" data-resumen-group-toggle>
                  <span>No se encontraron inconvenientes</span>
                  <span class="resumen-group-caret">▾</span>
                </button>
                <div class="resumen-group-options hidden" data-resumen-group-content>
                  <label><input type="checkbox" class="resumen-check" id="check-ingreso" /> Se pudo ingresar sin problemas con los datos actuales de la cuenta. Verifíquelos en inventario.</label>
                  <label><input type="checkbox" class="resumen-check" id="check-suscripcion-activa" /> La suscripción de la cuenta está activa.</label>
                </div>
              </div>

              <div class="resumen-group" data-resumen-group>
                <button type="button" class="resumen-group-btn" data-resumen-group-toggle>
                  <span>Código</span>
                  <span class="resumen-group-caret">▾</span>
                </button>
                <div class="resumen-group-options hidden" data-resumen-group-content>
                  <label id="check-codigo-ayuda-wrap" class="hidden"><input type="checkbox" class="resumen-check" id="check-codigo-ayuda" /> Presione "obtener ayuda" y luego "usar contraseña".</label>
                  <label><input type="checkbox" class="resumen-check" id="check-codigo-whatsapp" /> Un admin se comunicará con usted vía WhatsApp.</label>
                </div>
              </div>

              <label class="resumen-custom-toggle"><input type="checkbox" class="resumen-check" id="check-otro" /> Describir motivo personalizado</label>
              <textarea id="resumen-otro-text" class="form-input hidden" rows="3" placeholder="Describe el caso"></textarea>
            </div>
            <div class="modal-actions-column" style="margin-top:12px;">
              <button class="btn-primary" id="btn-guardar-campos">Guardar campos</button>
            </div>
          </div>
        </div>
      </div>

      <div id="modal-datos-incorrectos" class="modal hidden">
        <div class="modal-backdrop"></div>
        <div class="modal-card modal-card-datos-incorrectos">
          <button class="modal-close modal-datos-incorrectos-close" aria-label="Cerrar">×</button>
          <div class="modal-body datos-incorrectos-body">
            <h3>Datos incorrectos</h3>
            <div>
              <label for="datos-incorrectos-imagen"><strong>Imagen</strong></label>
              <input type="file" id="datos-incorrectos-imagen" class="form-input" accept="image/*" />
              <p id="datos-incorrectos-imagen-preview" class="datos-incorrectos-preview">Sin imagen seleccionada.</p>
            </div>
            <p class="datos-incorrectos-subtitle">Datos erroneos</p>
            <div class="datos-incorrectos-checks">
              <label><input type="checkbox" id="datos-incorrectos-check-correo" /> Correo</label>
              <label><input type="checkbox" id="datos-incorrectos-check-clave" /> Contraseña</label>
            </div>
            <p class="datos-incorrectos-subtitle">Mensaje que recibirá el cliente</p>
            <pre id="datos-incorrectos-mensaje-preview" class="datos-incorrectos-mensaje-preview"></pre>
            <div class="modal-actions-column" style="margin-top:4px;">
              <button class="btn-primary" id="btn-enviar-datos-incorrectos">Enviar</button>
            </div>
          </div>
        </div>
      </div>

    </main>

    <script type="module" src="../../scripts/revisar_reportes.js"></script>
  </body>
</html>
