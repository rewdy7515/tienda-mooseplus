<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cuenta nueva</title>
    <link rel="stylesheet" href="../styles/styles.css" />
    <style>
      .cuenta-nueva-form {
        max-width: 640px;
        margin-top: 12px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .cuenta-nueva-form .field {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .cuenta-nueva-form label {
        font-weight: 700;
      }
      .cuenta-nueva-form input,
      .cuenta-nueva-form select {
        padding: 10px 12px;
        border: 1px solid #ddd;
        border-radius: 10px;
        font-size: 14px;
      }
      /* Inputs numéricos sin flechas */
      .cuenta-nueva-form input[type="number"]::-webkit-outer-spin-button,
      .cuenta-nueva-form input[type="number"]::-webkit-inner-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }
      .cuenta-nueva-form input[type="number"] {
        -moz-appearance: textfield;
      }
      .modal-qty.inline {
        margin: 0;
      }
      .sugs {
        position: relative;
        width: 100%;
      }
      .sugs-list {
        position: absolute;
        top: 100%;
        left: 0;
        right: 0;
        width: 100%;
        box-sizing: border-box;
        background: #fff;
        border: 1px solid #ddd;
        border-radius: 10px;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
        margin-top: 6px;
        overflow: hidden;
        z-index: 20;
      }
      .sugs-list.hidden {
        display: none;
      }
      .sugs-list button {
        width: 100%;
        border: none;
        background: transparent;
        text-align: left;
        padding: 10px 12px;
        border-bottom: 1px solid #f0f0f0;
        cursor: pointer;
      }
      .sugs-list button:last-child {
        border-bottom: none;
      }
      .sugs-list button:hover {
        background: #f7f7f7;
      }
      .sugs-empty {
        padding: 10px 12px;
        color: #666;
        font-size: 13px;
      }
      .cn-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.4);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 999;
      }
      .cn-overlay.show {
        display: flex;
      }
      .cn-modal {
        background: #fff;
        border-radius: 12px;
        padding: 16px;
        max-width: 360px;
        width: calc(100% - 32px);
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.18);
      }
      .cn-modal p {
        margin: 8px 0;
      }
      .cn-form {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-top: 8px;
      }
      .cn-form input {
        padding: 8px 10px;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-size: 14px;
      }
      .cn-modal.cn-modal-large {
        max-width: 820px;
        width: min(100% - 32px, 820px);
        max-height: min(90vh, 760px);
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }
      .cn-resumen-head {
        display: flex;
        flex-wrap: wrap;
        align-items: flex-start;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 12px;
      }
      .cn-resumen-head h3,
      .cn-resumen-head p {
        margin: 0;
      }
      .cn-resumen-meta {
        color: #4b5563;
        font-size: 13px;
      }
      .cn-resumen-list {
        display: grid;
        gap: 10px;
        overflow: auto;
        padding-right: 4px;
      }
      .cn-resumen-item {
        border: 1px solid #e5e7eb;
        border-radius: 12px;
        padding: 12px;
        display: grid;
        gap: 8px;
        background: #f9fafb;
      }
      .cn-resumen-item-head {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }
      .cn-resumen-item-title {
        font-weight: 700;
        color: #111827;
      }
      .cn-resumen-item-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }
      .cn-resumen-tag {
        display: inline-flex;
        align-items: center;
        padding: 4px 8px;
        border-radius: 999px;
        background: #e5eefc;
        color: #1d4ed8;
        font-size: 12px;
        font-weight: 700;
      }
      .cn-resumen-item-detail {
        margin: 0;
        color: #374151;
        font-size: 13px;
        line-height: 1.45;
      }
      .cn-resumen-item-price {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 10px;
      }
      .cn-resumen-item-price label {
        font-size: 13px;
        font-weight: 700;
        color: #111827;
      }
      .cn-resumen-item-price input {
        width: 140px;
        padding: 8px 10px;
        border: 1px solid #d1d5db;
        border-radius: 8px;
        font-size: 14px;
      }
      .cn-resumen-default {
        font-size: 12px;
        color: #6b7280;
      }
      .cn-resumen-footer {
        margin-top: 14px;
        padding-top: 12px;
        border-top: 1px solid #e5e7eb;
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }
      .cn-resumen-total {
        margin: 0;
        font-weight: 800;
        color: #111827;
      }
      .cn-resumen-empty {
        margin: 0;
        padding: 12px;
        border: 1px dashed #d1d5db;
        border-radius: 10px;
        color: #6b7280;
        text-align: center;
      }
      #cn-procesar {
        margin-top: 4px;
        align-self: flex-start;
      }
      .hidden {
        display: none !important;
      }
      .cn-actions {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
        margin-top: 12px;
      }
      .cn-btn {
        padding: 8px 12px;
        border-radius: 8px;
        border: none;
        cursor: pointer;
      }
      .cn-primary {
        background: #111;
        color: #fff;
      }
      .cn-close {
        background: #e5e7eb;
        color: #111;
      }
      @media (max-width: 640px) {
        .cn-modal.cn-modal-large {
          width: calc(100% - 20px);
          max-height: calc(100vh - 20px);
          padding: 14px;
        }
        .cn-resumen-item-price input {
          width: 100%;
        }
        .cn-resumen-footer {
          align-items: stretch;
        }
        .cn-resumen-footer .cn-actions {
          width: 100%;
          justify-content: stretch;
        }
        .cn-resumen-footer .cn-actions .cn-btn {
          flex: 1 1 0;
        }
      }
    </style>
  </head>
  <body>
    <div id="app-header" data-header-root="../" data-header-pages=""></div>
    <script src="../scripts/header-loader.js"></script>

    <main class="categorias-dinamicas">
      <h2>Cuenta nueva</h2>
      <div class="cuenta-nueva-form">
        <div class="field sugs">
          <label for="cn-cliente">Cliente</label>
          <input type="text" id="cn-cliente" placeholder="Nombre del cliente" autocomplete="off" />
          <div id="cn-sugs" class="sugs-list hidden"></div>
          <p id="cn-cliente-id" class="status" style="margin:4px 0 0; font-size:12px; color:#444;">ID usuario: -</p>
          <p id="cn-cliente-acceso" class="status" style="margin:0; font-size:12px; color:#444;">Acceso: -</p>
        </div>
        <div class="field">
          <label for="cn-ref">Nro de referencia</label>
          <input type="number" id="cn-ref" step="1" min="0" inputmode="numeric" value="1111" />
        </div>
        <button type="button" class="btn-primary" id="cn-procesar">Procesar</button>
      </div>
    </main>
    <div id="cn-modal" class="cn-overlay">
      <div class="cn-modal">
        <div id="cn-modal-step1">
          <p>No se encontró cliente en la base de datos.</p>
          <p>¿Añadir nuevo cliente?</p>
          <div class="cn-actions">
            <button type="button" class="cn-btn cn-primary" id="cn-modal-si">Sí</button>
            <button type="button" class="cn-btn cn-close" id="cn-modal-no">No</button>
          </div>
        </div>
        <div id="cn-modal-step2" style="display:none;">
          <p>Agregar nuevo cliente</p>
          <div class="cn-form">
            <input type="text" id="cn-nombre" placeholder="Nombre" />
            <input type="text" id="cn-apellido" placeholder="Apellido" />
            <input type="email" id="cn-correo" placeholder="Correo" />
            <input type="tel" id="cn-telefono" placeholder="Teléfono" />
          </div>
          <div class="cn-actions">
            <button type="button" class="cn-btn cn-primary" id="cn-modal-guardar">Guardar</button>
            <button type="button" class="cn-btn cn-close" id="cn-modal-cancelar">Cancelar</button>
          </div>
        </div>
      </div>
    </div>
    <div id="cn-resumen-modal" class="cn-overlay">
      <div class="cn-modal cn-modal-large">
        <div class="cn-resumen-head">
          <div>
            <h3>Resumen de la orden</h3>
            <p id="cn-resumen-meta" class="cn-resumen-meta"></p>
          </div>
        </div>
        <div id="cn-resumen-list" class="cn-resumen-list"></div>
        <div class="cn-resumen-footer">
          <p id="cn-resumen-total" class="cn-resumen-total">Total: $0.00</p>
          <div class="cn-actions">
            <button type="button" class="cn-btn cn-close" id="cn-resumen-cancelar">
              Cancelar
            </button>
            <button type="button" class="cn-btn cn-primary" id="cn-resumen-confirmar">
              Confirmar y procesar
            </button>
          </div>
        </div>
      </div>
    </div>
    <script type="module">
      import { requireSession, attachLogoHome } from "../scripts/session.js";
      import {
        supabase,
        loadCurrentUser,
        fetchCheckoutSummary,
        submitCheckout,
      } from "../scripts/api.js";
      import { buildNotificationPayload, pickNotificationUserIds } from "../scripts/notification-templates.js";

      requireSession();
      attachLogoHome();

      const clienteInput = document.querySelector("#cn-cliente");
      const clienteSugs = document.querySelector("#cn-sugs");
      const clienteIdLabel = document.querySelector("#cn-cliente-id");
      const clienteAccesoLabel = document.querySelector("#cn-cliente-acceso");
      const modal = document.querySelector("#cn-modal");
      const modalSi = document.querySelector("#cn-modal-si");
      const modalNo = document.querySelector("#cn-modal-no");
      const modalStep1 = document.querySelector("#cn-modal-step1");
      const modalStep2 = document.querySelector("#cn-modal-step2");
      const modalGuardar = document.querySelector("#cn-modal-guardar");
      const modalCancelar = document.querySelector("#cn-modal-cancelar");
      const modalNombre = document.querySelector("#cn-nombre");
      const modalApellido = document.querySelector("#cn-apellido");
      const modalCorreo = document.querySelector("#cn-correo");
      const modalTelefono = document.querySelector("#cn-telefono");
      const modalGuardarDefaultText = modalGuardar?.textContent || "Guardar";
      const procesarBtn = document.querySelector("#cn-procesar");
      const procesarBtnDefaultText = procesarBtn?.textContent || "Procesar";
      const resumenModal = document.querySelector("#cn-resumen-modal");
      const resumenMeta = document.querySelector("#cn-resumen-meta");
      const resumenList = document.querySelector("#cn-resumen-list");
      const resumenTotal = document.querySelector("#cn-resumen-total");
      const resumenCancelar = document.querySelector("#cn-resumen-cancelar");
      const resumenConfirmar = document.querySelector("#cn-resumen-confirmar");
      const resumenConfirmarDefaultText = resumenConfirmar?.textContent || "Confirmar y procesar";
      let sugsCounter = 0;
      let suppressBlur = false;
      let usuariosCache = null;
      let usuariosCachePromise = null;
      let checkCounter = 0;
      let adminId = null;
      let isSuperAdmin = false;
      let clienteSeleccionadoId = null;
      let checkoutSummaryState = null;
      const toTitleCase = (str) =>
        (str || "").replace(/(\S+)/g, (w) => (w ? w[0].toUpperCase() + w.slice(1).toLowerCase() : ""));
      const normalizeText = (val) =>
        (val || "")
          .toString()
          .normalize("NFD")
          .replace(/[\u0300-\u036f]/g, "")
          .toLowerCase()
          .trim();
      const todayInVenezuela = () =>
        new Intl.DateTimeFormat("en-CA", {
          timeZone: "America/Caracas",
          year: "numeric",
          month: "2-digit",
          day: "2-digit",
        }).format(new Date());
      const roundMoney = (value) => Math.round((Number(value || 0) + Number.EPSILON) * 100) / 100;
      const formatUsd = (value) => `$${roundMoney(value).toFixed(2)}`;
      const escapeHtml = (value) =>
        String(value ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      const parseMoneyInput = (value) => {
        const parsed = Number(String(value ?? "").trim().replace(",", "."));
        return Number.isFinite(parsed) ? roundMoney(parsed) : Number.NaN;
      };
      const setProcesarLoading = (isLoading = false, text = procesarBtnDefaultText) => {
        if (!procesarBtn) return;
        procesarBtn.disabled = !!isLoading;
        procesarBtn.classList.toggle("btn-disabled", !!isLoading);
        procesarBtn.textContent = isLoading ? text : procesarBtnDefaultText;
      };
      const setResumenConfirmLoading = (isLoading = false) => {
        if (resumenConfirmar) {
          resumenConfirmar.disabled = !!isLoading;
          resumenConfirmar.classList.toggle("btn-disabled", !!isLoading);
          resumenConfirmar.textContent = isLoading ? "Procesando..." : resumenConfirmarDefaultText;
        }
        if (resumenCancelar) {
          resumenCancelar.disabled = !!isLoading;
        }
      };
      const showResumenModal = () => resumenModal && resumenModal.classList.add("show");
      const hideResumenModal = () => {
        if (resumenModal) resumenModal.classList.remove("show");
        checkoutSummaryState = null;
      };
      const updateResumenTotal = () => {
        const total = roundMoney(
          (checkoutSummaryState?.items || []).reduce((sum, item) => sum + (Number(item?.monto_usd) || 0), 0),
        );
        if (resumenTotal) resumenTotal.textContent = `Total: ${formatUsd(total)}`;
        if (checkoutSummaryState) checkoutSummaryState.total_usd = total;
      };
      const renderResumenModal = () => {
        if (!resumenList) return;
        const items = Array.isArray(checkoutSummaryState?.items) ? checkoutSummaryState.items : [];
        if (!items.length) {
          resumenList.innerHTML = '<p class="cn-resumen-empty">No hay items en la orden.</p>';
          updateResumenTotal();
          return;
        }
        resumenList.innerHTML = items
          .map((item, index) => {
            const tags = [
              item?.renovacion ? "Renovación" : "Nuevo",
              `${Number(item?.cantidad) || 1} item(s)`,
              `${Number(item?.meses) || 1} mes(es)`,
              checkoutSummaryState?.tipo_precio === "mayor" ? "Precio mayor" : "Precio detal",
              `Precio #${item?.id_precio || "-"}`,
            ]
              .map((tag) => `<span class="cn-resumen-tag">${tag}</span>`)
              .join("");
            const montoOriginal = Number(item?.monto_original_usd);
            const descuento = Number(item?.descuento_usd);
            const pricingText =
              Number.isFinite(descuento) && descuento > 0
                ? `Base: ${formatUsd(montoOriginal)} | Descuento: -${formatUsd(descuento)}`
                : `Base: ${formatUsd(
                    Number.isFinite(montoOriginal)
                      ? montoOriginal
                      : item?.monto_base_usd || item?.monto_usd || 0,
                  )}`;
            return `
              <article class="cn-resumen-item">
                <div class="cn-resumen-item-head">
                  <div class="cn-resumen-item-title">Item ${index + 1}</div>
                  <div class="cn-resumen-item-tags">${tags}</div>
                </div>
                <p class="cn-resumen-item-detail">${escapeHtml(item?.detalle || "Sin detalle")}</p>
                <div class="cn-resumen-item-price">
                  <label for="cn-resumen-monto-${item.id_item}">Monto a guardar</label>
                  <input
                    type="number"
                    id="cn-resumen-monto-${item.id_item}"
                    data-id-item="${item.id_item}"
                    class="cn-resumen-monto"
                    step="0.01"
                    min="0"
                    inputmode="decimal"
                    value="${Number(item?.monto_usd || 0).toFixed(2)}"
                  />
                  <span class="cn-resumen-default">${pricingText}</span>
                </div>
              </article>
            `;
          })
          .join("");
        updateResumenTotal();
      };

      const loadUsuariosCache = async () => {
        if (usuariosCache) return usuariosCache;
        if (usuariosCachePromise) return usuariosCachePromise;
        usuariosCachePromise = supabase
          .from("usuarios")
          .select("id_usuario, nombre, apellido, acceso_cliente")
          .order("nombre", { ascending: true })
          .order("apellido", { ascending: true })
          .then(({ data, error }) => {
            usuariosCachePromise = null;
            if (error) throw error;
            usuariosCache = (data || []).map((u) => ({
              ...u,
              full_norm: normalizeText(`${u.nombre || ""} ${u.apellido || ""}`),
            }));
            return usuariosCache;
          })
          .catch((err) => {
            usuariosCachePromise = null;
            throw err;
          });
        return usuariosCachePromise;
      };

      // --- Sugerencias de clientes (rehecho) ---
      const clearSugs = () => {
        if (!clienteSugs) return;
        clienteSugs.innerHTML = "";
        clienteSugs.classList.add("hidden");
      };

      const renderClienteSugs = (items) => {
        if (!clienteSugs) return;
        if (!items.length) {
          clearSugs();
          return;
        }
        clienteSugs.innerHTML = items
          .map(
            (u) => `
              <button type="button" data-id="${u.id_usuario || ""}" data-nombre="${(u.nombre || "").trim()}" data-apellido="${(u.apellido || "").trim()}" data-acceso="${u.acceso_cliente}">
                ${(u.nombre || "")} ${(u.apellido || "")}
              </button>
            `
          )
          .join("");
        clienteSugs.classList.remove("hidden");
      };

      const buscarClientes = async (texto) => {
        const termRaw = texto || "";
        if (!termRaw.length) {
          clearSugs();
          return;
        }
        const term = normalizeText(termRaw);
        const current = ++sugsCounter;
        try {
          const data = await loadUsuariosCache();
          if (current !== sugsCounter) return;
          const filtered = (data || []).filter((u) => (u.full_norm || "").includes(term));
          const top = filtered.slice(0, 4);
          renderClienteSugs(top);
        } catch (err) {
          console.error("buscar clientes error", err);
          clearSugs();
        }
      };

      clienteInput?.addEventListener("input", (e) => {
        const el = clienteInput;
        const start = el.selectionStart;
        el.value = toTitleCase(el.value);
        if (start !== null) {
          const pos = Math.min(start, el.value.length);
          el.setSelectionRange(pos, pos);
        }
        buscarClientes(e.target.value);
      });

      clienteSugs?.addEventListener("click", (e) => {
        const btn = e.target.closest("button");
        if (!btn || !clienteInput) return;
          const nombre = btn.dataset.nombre || "";
          const apellido = btn.dataset.apellido || "";
          const acceso = btn.dataset.acceso;
          const id = btn.dataset.id || "";
          clienteInput.value = toTitleCase(`${nombre} ${apellido}`.trim());
          suppressBlur = false;
          clearSugs();
          clienteSeleccionadoId = id || null;
          if (clienteIdLabel) clienteIdLabel.textContent = `ID usuario: ${id || "-"}`;
          if (clienteAccesoLabel) {
            const accesoTxt = acceso === "false" ? "Revendedor" : "Cliente final";
            clienteAccesoLabel.textContent = `Acceso: ${accesoTxt}`;
          }
        });

      clienteSugs?.addEventListener("mousedown", () => {
        suppressBlur = true;
      });

      document.addEventListener("click", (e) => {
        if (!clienteSugs) return;
        const inside = clienteSugs.contains(e.target) || clienteInput?.contains(e.target);
        if (!inside) renderClienteSugs([], true);
      });

      const hideModal = () => modal && modal.classList.remove("show");
      const showModal = () => modal && modal.classList.add("show");
      const setModalGuardarLoading = (isLoading = false) => {
        if (!modalGuardar) return;
        modalGuardar.disabled = !!isLoading;
        modalGuardar.classList.toggle("btn-disabled", !!isLoading);
        modalGuardar.textContent = isLoading ? "Guardando..." : modalGuardarDefaultText;
      };
      const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));
      const POST_CHECKOUT_NOTIF_WAIT_MS = 2500;
      const isTransientCrearClienteError = (err) => {
        const code = String(err?.code || "").trim().toUpperCase();
        const status = Number(err?.status || err?.statusCode || 0);
        const msg = String(err?.message || "").toLowerCase();
        return (
          code === "PGRST002" ||
          status === 503 ||
          msg.includes("schema cache") ||
          msg.includes("retrying") ||
          msg.includes("service unavailable") ||
          msg.includes("failed to fetch") ||
          msg.includes("network")
        );
      };
      const getCrearClienteErrorMessage = (err) => {
        const code = String(err?.code || "").trim().toUpperCase();
        const msg = String(err?.message || "").trim();
        if (code === "23505") return "Ese correo ya existe. Usa otro correo.";
        if (isTransientCrearClienteError(err)) {
          return "El servicio está temporalmente ocupado. Intenta de nuevo en unos segundos.";
        }
        return msg || "No se pudo crear el cliente.";
      };
      const insertClienteWithRetry = async (payload, maxRetries = 2) => {
        let lastError = null;
        for (let attempt = 0; attempt <= maxRetries; attempt += 1) {
          const { data, error } = await supabase
            .from("usuarios")
            .insert(payload)
            .select("id_usuario")
            .single();
          if (!error) return data;
          lastError = error;
          if (!isTransientCrearClienteError(error) || attempt >= maxRetries) {
            throw error;
          }
          await sleep(350 * (attempt + 1));
        }
        throw lastError || new Error("No se pudo crear el cliente.");
      };

      const goStep1 = () => {
        if (modalStep1) modalStep1.style.display = "block";
        if (modalStep2) modalStep2.style.display = "none";
      };
      const goStep2 = () => {
        if (modalStep1) modalStep1.style.display = "none";
        if (modalStep2) modalStep2.style.display = "block";
      };

      modalNo?.addEventListener("click", () => {
        hideModal();
        if (clienteInput) clienteInput.value = "";
      });
      modalSi?.addEventListener("click", () => {
        if (clienteInput) {
          const parts = (clienteInput.value || "").trim().split(/\s+/);
          const nombre = toTitleCase(parts.shift() || "");
          const apellido = toTitleCase(parts.join(" ").trim());
          if (modalNombre) modalNombre.value = nombre;
          if (modalApellido) modalApellido.value = apellido;
        }
        goStep2();
      });
      modalCancelar?.addEventListener("click", () => {
        goStep1();
        hideModal();
        if (clienteInput) clienteInput.value = "";
      });

      const checkClienteExiste = async () => {
        const valRaw = clienteInput?.value || "";
        if (!valRaw) return;
        const term = normalizeText(valRaw);
        const current = ++checkCounter;
        try {
          console.log("[cuenta_nueva] buscar cliente", {
            raw: valRaw,
            term,
          });
          const data = await loadUsuariosCache();
          if (current !== checkCounter) return;
          if (normalizeText(clienteInput?.value || "") !== term) return;
          const filtered = (data || []).filter((u) => (u.full_norm || "").includes(term));
          if (!filtered.length) {
            goStep1();
            showModal();
            clienteSeleccionadoId = null;
            if (clienteIdLabel) clienteIdLabel.textContent = "ID usuario: -";
            if (clienteAccesoLabel) clienteAccesoLabel.textContent = "Acceso: -";
          } else if (clienteIdLabel && filtered[0]?.id_usuario) {
            clienteSeleccionadoId = filtered[0].id_usuario;
            console.log("[cuenta_nueva] id_usuario encontrado", clienteSeleccionadoId);
            clienteIdLabel.textContent = `ID usuario: ${clienteSeleccionadoId}`;
            if (clienteAccesoLabel) {
              const accesoTxt = filtered[0].acceso_cliente === false ? "Revendedor" : "Cliente final";
              clienteAccesoLabel.textContent = `Acceso: ${accesoTxt}`;
            }
            clearSugs();
          }
        } catch (err) {
          console.error("check cliente error", err);
          clienteSeleccionadoId = null;
        }
      };

      clienteInput?.addEventListener("blur", () => {
        if (suppressBlur) {
          setTimeout(() => {
            suppressBlur = false;
            checkClienteExiste();
            clearSugs();
          }, 120);
          return;
        }
        setTimeout(() => checkClienteExiste(), 100); // deja terminar click en sugerencias
        clearSugs();
      });

      clienteInput?.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
          e.preventDefault();
          checkClienteExiste();
        }
      });

      const titleCaseInput = (el) => {
        if (!el) return;
        const start = el.selectionStart;
        el.value = toTitleCase(el.value);
        if (start !== null) {
          const pos = Math.min(start, el.value.length);
          el.setSelectionRange(pos, pos);
        }
      };

      modalNombre?.addEventListener("input", () => titleCaseInput(modalNombre));
      modalApellido?.addEventListener("input", () => titleCaseInput(modalApellido));

      modalGuardar?.addEventListener("click", async () => {
        if (modalGuardar?.disabled) return;
        const nombre = toTitleCase(modalNombre?.value || "").trim();
        const apellido = toTitleCase(modalApellido?.value || "").trim();
        const correo = (modalCorreo?.value || "").trim();
        const fechaRegistroAdmin = todayInVenezuela();
        let telefono = (modalTelefono?.value || "").trim();
        telefono = telefono.replace(/[^\d]/g, "");
        if (!nombre || !apellido || !correo) {
          alert("Nombre, apellido y correo son obligatorios.");
          return;
        }
        setModalGuardarLoading(true);
        try {
          const data = await insertClienteWithRetry(
            {
              nombre,
              apellido,
              correo,
              telefono,
              acceso_cliente: true,
              fecha_registro_admin: fechaRegistroAdmin,
            },
            2,
          );
          const fullName = `${nombre} ${apellido}`.trim();
          if (clienteInput) clienteInput.value = fullName;
          clienteSeleccionadoId = data?.id_usuario || null;
          if (clienteIdLabel) clienteIdLabel.textContent = `ID usuario: ${clienteSeleccionadoId || "-"}`;
          if (clienteAccesoLabel) clienteAccesoLabel.textContent = "Acceso: Cliente final";
          if (usuariosCache && clienteSeleccionadoId) {
            usuariosCache.unshift({
              id_usuario: clienteSeleccionadoId,
              nombre,
              apellido,
              acceso_cliente: true,
              full_norm: normalizeText(fullName),
            });
          }
          goStep1();
          hideModal();
          modalNombre && (modalNombre.value = "");
          modalApellido && (modalApellido.value = "");
          modalCorreo && (modalCorreo.value = "");
          modalTelefono && (modalTelefono.value = "");
          alert("Cliente creado correctamente.");
        } catch (err) {
          console.error("crear cliente error", {
            code: err?.code || "",
            message: err?.message || "",
            details: err?.details ?? null,
            hint: err?.hint ?? null,
            status: err?.status || err?.statusCode || null,
            raw: err,
          });
          alert(getCrearClienteErrorMessage(err));
        } finally {
          setModalGuardarLoading(false);
        }
      });

      // Cargar info del admin actual
      (async () => {
        try {
          const user = await loadCurrentUser();
          adminId = user?.id_usuario || null;
          const isTrue = (v) => v === true || v === 1 || v === "1" || v === "true" || v === "t";
          const isSuper = isTrue(user?.permiso_superadmin);
          isSuperAdmin = isSuper;
          if (!isSuper) {
            alert("Acceso denegado.");
            window.location.href = "index.html";
            return;
          }
        } catch (err) {
          console.error("load current user error", err);
        }
      })();

      const finalizeCheckoutResponse = async (resp) => {
        if (!resp?.id_orden) {
          alert("La orden se creó sin id_orden.");
          return;
        }
        if (adminId && resp?.id_orden) {
          void supabase
            .from("ordenes")
            .update({ id_admin: adminId })
            .eq("id_orden", resp.id_orden)
            .then(({ error }) => {
              if (error) console.error("set id_admin orden error", error);
            })
            .catch((err) => console.error("set id_admin orden exception", err));
          void supabase
            .from("ventas")
            .update({ id_admin_venta: adminId })
            .eq("id_orden", resp.id_orden)
            .then(({ error }) => {
              if (error) console.error("set id_admin_venta error", error);
            })
            .catch((err) => console.error("set id_admin_venta exception", err));
        }
        const notifTask = (async () => {
          if (!resp?.id_orden) return;
          const { data: ventasOrden, error: ventasOrdErr } = await supabase
            .from("ventas")
            .select(
              "id_venta, id_usuario, fecha_corte, id_cuenta, id_perfil, id_orden, correo_miembro, clave_miembro, cuenta_base:cuentas!ventas_id_cuenta_fkey(correo, clave, id_plataforma, plataformas:plataformas(nombre)), cuenta_miembro:cuentas!ventas_id_cuenta_miembro_fkey(correo, clave, id_plataforma, plataformas:plataformas(nombre)), perfiles:perfiles(n_perfil)"
            )
            .eq("id_orden", resp.id_orden);
          if (ventasOrdErr) throw ventasOrdErr;
          const rowsNotif = [];
          const nuevosServiciosPorUsuario = new Map();
          (ventasOrden || []).forEach((v) => {
            const cuentaInfo = v.cuenta_miembro || v.cuenta_base || {};
            const ventaUserId = v.id_usuario;
            if (!ventaUserId) return;
            const platName = cuentaInfo?.plataformas?.nombre || "Plataforma";
            const perfilTxt = v.perfiles?.n_perfil ? `M${v.perfiles.n_perfil}` : "";
            const correoTxt = v.correo_miembro || cuentaInfo?.correo || "";
            const claveTxt = v.clave_miembro || cuentaInfo?.clave || "";
            if (!correoTxt) return;
            const items = nuevosServiciosPorUsuario.get(ventaUserId) || [];
            items.push({
              plataforma: platName,
              correoCuenta: correoTxt,
              clave: claveTxt,
              perfil: perfilTxt,
              fechaCorte: v.fecha_corte || "",
              idVenta: v.id_venta || null,
            });
            nuevosServiciosPorUsuario.set(ventaUserId, items);
          });

          nuevosServiciosPorUsuario.forEach((items, uid) => {
            if (!items.length) return;
            const userIds = pickNotificationUserIds("nuevo_servicio", { ventaUserId: uid });
            if (!userIds.length) return;
            const notif = buildNotificationPayload("nuevo_servicio", { items });
            userIds.forEach((id) => rowsNotif.push({ ...notif, id_usuario: id }));
          });
          if (rowsNotif.length) {
            const { error: notifErr } = await supabase.from("notificaciones").insert(rowsNotif);
            if (notifErr) throw notifErr;
          }
        })();

        const notifResult = await Promise.race([
          notifTask
            .then(() => "done")
            .catch((nErr) => {
              console.error("nuevo_servicio notif error", nErr);
              return "error";
            }),
          sleep(POST_CHECKOUT_NOTIF_WAIT_MS).then(() => "timeout"),
        ]);
        if (notifResult === "timeout") {
          console.warn("[cuenta_nueva] notif timeout, continuando redirect");
        }

        alert("Pedido procesado y asignado al cliente.");
        const dest = resp?.id_orden
          ? `entregar_servicios.html?id_orden=${encodeURIComponent(resp.id_orden)}`
          : "entregar_servicios.html";
        window.location.href = dest;
      };

      const openCheckoutSummaryModal = async () => {
        const idCliente = clienteSeleccionadoId || null;
        if (!idCliente) {
          alert("Selecciona un cliente válido (ID no encontrado).");
          return;
        }
        if (!isSuperAdmin) {
          alert("Acceso denegado.");
          return;
        }
        const referencia = (document.querySelector("#cn-ref")?.value || "").trim() || "N/A";
        try {
          setProcesarLoading(true, "Cargando resumen...");
          const summary = await fetchCheckoutSummary({
            id_usuario_override: idCliente,
          });
          if (summary?.error) {
            alert(`No se pudo cargar el resumen: ${summary.error}`);
            return;
          }
          const items = Array.isArray(summary?.items)
            ? summary.items.map((item) => ({
                ...item,
                monto_usd: roundMoney(item?.monto_usd || 0),
                monto_base_usd: roundMoney(item?.monto_base_usd || item?.monto_usd || 0),
                monto_original_usd: roundMoney(item?.monto_original_usd || item?.monto_base_usd || item?.monto_usd || 0),
                descuento_usd: roundMoney(item?.descuento_usd || 0),
              }))
            : [];
          if (!items.length) {
            alert("No hay items en el carrito para procesar.");
            return;
          }
          checkoutSummaryState = {
            idCliente,
            referencia,
            acceso_cliente: summary?.acceso_cliente,
            es_mayorista: summary?.es_mayorista === true,
            tipo_precio: summary?.tipo_precio === "mayor" ? "mayor" : "detal",
            tasa_bs:
              Number.isFinite(Number(summary?.tasa_bs)) && Number(summary?.tasa_bs) > 0
                ? Number(summary.tasa_bs)
                : Number.isFinite(Number(summary?.tasa_actual)) && Number(summary?.tasa_actual) > 0
                ? Number(summary.tasa_actual)
                : null,
            items,
            total_usd: roundMoney(summary?.total_usd || 0),
          };
          if (resumenMeta) {
            const accesoLabel = checkoutSummaryState.es_mayorista ? "Revendedor" : "Cliente final";
            resumenMeta.textContent = `Cliente: ${(clienteInput?.value || "").trim() || idCliente} | Acceso: ${accesoLabel} | Ref: ${referencia}`;
          }
          renderResumenModal();
          showResumenModal();
        } catch (err) {
          console.error("load checkout summary error", err);
          alert("No se pudo cargar el resumen de la orden.");
        } finally {
          setProcesarLoading(false);
        }
      };

      const processCheckoutFromSummary = async () => {
        if (resumenConfirmar?.disabled || !checkoutSummaryState) return;
        const idCliente = checkoutSummaryState.idCliente || null;
        const referencia = checkoutSummaryState.referencia || "N/A";
        const amountInputs = Array.from(
          resumenList?.querySelectorAll(".cn-resumen-monto[data-id-item]") || []
        );
        for (const input of amountInputs) {
          const parsed = parseMoneyInput(input.value);
          if (!Number.isFinite(parsed) || parsed < 0) {
            alert("Cada monto debe ser un número válido mayor o igual a 0.");
            input.focus();
            input.select?.();
            return;
          }
          const itemId = Number(input.dataset.idItem);
          const row = checkoutSummaryState.items.find((item) => Number(item?.id_item) === itemId);
          if (row) {
            row.monto_usd = parsed;
            input.value = parsed.toFixed(2);
          }
        }
        updateResumenTotal();
        try {
          setResumenConfirmLoading(true);
          const payload = {
            id_metodo_de_pago: 1,
            referencia,
            comprobantes: [],
            total: checkoutSummaryState.total_usd,
            tasa_bs: checkoutSummaryState.tasa_bs,
            id_usuario_override: idCliente,
            bypass_verificacion: isSuperAdmin === true,
            id_admin: adminId,
            historial_registrado_por_origen: "cuenta_nueva",
            custom_item_amounts: checkoutSummaryState.items.map((item) => ({
              id_item: item.id_item,
              monto_usd: item.monto_usd,
            })),
          };
          console.log("[cuenta_nueva] payload checkout", {
            idCliente,
            adminId,
            isSuperAdmin,
            payload,
          });
          const resp = await submitCheckout(payload);
          console.log("[cuenta_nueva] checkout resp", resp);
          if (resp?.error) {
            alert(`Error al procesar: ${resp.error}`);
            return;
          }
          hideResumenModal();
          await finalizeCheckoutResponse(resp);
        } catch (err) {
          console.error("procesar cuenta nueva error", err);
          alert("No se pudo procesar el pedido.");
        } finally {
          setResumenConfirmLoading(false);
        }
      };

      resumenList?.addEventListener("input", (e) => {
        const input = e.target.closest(".cn-resumen-monto[data-id-item]");
        if (!input || !checkoutSummaryState) return;
        const itemId = Number(input.dataset.idItem);
        const row = checkoutSummaryState.items.find((item) => Number(item?.id_item) === itemId);
        if (!row) return;
        const parsed = parseMoneyInput(input.value);
        row.monto_usd = Number.isFinite(parsed) && parsed >= 0 ? parsed : 0;
        updateResumenTotal();
      });

      resumenCancelar?.addEventListener("click", () => hideResumenModal());
      resumenConfirmar?.addEventListener("click", processCheckoutFromSummary);
      resumenModal?.addEventListener("click", (e) => {
        if (resumenConfirmar?.disabled) return;
        if (e.target === resumenModal) {
          hideResumenModal();
        }
      });

      document.querySelector("#cn-procesar")?.addEventListener("click", openCheckoutSummaryModal);
    </script>
  </body>
</html>
