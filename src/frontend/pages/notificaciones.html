<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Notificaciones</title>
    <link rel="stylesheet" href="../styles/styles.css" />
    <style>
      body {
        background: #f7f7fb;
      }
      main.categorias-dinamicas {
        max-width: 860px;
        margin: 0 auto;
        padding: 18px 16px 28px;
      }
      main.categorias-dinamicas h2 {
        margin: 4px 0 12px;
        font-size: 22px;
        font-weight: 800;
        color: #111827;
      }
      .notif-list {
        display: flex;
        flex-direction: column;
        gap: 14px;
        margin-top: 12px;
      }
      .notif-item {
        position: relative;
        border: 1px solid #e5e7eb;
        border-radius: 14px;
        padding: 14px 16px;
        background: #fff;
        box-shadow: 0 10px 22px rgba(15, 23, 42, 0.06);
        overflow: hidden;
        transition: transform 0.18s ease, box-shadow 0.18s ease,
          border-color 0.18s ease;
      }
      .notif-item:hover {
        transform: translateY(-2px);
        border-color: #d1d5db;
        box-shadow: 0 14px 26px rgba(15, 23, 42, 0.1);
      }
      .notif-item::before {
        content: "";
        position: absolute;
        top: 0;
        right: 0;
        width: 6px;
        height: 100%;
        background: linear-gradient(180deg, #111827, #374151);
        opacity: 0.85;
        transition: opacity 0.18s ease;
      }
      .notif-item.notif-item-report::before {
        background: linear-gradient(180deg, #b91c1c, #ef4444);
      }
      .notif-item:hover::before {
        opacity: 1;
      }
      .notif-item h4 {
        margin: 0 0 8px;
        text-transform: uppercase;
        letter-spacing: 0.6px;
        font-size: 13px;
        font-weight: 800;
        color: #111827;
      }
      .notif-item p {
        margin: 0;
        line-height: 1.5;
        color: #1f2937;
        font-size: 14px;
      }
      .notif-item p a {
        font-weight: 800;
        text-decoration: underline;
      }
      .notif-item .notif-line {
        display: block;
      }
      .notif-item .notif-id-venta {
        display: inline-block;
        font-weight: 700;
        font-size: 12px;
        color: #111827;
        background: #eef2ff;
        border: 1px solid #c7d2fe;
        border-radius: 999px;
        padding: 2px 8px;
        white-space: nowrap;
        margin-left: 6px;
      }
      .notif-item small {
        display: inline-block;
        margin-top: 8px;
        color: #6b7280;
        font-size: 12px;
      }
      #notif-status {
        color: #6b7280;
        font-weight: 600;
      }
      .notif-admin-search {
        margin: 0 0 12px;
        position: relative;
      }
      .notif-admin-search.hidden {
        display: none;
      }
      .notif-admin-search input {
        width: 100%;
      }
      .notif-admin-results {
        position: absolute;
        top: calc(100% + 6px);
        left: 0;
        right: 0;
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 10px;
        box-shadow: 0 10px 20px rgba(15, 23, 42, 0.12);
        max-height: 260px;
        overflow-y: auto;
        z-index: 20;
      }
      .notif-admin-results.hidden {
        display: none;
      }
      .notif-admin-result {
        width: 100%;
        border: none;
        background: transparent;
        text-align: left;
        padding: 10px 12px;
        cursor: pointer;
        font: inherit;
      }
      .notif-admin-result:hover {
        background: #f3f4f6;
      }
      .notif-admin-target {
        margin-top: 8px;
        color: #6b7280;
        font-size: 13px;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div id="app-header" data-header-root="../" data-header-pages=""></div>
    <script src="../scripts/header-loader.js"></script>

    <main class="categorias-dinamicas">
      <h2>Notificaciones</h2>
      <div id="notif-admin-search" class="notif-admin-search hidden">
        <input
          type="text"
          id="notif-admin-input"
          class="input-cuenta"
          placeholder="Buscar cliente por nombre o apellido..."
          autocomplete="off"
        />
        <div id="notif-admin-results" class="notif-admin-results hidden"></div>
        <div id="notif-admin-target" class="notif-admin-target hidden"></div>
      </div>
      <div id="notif-container">
        <p class="status" id="notif-status">Cargando...</p>
        <div class="notif-list" id="notif-body"></div>
      </div>
    </main>

    <script type="module">
      import { requireSession, attachLogout, attachLogoHome } from "../scripts/session.js";
      import { clearServerSession, loadCurrentUser, supabase } from "../scripts/api.js";
      import { buildNotificationPayload } from "../scripts/notification-templates.js";

      requireSession();
      attachLogoHome();

      const statusEl = document.querySelector("#notif-status");
      const tbody = document.querySelector("#notif-body");
      const adminSearchWrap = document.querySelector("#notif-admin-search");
      const adminSearchInput = document.querySelector("#notif-admin-input");
      const adminSearchResults = document.querySelector("#notif-admin-results");
      const adminSearchTarget = document.querySelector("#notif-admin-target");
      const TEST_USER_ID = 23;
      const isTrue = (v) =>
        v === true || v === 1 || v === "1" || v === "true" || v === "t";
      const normalizeSearchText = (value = "") =>
        String(value || "")
          .trim()
          .toLowerCase()
          .normalize("NFD")
          .replace(/[\u0300-\u036f]/g, "")
          .replace(/\s+/g, " ");
      const normalizePlatformName = (value = "") =>
        String(value || "").trim().toLowerCase();
      const normalizeHexColor = (value = "") => {
        const raw = String(value || "").trim();
        if (!raw) return null;
        const withHash = raw.startsWith("#") ? raw : `#${raw}`;
        return /^#([0-9a-fA-F]{3}|[0-9a-fA-F]{6})$/.test(withHash)
          ? withHash
          : null;
      };
      const buildPlatformColorMap = (rows = []) => {
        const map = new Map();
        (rows || []).forEach((row) => {
          const key = normalizePlatformName(row?.nombre);
          const color = normalizeHexColor(row?.color_1);
          if (key && color) map.set(key, color);
        });
        return map;
      };

      const setStatus = (msg) => {
        if (statusEl) statusEl.textContent = msg || "";
      };
      const setAdminTarget = (text = "") => {
        if (!adminSearchTarget) return;
        const safe = String(text || "").trim();
        adminSearchTarget.textContent = safe;
        adminSearchTarget.classList.toggle("hidden", !safe);
      };
      const formatDateDMY = (value) => {
        const raw = String(value || "").trim();
        if (!raw) return "";
        const base = raw.slice(0, 10);
        if (/^\d{4}-\d{2}-\d{2}$/.test(base)) {
          const [y, m, d] = base.split("-");
          return `${d}/${m}/${y}`;
        }
        const parsed = new Date(raw);
        if (Number.isNaN(parsed.getTime())) return raw;
        const d = String(parsed.getDate()).padStart(2, "0");
        const m = String(parsed.getMonth() + 1).padStart(2, "0");
        const y = parsed.getFullYear();
        return `${d}/${m}/${y}`;
      };

      const renderTable = (items = [], platformColors = new Map()) => {
        if (!tbody) return;
        if (!items.length) {
          setStatus("No hay notificaciones por ahora.");
          tbody.innerHTML = "";
          return;
        }
        setStatus("");
        const toSortDateMs = (value) => {
          const raw = String(value || "").trim();
          if (!raw) return 0;
          const base = raw.slice(0, 10);
          if (/^\d{4}-\d{2}-\d{2}$/.test(base)) {
            const [y, m, d] = base.split("-").map((n) => Number(n));
            return Date.UTC(y, (m || 1) - 1, d || 1, 0, 0, 0, 0);
          }
          const parsed = new Date(raw).getTime();
          return Number.isFinite(parsed) ? parsed : 0;
        };
        const sortedItems = [...items].sort((a, b) => {
          const dateDiff = toSortDateMs(b?.fecha) - toSortDateMs(a?.fecha);
          if (dateDiff !== 0) return dateDiff;
          return Number(b?.id_notificacion || 0) - Number(a?.id_notificacion || 0);
        });
        const linkifyEmails = (html = "") => {
          const wrap = document.createElement("div");
          wrap.innerHTML = html;
          const walker = document.createTreeWalker(
            wrap,
            NodeFilter.SHOW_TEXT,
            {
              acceptNode: (node) => {
                if (!node.nodeValue?.includes("@")) return NodeFilter.FILTER_REJECT;
                if (node.parentElement?.closest("a")) return NodeFilter.FILTER_REJECT;
                if (node.parentElement?.closest(".no-linkify")) return NodeFilter.FILTER_REJECT;
                return NodeFilter.FILTER_ACCEPT;
              },
            }
          );
          const emailRegex = /[A-Z0-9._%+-]+@[A-Z0-9.-]+\.[A-Z]{2,}/gi;
          const nodes = [];
          while (walker.nextNode()) nodes.push(walker.currentNode);
          nodes.forEach((node) => {
            const text = node.nodeValue || "";
            if (!emailRegex.test(text)) return;
            const frag = document.createDocumentFragment();
            let lastIndex = 0;
            text.replace(emailRegex, (match, offset) => {
              if (offset > lastIndex) {
                frag.appendChild(
                  document.createTextNode(text.slice(lastIndex, offset))
                );
              }
              const link = document.createElement("a");
              link.href = `inventario.html?correo=${encodeURIComponent(match)}`;
              link.textContent = match;
              link.className = "link-inline";
              frag.appendChild(link);
              lastIndex = offset + match.length;
              return match;
            });
            if (lastIndex < text.length) {
              frag.appendChild(
                document.createTextNode(text.slice(lastIndex))
              );
            }
            node.parentNode?.replaceChild(frag, node);
          });
          return wrap.innerHTML;
        };
        const linkifyUrls = (html = "") => {
          const wrap = document.createElement("div");
          wrap.innerHTML = html;
          const walker = document.createTreeWalker(
            wrap,
            NodeFilter.SHOW_TEXT,
            {
              acceptNode: (node) => {
                if (!/https?:\/\//i.test(node.nodeValue || "")) return NodeFilter.FILTER_REJECT;
                if (node.parentElement?.closest("a")) return NodeFilter.FILTER_REJECT;
                if (node.parentElement?.closest(".no-linkify")) return NodeFilter.FILTER_REJECT;
                return NodeFilter.FILTER_ACCEPT;
              },
            },
          );
          const urlRegex = /https?:\/\/[^\s<>"']+/gi;
          const splitTrailingPunctuation = (rawUrl = "") => {
            let url = String(rawUrl || "");
            let trailing = "";
            while (/[),.;!?]$/.test(url)) {
              trailing = `${url.slice(-1)}${trailing}`;
              url = url.slice(0, -1);
            }
            return { url, trailing };
          };
          const nodes = [];
          while (walker.nextNode()) nodes.push(walker.currentNode);
          nodes.forEach((node) => {
            const text = node.nodeValue || "";
            if (!urlRegex.test(text)) return;
            const frag = document.createDocumentFragment();
            let lastIndex = 0;
            text.replace(urlRegex, (match, offset) => {
              if (offset > lastIndex) {
                frag.appendChild(
                  document.createTextNode(text.slice(lastIndex, offset)),
                );
              }
              const { url, trailing } = splitTrailingPunctuation(match);
              if (url) {
                const link = document.createElement("a");
                link.href = url;
                link.textContent = url;
                link.className = "link-inline";
                link.target = "_blank";
                link.rel = "noopener noreferrer";
                frag.appendChild(link);
                if (trailing) {
                  frag.appendChild(document.createTextNode(trailing));
                }
              } else {
                frag.appendChild(document.createTextNode(match));
              }
              lastIndex = offset + match.length;
              return match;
            });
            if (lastIndex < text.length) {
              frag.appendChild(
                document.createTextNode(text.slice(lastIndex)),
              );
            }
            node.parentNode?.replaceChild(frag, node);
          });
          return wrap.innerHTML;
        };
        const colorizePlatformNames = (html = "") => {
          const wrap = document.createElement("div");
          wrap.innerHTML = html;
          wrap.querySelectorAll("strong").forEach((el) => {
            const key = normalizePlatformName(el.textContent || "");
            const color = platformColors.get(key);
            if (!color) return;
            el.style.color = color;
            el.style.fontWeight = "800";
          });
          return wrap.innerHTML;
        };
        tbody.innerHTML = sortedItems
          .map((n) => {
            const title = n.titulo || "-";
            const isReporteNotif =
              /\breporte\b/i.test(title) || /reportes\/report\.html/i.test(String(n.mensaje || ""));
            const cardClass = isReporteNotif ? "notif-item notif-item-report" : "notif-item";
            const mensaje = colorizePlatformNames(linkifyUrls(linkifyEmails(n.mensaje || "-")));
            return `
          <div class="${cardClass}">
            <h4>${title}</h4>
            <p>${mensaje}</p>
            <small>${formatDateDMY(n.fecha)}</small>
          </div>
        `;
          })
          .join("");
      };

      const pickRandom = (arr = []) =>
        arr.length ? arr[Math.floor(Math.random() * arr.length)] : null;
      const getCorreo = (v) => v?.correo_miembro || v?.cuentas?.correo || "";
      const getClave = (v) => v?.cuentas?.clave || "";
      const getPerfil = (v) =>
        v?.perfiles?.n_perfil ? `M${v.perfiles.n_perfil}` : "";
      const getPin = (v) => v?.perfiles?.pin || "";
      const getPlataforma = (v) => v?.cuentas?.plataformas?.nombre || "Plataforma";
      const getIdCuenta = (v) => v?.id_cuenta || v?.cuentas?.id_cuenta || null;
      let usuariosCache = null;
      let usuariosCachePromise = null;

      const loadPlatformColors = async () => {
        let platformColors = new Map();
        try {
          const { data: plats, error: platsErr } = await supabase
            .from("plataformas")
            .select("nombre, color_1");
          if (platsErr) {
            console.error("cargar colores de plataformas error", platsErr);
          } else {
            platformColors = buildPlatformColorMap(plats || []);
          }
        } catch (platErr) {
          console.error("cargar colores de plataformas error", platErr);
        }
        return platformColors;
      };

      const loadNotificationsByUserId = async (targetUserId, platformColors) => {
        const id = Number(targetUserId);
        if (!Number.isFinite(id) || id <= 0) {
          renderTable([], platformColors);
          return;
        }
        setStatus("Cargando...");
        const { data, error } = await supabase
          .from("notificaciones")
          .select("id_notificacion, titulo, mensaje, fecha")
          .eq("id_usuario", id)
          .order("id_notificacion", { ascending: false });
        if (error) throw error;
        renderTable(data || [], platformColors);
      };

      const loadUsuariosCache = async () => {
        if (usuariosCache) return usuariosCache;
        if (usuariosCachePromise) return usuariosCachePromise;
        usuariosCachePromise = supabase
          .from("usuarios")
          .select("id_usuario, nombre, apellido")
          .order("nombre", { ascending: true })
          .order("apellido", { ascending: true })
          .then(({ data, error }) => {
            if (error) throw error;
            usuariosCache = data || [];
            usuariosCachePromise = null;
            return usuariosCache;
          })
          .catch((err) => {
            usuariosCachePromise = null;
            throw err;
          });
        return usuariosCachePromise;
      };

      const searchUsuarios = async (termRaw = "") => {
        const term = normalizeSearchText(String(termRaw || "").replaceAll(",", " "));
        if (term.length < 2) return [];
        const rows = await loadUsuariosCache();
        return (rows || [])
          .filter((row) => {
            const nombre = normalizeSearchText(row?.nombre || "");
            const apellido = normalizeSearchText(row?.apellido || "");
            const full = normalizeSearchText(`${row?.nombre || ""} ${row?.apellido || ""}`);
            return nombre.includes(term) || apellido.includes(term) || full.includes(term);
          })
          .slice(0, 20);
      };

      const bindSuperadminSearch = ({ selfUser, platformColors }) => {
        if (!adminSearchWrap || !adminSearchInput || !adminSearchResults) return;
        adminSearchWrap.classList.remove("hidden");
        let debounceTimer = null;
        let latestQuery = "";
        const hideResults = () => {
          adminSearchResults.innerHTML = "";
          adminSearchResults.classList.add("hidden");
        };
        const selectUser = async (row) => {
          const fullName =
            [row?.nombre, row?.apellido].filter(Boolean).join(" ").trim() ||
            `Usuario ${row?.id_usuario || ""}`;
          adminSearchInput.value = fullName;
          hideResults();
          setAdminTarget(`Mostrando notificaciones de: ${fullName}`);
          await loadNotificationsByUserId(row.id_usuario, platformColors);
        };
        adminSearchInput.addEventListener("input", () => {
          if (debounceTimer) clearTimeout(debounceTimer);
          const q = adminSearchInput.value || "";
          latestQuery = q;
          debounceTimer = setTimeout(async () => {
            try {
              if ((latestQuery || "").trim().length < 2) {
                hideResults();
                return;
              }
              const rows = await searchUsuarios(latestQuery);
              if (!rows.length) {
                adminSearchResults.innerHTML =
                  '<div class="status" style="padding:10px 12px;">Sin resultados.</div>';
                adminSearchResults.classList.remove("hidden");
                return;
              }
              adminSearchResults.innerHTML = rows
                .map((r) => {
                  const name =
                    [r.nombre, r.apellido].filter(Boolean).join(" ").trim() ||
                    `Usuario ${r.id_usuario}`;
                  return `<button type="button" class="notif-admin-result" data-id="${r.id_usuario}" data-name="${name}">${name}</button>`;
                })
                .join("");
              adminSearchResults.classList.remove("hidden");
            } catch (err) {
              console.error("buscar usuarios notificaciones error", err);
            }
          }, 220);
        });
        adminSearchResults.addEventListener("click", async (e) => {
          const btn = e.target.closest(".notif-admin-result");
          if (!btn) return;
          const id = Number(btn.dataset.id);
          const name = String(btn.dataset.name || "").trim();
          await selectUser({ id_usuario: id, nombre: name, apellido: "" });
        });
        document.addEventListener("click", (e) => {
          if (!adminSearchWrap.contains(e.target)) hideResults();
        });
        setAdminTarget(
          `Mostrando notificaciones de: ${[selfUser?.nombre, selfUser?.apellido]
            .filter(Boolean)
            .join(" ")
            .trim() || "Mi cuenta"}`
        );
      };

      const seedTestNotifications = async () => {
        const today = new Date().toISOString().slice(0, 10);
        try {
          await supabase
            .from("notificaciones")
            .delete()
            .eq("id_usuario", TEST_USER_ID)
            .ilike("titulo", "TEST -%");

          const { data: ventas } = await supabase
            .from("ventas")
            .select(
              "id_venta, fecha_corte, id_cuenta, id_perfil, id_orden, correo_miembro, cuentas:cuentas!ventas_id_cuenta_fkey(id_cuenta, correo, clave, id_plataforma, plataformas(nombre)), perfiles:perfiles(id_perfil, n_perfil, pin)"
            )
            .limit(50);

          const v1 = pickRandom(ventas) || {};
          const v2 = pickRandom(ventas) || v1 || {};

          const data1 = {
            correoCuenta: getCorreo(v1) || "test@demo.com",
            clave: getClave(v1) || "1234",
            perfil: getPerfil(v1) || "M1",
            pin: getPin(v1) || "0000",
            plataforma: getPlataforma(v1),
            fechaCorte: v1?.fecha_corte || today,
            idOrden: v1?.id_orden || null,
            idCuenta: getIdCuenta(v1),
          };
          const data2 = {
            correoCuenta: getCorreo(v2) || "test2@demo.com",
            clave: getClave(v2) || "5678",
            perfil: getPerfil(v2) || "M2",
            pin: getPin(v2) || "1111",
            plataforma: getPlataforma(v2),
            fechaCorte: v2?.fecha_corte || today,
            idOrden: v2?.id_orden || null,
            idCuenta: getIdCuenta(v2),
          };

          const rows = [
            buildNotificationPayload(
              "pin_actualizado",
              {
                plataforma: data1.plataforma,
                correoCuenta: data1.correoCuenta,
                perfil: data1.perfil,
                pin: data1.pin,
              },
              { idCuenta: data1.idCuenta }
            ),
            buildNotificationPayload(
              "clave_actualizada",
              {
                plataforma: data1.plataforma,
                correoCuenta: data1.correoCuenta,
                clave: data1.clave,
              },
              { idCuenta: data1.idCuenta }
            ),
            buildNotificationPayload(
              "servicio_reemplazado",
              {
                plataforma: data1.plataforma,
                correoViejo: data1.correoCuenta,
                perfilViejo: data1.perfil,
                correoNuevo: data2.correoCuenta,
                perfilNuevo: data2.perfil,
                claveNuevo: data2.clave,
              },
              { idCuenta: data2.idCuenta }
            ),
            buildNotificationPayload(
              "servicio_renovado",
              {
                items: [
                  {
                    plataforma: data1.plataforma,
                    correoCuenta: data1.correoCuenta,
                    clave: data1.clave,
                    perfil: data1.perfil,
                    fechaCorte: data1.fechaCorte,
                    idVenta: v1?.id_venta || null,
                  },
                  {
                    plataforma: data2.plataforma,
                    correoCuenta: data2.correoCuenta,
                    clave: data2.clave,
                    perfil: data2.perfil,
                    fechaCorte: data2.fechaCorte,
                    idVenta: v2?.id_venta || null,
                  },
                ],
              },
              { idCuenta: data1.idCuenta }
            ),
            buildNotificationPayload(
              "nuevo_servicio",
              {
                items: [
                  {
                    plataforma: data1.plataforma,
                    correoCuenta: data1.correoCuenta,
                    clave: data1.clave,
                    perfil: data1.perfil,
                    fechaCorte: data1.fechaCorte,
                    idVenta: v1?.id_venta || null,
                  },
                  {
                    plataforma: data2.plataforma,
                    correoCuenta: data2.correoCuenta,
                    clave: data2.clave,
                    perfil: data2.perfil,
                    fechaCorte: data2.fechaCorte,
                    idVenta: v2?.id_venta || null,
                  },
                ],
              },
              { idCuenta: data1.idCuenta }
            ),
            buildNotificationPayload(
              "recordatorio_corte",
              {
                plataforma: data1.plataforma,
                correoCuenta: data1.correoCuenta,
                perfil: data1.perfil,
                fechaCorte: data1.fechaCorte,
              },
              { idCuenta: data1.idCuenta }
            ),
            buildNotificationPayload(
              "servicios_vencen_pronto",
              {
                items: [
                  {
                    plataforma: data1.plataforma,
                    correoCuenta: data1.correoCuenta,
                    fechaCorte: data1.fechaCorte,
                    idVenta: v1?.id_venta || null,
                  },
                  {
                    plataforma: data2.plataforma,
                    correoCuenta: data2.correoCuenta,
                    fechaCorte: data2.fechaCorte,
                    idVenta: v2?.id_venta || null,
                  },
                ],
              },
              { idCuenta: data1.idCuenta }
            ),
          ].map((row) => ({
            ...row,
            id_usuario: TEST_USER_ID,
            titulo: `TEST - ${row.titulo}`,
          }));

          if (rows.length) {
            const { error } = await supabase.from("notificaciones").insert(rows);
            if (error) throw error;
          }
        } catch (err) {
          console.error("seed notificaciones test error", err);
        }
      };

      (async () => {
        try {
          const user = await loadCurrentUser();
          if (!user?.id_usuario) {
            setStatus("No autenticado.");
            return;
          }
          if (Number(user.id_usuario) === TEST_USER_ID) {
            await seedTestNotifications();
          }
          const platformColors = await loadPlatformColors();
          await loadNotificationsByUserId(user.id_usuario, platformColors);
          if (isTrue(user?.permiso_superadmin)) {
            bindSuperadminSearch({ selfUser: user, platformColors });
          }
        } catch (err) {
          console.error("cargar notificaciones error", err);
          setStatus("No se pudieron cargar las notificaciones.");
        }
      })();

      attachLogout(clearServerSession);
    </script>
  </body>
</html>
