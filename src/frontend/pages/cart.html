<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Carrito</title>
    <link rel="stylesheet" href="../styles/styles.css" />
    <style>
      .cart-total-bs-cell {
        position: relative;
        vertical-align: top;
        overflow: visible;
      }

      .cart-total-bs-wrap {
        position: relative;
        display: inline-flex;
        align-items: flex-start;
        gap: 0.5rem;
        justify-content: center;
        overflow: visible;
        z-index: 1;
      }

      .cart-total-help-btn {
        width: 1.4rem;
        height: 1.4rem;
        border: 1px solid rgba(255, 255, 255, 0.22);
        border-radius: 999px;
        background: #1a1f2b;
        color: #ffffff;
        font-size: 0.95rem;
        font-weight: 700;
        line-height: 1;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        flex: 0 0 auto;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.18);
      }

      .cart-total-help-btn:hover {
        background: #0f1420;
      }

      .cart-total-help-popover {
        position: fixed;
        left: 0;
        top: 0;
        transform: none;
        z-index: 2147483647;
        width: min(12rem, calc(100vw - 1rem));
        max-width: min(12rem, calc(100vw - 1rem));
        padding: 0.75rem 0.8rem;
        border-radius: 12px;
        background: rgba(18, 24, 38, 0.98);
        color: #f4f7fb;
        text-align: left;
        box-shadow: 0 18px 40px rgba(0, 0, 0, 0.28);
        border: 1px solid rgba(255, 255, 255, 0.08);
        white-space: normal;
        overflow-wrap: anywhere;
      }

      .cart-total-help-popover p {
        margin: 0 0 0.7rem;
        line-height: 1.45;
      }

      .cart-total-help-popover p:last-child {
        margin-bottom: 0;
      }

      @media (max-width: 720px) {
        .cart-total-help-popover {
          width: min(11rem, calc(100vw - 0.75rem));
          max-width: min(11rem, calc(100vw - 0.75rem));
        }
      }
    </style>
  </head>
  <body class="cart-page">
    <div id="app-header" data-header-root="../" data-header-pages=""></div>
    <script src="../scripts/header-loader.js"></script>

    <main class="categorias-dinamicas">
      <div class="cart-title-row">
        <h2>Carrito</h2>
        <div class="cart-saldo-wrap">
          <p class="cart-saldo-label">Saldo disponible</p>
          <p id="cart-saldo" class="cart-saldo">$0.00</p>
        </div>
      </div>
      <p id="cart-status" class="status"></p>
      <div class="cart-table-wrap">
        <div id="cart-page-items" class="cart-items page-cart"></div>
        <div class="page-actions">
          <div class="cart-pay-stack">
            <div class="cart-pay-row">
              <button id="btn-page-continue" class="btn-cart-main">Seguir comprando</button>
              <button id="btn-page-pay" class="btn-cart-main">Ir a pagar</button>
            </div>
            <p id="cart-refresh-note" class="status hidden">
              Actualiza el carrito para continuar.
            </p>
          </div>
        </div>
      </div>
    </main>

    <div id="cart-remove-modal" class="modal hidden" aria-hidden="true">
      <div class="modal-backdrop"></div>
      <div class="modal-card cart-remove-modal-card">
        <button
          type="button"
          class="modal-close"
          id="cart-remove-modal-close"
          aria-label="Cerrar"
        >
          ×
        </button>
        <div class="modal-body cart-remove-modal-body">
          <p class="cart-remove-modal-message">
            ¿Quieres eliminar este item del carrito?
          </p>
          <div class="cart-remove-modal-actions">
            <button
              type="button"
              class="btn-outline"
              id="cart-remove-cancel"
            >
              Cancelar
            </button>
            <button
              type="button"
              class="btn-primary"
              id="cart-remove-confirm"
            >
              Eliminar
            </button>
          </div>
        </div>
      </div>
    </div>

    <div id="cart-renewal-modal" class="modal hidden" aria-hidden="true">
      <div class="modal-backdrop" data-renewal-close="1"></div>
      <div class="modal-card cart-renewal-modal-card">
        <button
          type="button"
          class="modal-close"
          id="cart-renewal-modal-close"
          aria-label="Cerrar"
        >
          ×
        </button>
        <div class="modal-body cart-renewal-modal-body">
          <p class="cart-renewal-modal-message">
            Renovaciones añadidas al carrito con exito.
          </p>
          <div class="cart-renewal-modal-actions">
            <button
              type="button"
              class="btn-outline"
              id="cart-renewal-continue"
            >
              Seguir comprando
            </button>
            <button
              type="button"
              class="btn-primary"
              id="cart-renewal-accept"
            >
              Aceptar
            </button>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="../scripts/cart-page.js"></script>
  </body>
</html>
